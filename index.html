<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yu-Gi-Oh! GO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gold: #ffd700; --cyan: #00ffff; --red: #ff4d4d; --green: #2ecc71; --bg: #050510; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; overflow: hidden; height: 100vh; color: white; }
        #version-tag { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.6); font-size: 10px; color: #aaa; z-index: 5000; padding: 2px 5px; border-radius: 3px; }
        #map { width: 100%; height: 100%; position: absolute; z-index: 1; }
        .ui-btn { position: fixed; width: 65px; height: 65px; background: rgba(0,0,0,0.85); border: 2px solid var(--gold); border-radius: 50%; color: var(--gold); font-weight: bold; z-index: 1000; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px var(--gold); }
        #deck-btn { bottom: 30px; left: 20px; }
        #gps-btn { bottom: 30px; right: 20px; font-size: 24px; }

        /* バトル画面 */
        #battle-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a3e, #000); display: none; flex-direction: column; z-index: 9000; }
        .battle-stage { flex: 2; position: relative; display: flex; flex-direction: column; justify-content: space-between; padding: 50px 20px; }
        .m-box { width: 110px; position: relative; text-align: center; }
        .m-box.wild { align-self: flex-end; }
        .m-box.player { align-self: flex-start; }
        .battle-img { width: 100%; border-radius: 5px; border: 2px solid #555; background: #000; }
        
        /* シンプルステータスUI */
        .status-ui { position: absolute; width: 170px; background: rgba(255,255,255,0.95); border: 2px solid #333; padding: 6px; border-radius: 8px; color: #111; font-size: 11px; z-index: 9100; font-weight: bold; }
        .status-ui.wild { top: 0; left: -185px; border-left: 5px solid var(--gold); }
        .status-ui.player { bottom: 0; right: -185px; border-right: 5px solid var(--cyan); }
        .hp-bg { width: 100%; height: 10px; background: #ccc; border-radius: 5px; overflow: hidden; margin-top: 4px; border: 1px solid #777; }
        .hp-bar { height: 100%; background: var(--green); width: 100%; transition: width 0.3s, background 0.3s; }
        .hp-bar.danger { background: var(--red); }
        .hp-text { text-align: right; font-family: monospace; font-size: 12px; margin-top: 2px; }

        #msg-window { height: 70px; background: #fff; color: #111; margin: 10px; border: 4px solid #555; border-radius: 10px; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: bold; }
        #cmd-grid { height: 120px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; background: #222; }
        .cmd-btn { background: #eee; border: 2px solid #888; border-radius: 8px; font-weight: bold; font-size: 16px; }
        .cmd-btn:disabled { opacity: 0.5; }
    </style>
</head>
<body>

<div id="version-tag">Ver 0.8.5</div>
<div id="map"></div>
<div id="deck-btn" class="ui-btn" onclick="alert('デッキ機能起動中...')">DECK</div>
<div id="gps-btn" class="ui-btn" onclick="refreshGPS()">🛰️</div>

<div id="battle-screen">
    <div class="battle-stage">
        <div class="m-box wild">
            <div class="status-ui wild">
                <div id="w-name-label">---</div>
                <div id="w-stat-label">Lv.1 ATK:0</div>
                <div class="hp-bg"><div id="w-hp-bar" class="hp-bar"></div></div>
                <div class="hp-text"><span id="w-hp-now">0</span> / <span id="w-hp-max">0</span></div>
            </div>
            <img id="w-img" class="battle-img" src="">
        </div>
        <div class="m-box player">
            <div class="status-ui player">
                <div id="p-name-label">---</div>
                <div id="p-stat-label">Lv.1 ATK:0</div>
                <div class="hp-bg"><div id="p-hp-bar" class="hp-bar"></div></div>
                <div class="hp-text"><span id="p-hp-now">0</span> / <span id="p-hp-max">0</span></div>
            </div>
            <img id="p-img" class="battle-img" src="">
        </div>
    </div>
    <div id="msg-window"><div id="msg-text"></div></div>
    <div id="cmd-grid">
        <button class="btn-ctrl cmd-btn" onclick="processBattle('attack')">攻撃</button>
        <button class="btn-ctrl cmd-btn" onclick="processBattle('seal')">封印</button>
        <button class="btn-ctrl cmd-btn" onclick="location.reload()">逃げる</button>
        <button class="btn-ctrl cmd-btn">交代</button>
    </div>
</div>

<script>
    let map, bData = { p: null, e: null, busy: false };
    const myDeck = JSON.parse(localStorage.getItem('myDeck') || '[{"name":"クリボー","img":"https://images.ygoprodeck.com/images/cards/40640057.jpg","atk":300,"level":1}]');

    // 100種超のモンスタープール（代表的なID）
    const monsterIds = [
        89631139, 46986414, 74677422, 38033121, 70781052, 91152256, 13839129, 33731070, 10000010, 40640057, 
        23995346, 6382542, 28279543, 15025844, 87796900, 71625222, 78193831, 77585513, 33396948, 44095762,
        // ... (実際はもっと多くのIDをここにリスト可能)
    ];

    function init() {
        navigator.geolocation.getCurrentPosition(pos => {
            map = L.map('map', {zoomControl:false}).setView([pos.coords.latitude, pos.coords.longitude], 17);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            spawn(pos.coords.latitude, pos.coords.longitude);
        });
    }

    function spawn(lat, lon) {
        map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });
        for(let i=0; i<20; i++) {
            let id = monsterIds[Math.floor(Math.random()*monsterIds.length)];
            let lv = Math.floor(Math.random()*5)+1;
            let marker = L.marker([lat+(Math.random()-0.5)*0.008, lon+(Math.random()-0.5)*0.008], {
                icon: L.icon({iconUrl: `https://images.ygoprodeck.com/images/cards_small/${id}.jpg`, iconSize:[45,65]})
            }).addTo(map);
            marker.on('click', () => {
                const atk = 500 * lv; // シンプルにLv×500
                bData.e = { id, name: "野生モンスター", atk, hp: atk, maxHp: atk, lv, img: `https://images.ygoprodeck.com/images/cards/${id}.jpg` };
                bData.p = { ...myDeck[0], hp: myDeck[0].atk * 2, maxHp: myDeck[0].atk * 2 };
                document.getElementById('battle-screen').style.display = 'flex';
                updateUI();
            });
        }
    }

    function updateUI() {
        const setStats = (prefix, data) => {
            document.getElementById(`${prefix}-name-label`).innerText = data.name;
            document.getElementById(`${prefix}-stat-label`).innerText = `Lv.${data.lv || 1} ATK:${data.atk}`;
            document.getElementById(`${prefix}-hp-now`).innerText = Math.floor(data.hp);
            document.getElementById(`${prefix}-hp-max`).innerText = Math.floor(data.maxHp);
            const bar = document.getElementById(`${prefix}-hp-bar`);
            const per = (data.hp / data.maxHp) * 100;
            bar.style.width = per + '%';
            bar.classList.toggle('danger', per <= 30);
            document.getElementById(`${prefix}-img`).src = data.img;
        };
        setStats('w', bData.e);
        setStats('p', bData.p);
    }

    async function processBattle(act) {
        if(bData.busy) return; bData.busy = true;
        const msg = (t) => document.getElementById('msg-text').innerText = t;
        
        if(act === 'attack') {
            const dmg = Math.floor(bData.p.atk * (0.8 + Math.random() * 0.4));
            msg(`${dmg}のダメージ！`);
            await new Promise(r => setTimeout(r, 600));
            bData.e.hp = Math.max(0, bData.e.hp - dmg);
            updateUI();
            if(bData.e.hp <= 0) { msg("封印チャンス！"); bData.busy = false; return; }
        } else {
            msg("封印カード！");
            await new Promise(r => setTimeout(r, 1000));
            if(Math.random() > (bData.e.hp / bData.e.maxHp)) { alert("封印成功！"); location.reload(); return; }
            msg("失敗！");
        }

        await new Promise(r => setTimeout(r, 800));
        const eDmg = Math.floor(bData.e.atk * 0.5);
        msg(`反撃！${eDmg}のダメージ！`);
        bData.p.hp = Math.max(0, bData.p.hp - eDmg);
        updateUI();
        if(bData.p.hp <= 0) { alert("敗北..."); location.reload(); }
        bData.busy = false;
    }

    function refreshGPS() { navigator.geolocation.getCurrentPosition(pos => { map.setView([pos.coords.latitude, pos.coords.longitude]); spawn(pos.coords.latitude, pos.coords.longitude); }); }
    window.onload = init;
</script>
</body>
</html>
