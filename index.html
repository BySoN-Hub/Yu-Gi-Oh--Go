<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yu-Gi-Oh! GO</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: white; overflow: hidden; }
        
        /* サイバーマップ背景 */
        #map-container { 
            width: 100vw; height: 100vh; 
            background: radial-gradient(circle at 50% 50%, #0d1b2a 0%, #000 100%);
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.1) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.1) 2px, transparent 2px);
            background-size: 80px 80px;
            position: relative; 
        }

        /* モンスターの見た目（もっとカードらしく） */
        .monster-icon {
            position: absolute; width: 100px; height: 145px;
            cursor: pointer; border: 2px solid #ffd700; border-radius: 5px;
            background: #111; z-index: 100;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.7);
            transition: all 0.3s ease;
        }
        .monster-icon:hover { transform: scale(1.2) rotate(5deg); filter: brightness(1.3); }

        #status-msg { 
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #00ffff; font-weight: bold; font-size: 1.2rem;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8); z-index: 500;
        }

        /* 捕獲（封印）画面 */
        #capture-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none;
            flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
        }

        #monster-art { width: 260px; border: 4px solid #ffd700; border-radius: 12px; margin-bottom: 20px; }
        
        button {
            padding: 15px 35px; font-size: 1.2rem; background: #c0392b; color: white;
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
            box-shadow: 0 5px 20px rgba(192, 57, 43, 0.5);
        }
    </style>
</head>
<body>

<div id="status-msg">デュエル・スキャナー：周囲を索敵中...</div>
<div id="map-container"></div>

<div id="capture-screen">
    <h2 id="m-name"></h2>
    <img id="monster-art" src="">
    <button onclick="captureMonster()">カードへ封印する</button>
</div>

<script>
    const map = document.getElementById('map-container');
    const statusMsg = document.getElementById('status-msg');
    let currentMonster = null;

    // API制限を回避するための中継プロキシを利用
    const PROXY = "https://api.allorigins.win/raw?url=";
    const API_URL = encodeURIComponent("https://db.ygoprodeck.com/api/v7/randomcard.php");

    async function spawnMonster() {
        try {
            // プロキシ経由でランダムカードを取得
            const res = await fetch(PROXY + API_URL);
            const data = await res.json();
            
            if (data.card_images) {
                createIcon(data);
                statusMsg.innerText = "ターゲット捕捉！";
            } else {
                spawnMonster(); // モンスター以外なら再試行
            }
        } catch (e) {
            console.error("APIエラーにつき、予備データを配置します");
            // APIがダメな場合のバックアップ
            createIcon({
                name: "青眼の白龍",
                card_images: [{ image_url: "https://images.ygoprodeck.com/images/cards/89631139.jpg" }]
            });
        }
    }

    function createIcon(card) {
        const icon = document.createElement('img');
        icon.src = card.card_images[0].image_url;
        icon.className = 'monster-icon';
        
        // 画面内のランダムな位置
        icon.style.left = (15 + Math.random() * 60) + "%";
        icon.style.top = (15 + Math.random() * 60) + "%";
        
        icon.onclick = () => {
            currentMonster = card;
            document.getElementById('m-name').innerText = card.name;
            document.getElementById('monster-art').src = card.card_images[0].image_url;
            document.getElementById('capture-screen').style.display = 'flex';
        };
        map.appendChild(icon);
    }

    function captureMonster() {
        alert(`封印成功！ ${currentMonster.name} をデッキに加えた！`);
        // ここにデッキ保存処理を後で追加
        location.reload(); 
    }

    // 起動時に3体ほど出現させる
    window.onload = () => {
        for(let i=0; i<3; i++) {
            setTimeout(spawnMonster, i * 1000);
        }
    };
</script>
</body>
</html>
