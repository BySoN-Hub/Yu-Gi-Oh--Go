<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Yu-Gi-Oh! GO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gold: #ffd700; --cyan: #00ffff; --red: #ff4d4d; --fusion: #8e44ad; --bg: #050510; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; overflow: hidden; height: 100dvh; width: 100vw; color: white; touch-action: manipulation; }
        #version-tag { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.8); font-size: 10px; color: var(--gold); z-index: 9999999; padding: 2px 5px; border-radius: 3px; pointer-events: none; border: 1px solid var(--gold); }

        /* 画面レイヤー管理 */
        #top-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050510; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        #loading-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; display:none; flex-direction:column; align-items:center; justify-content:center; z-index: 2000; }
        #map { width: 100%; height: 100%; position: absolute; z-index: 1; visibility: hidden; }

        .ui-btn { position: fixed; width: 60px; height: 60px; background: rgba(0,0,0,0.85); border: 2px solid var(--gold); border-radius: 50%; color: var(--gold); z-index: 500; display: none; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 0 10px var(--gold); }
        #deck-btn-ui { bottom: 40px; left: 20px; }
        #shop-btn-ui { bottom: 110px; left: 20px; color: var(--cyan); border-color: var(--cyan); }
        #gps-btn-ui { bottom: 40px; right: 20px; font-size: 24px; }

        .overlay-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: none; flex-direction: column; z-index: 3000; padding: 20px; box-sizing: border-box; }
        
        .top-title { color:var(--gold); text-shadow:0 0 20px #f00; margin-bottom: 20px; font-size: 2.5rem; font-style: italic; }
        .start-btn { padding:15px 40px; background:rgba(0,0,0,0.9); color:var(--gold); border:2px solid var(--gold); border-radius:50px; font-weight:bold; font-size: 1.2rem; cursor: pointer; }
        .load-text { color: var(--gold); font-size: 1.5rem; font-weight: bold; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

        /* バトル・デッキ・ショップ等の共通デザイン */
        .cmd-btn { background: #eee; border: 2px solid #888; border-radius: 5px; font-weight: bold; font-size: 16px; padding: 10px; color: #000; }
        .mon-chip { border: 2px solid var(--gold); border-radius: 4px; background: #000; }
        .lv-badge { position: absolute; top: -5px; right: -5px; background: #000; color: var(--gold); border: 1px solid var(--gold); font-size: 10px; padding: 1px 3px; border-radius: 3px; }
    </style>
</head>
<body>

<div id="version-tag">Ver 1.3.5</div>
<audio id="bgm" loop></audio>

<div id="top-screen">
    <h1 class="top-title">Yu-Gi-Oh! GO</h1>
    <button class="start-btn" onclick="startGame()">闇のゲームを開始</button>
</div>

<div id="loading-screen"><div class="load-text">周辺探索中…</div></div>

<div id="map"></div>
<div id="deck-btn-ui" class="ui-btn" onclick="openDeck()">DECK</div>
<div id="shop-btn-ui" class="ui-btn" onclick="openShop()">SHOP</div>
<div id="gps-btn-ui" class="ui-btn" onclick="refreshGPS()">🛰️</div>

<div id="battle-screen" class="overlay-screen" style="background: radial-gradient(circle, #1a1a3e, #000);">
    <div style="flex: 1; position: relative;">
        <div style="position:absolute; top:10%; width:100%; display:flex; justify-content:center; gap:10px;">
            <div style="position:relative;">
                <img id="w-img" style="height:150px; border:2px solid #555; border-radius:5px;">
                <div id="seal-base-card" style="position:absolute; top:0; left:0; width:100%; height:100%; background-image:url('https://images.ygoprodeck.com/images/cards/back_high.jpg'); background-size:contain; background-repeat:no-repeat; background-position:center; display:none;"></div>
            </div>
            <div style="background:rgba(255,255,255,0.9); color:#000; padding:5px; border-radius:5px; font-size:10px; width:100px; height:fit-content;">
                <div id="w-name" style="font-weight:bold; border-bottom:1px solid #000;">---</div>
                <div id="w-hp">HP: ---</div>
            </div>
        </div>
        <div style="position:absolute; bottom:10%; width:100%; display:flex; justify-content:center; gap:10px;">
            <img id="p-img" style="height:150px; border:2px solid var(--cyan); border-radius:5px;">
            <div style="background:rgba(255,255,255,0.9); color:#000; padding:5px; border-radius:5px; font-size:10px; width:100px; height:fit-content;">
                <div id="p-name" style="font-weight:bold; border-bottom:1px solid #000;">---</div>
                <div id="p-hp">HP: ---</div>
            </div>
        </div>
    </div>
    <div id="msg-window" style="height:50px; background:#fff; color:#000; margin:10px; border-radius:5px; display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:bold;"></div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:5px; padding:10px;">
        <button class="cmd-btn" onclick="battleTurn('attack')">攻撃</button>
        <button class="cmd-btn" onclick="battleTurn('seal')">封印</button>
        <button class="cmd-btn" onclick="closeBattleUI()">逃げる</button>
        <button class="cmd-btn" onclick="openDeck()">交代</button>
    </div>
</div>

<div id="deck-screen" class="overlay-screen">
    <h3 style="text-align:center; color:var(--gold);">DECK</h3>
    <div id="deck-grid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; overflow-y:auto; flex:1;"></div>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;">
        <button class="cmd-btn" onclick="executeSwap()">メインに設定</button>
        <button class="cmd-btn" onclick="executeEnhance()">強化</button>
    </div>
    <button class="cmd-btn" onclick="closeDeck()" style="margin-top:10px;">閉じる</button>
</div>

<div id="shop-screen" class="overlay-screen">
    <h2 style="text-align:center; color:var(--cyan);">SHOP</h2>
    <p id="shop-msg" style="text-align:center; font-size:12px; color:var(--gold);">1日1回限定配布</p>
    <div style="display:flex; justify-content:center; gap:20px; margin-top:20px;">
        <div style="text-align:center;"><img src="https://images.ygoprodeck.com/images/cards/46986414.jpg" style="width:100px;"><br><button class="cmd-btn" onclick="buyFreeCard('bm')">BM入手</button></div>
        <div style="text-align:center;"><img src="https://images.ygoprodeck.com/images/cards/89631139.jpg" style="width:100px;"><br><button class="cmd-btn" onclick="buyFreeCard('be')">青眼入手</button></div>
    </div>
    <button class="cmd-btn" onclick="closeShop()" style="margin-top:auto;">戻る</button>
</div>

<script>
    let map, bData = { p: null, e: null, busy: false }, currentMarker;
    let myDeck = JSON.parse(localStorage.getItem('myDeck') || '[{"name":"青眼の白龍","id":89631139,"img":"https://images.ygoprodeck.com/images/cards/89631139.jpg","atk":3000,"baseAtk":3000,"count":1}]');
    let selectedIdx = -1;

    const monsterLib = [
        {id:89631139, atk:3000, name:"青眼の白龍"}, {id:46986414, atk:2500, name:"ブラック・マジシャン"}, {id:74677422, atk:2400, name:"真紅眼の黒竜"},
        {id:33731070, atk:4000, name:"オシリスの天空竜"}, {id:38033121, atk:2000, name:"ブラック・マジシャン・ガール"}, {id:95440946, atk:2500, name:"黄金卿エルドリッチ"}
    ];

    function startGame() {
        document.getElementById('top-screen').style.display = 'none';
        document.getElementById('loading-screen').style.display = 'flex';
        
        // BGM再生（エラー回避のため独立）
        try {
            const audio = document.getElementById('bgm');
            audio.src = "https://maoudamashii.jokersounds.com/music/bgm/mp3/bgm_maoudamashii_fantasy15.mp3";
            audio.volume = 0.2;
            audio.play();
        } catch(e) {}

        // マップ初期化。8秒以内にGPSが取れなければ強制表示するタイムアウト付き
        let gpsTimeout = setTimeout(() => {
            if(!map) initMapForce(35.37, 139.18); // 秦野市付近をデフォルトに
        }, 8000);

        navigator.geolocation.getCurrentPosition(pos => {
            clearTimeout(gpsTimeout);
            initMapForce(pos.coords.latitude, pos.coords.longitude);
        }, () => {
            clearTimeout(gpsTimeout);
            initMapForce(35.37, 139.18);
        });
    }

    function initMapForce(lat, lon) {
        if(map) return;
        map = L.map('map', {zoomControl:false}).setView([lat, lon], 17);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        
        map.whenReady(() => {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('map').style.visibility = 'visible';
            document.querySelectorAll('.ui-btn').forEach(b => b.style.display = 'flex');
            spawn(lat, lon);
            setTimeout(() => map.invalidateSize(), 500); // 描画強制更新
        });

        map.on('moveend', () => spawn(map.getCenter().lat, map.getCenter().lng));
    }

    function spawn(lat, lon) {
        if(!map) return;
        map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });
        for(let i=0; i<25; i++) {
            let m = monsterLib[Math.floor(Math.random()*monsterLib.length)];
            let lv = Math.floor(Math.random()*10)+1;
            let imgUrl = `https://images.ygoprodeck.com/images/cards_small/${m.id}.jpg`;
            const icon = L.divIcon({ className: 'mon-container', html: `<img src="${imgUrl}" class="mon-chip" style="width:40px;height:40px;" onerror="this.src='https://images.ygoprodeck.com/images/cards/back_high.jpg'"><div class="lv-badge">Lv.${lv}</div>`, iconSize: [40, 40] });
            L.marker([lat+(Math.random()-0.5)*0.012, lon+(Math.random()-0.5)*0.012], {icon: icon}).addTo(map).on('click', (e) => startBattle(m, lv, e.target));
        }
    }

    function startBattle(m, lv, marker) {
        let bonus = (lv - 1) * 1000;
        bData.e = { ...m, atk: m.atk + bonus, hp: m.atk + bonus + 100, max: m.atk + bonus + 100, lv, img: `https://images.ygoprodeck.com/images/cards/${m.id}.jpg` };
        bData.p = { ...myDeck[0], hp: myDeck[0].atk, max: myDeck[0].atk };
        currentMarker = marker;
        document.getElementById('battle-screen').style.display = 'flex';
        updateBattleUI();
        document.getElementById('msg-window').innerText = m.name + " 現る！";
    }

    function updateBattleUI() {
        document.getElementById('w-img').src = bData.e.img;
        document.getElementById('w-name').innerText = bData.e.name + " Lv." + bData.e.lv;
        document.getElementById('w-hp').innerText = "HP: " + Math.floor(bData.e.hp);
        document.getElementById('p-img').src = bData.p.img;
        document.getElementById('p-name').innerText = bData.p.name;
        document.getElementById('p-hp').innerText = "HP: " + Math.floor(bData.p.hp);
    }

    async function battleTurn(act) {
        if(bData.busy) return; bData.busy = true;
        if(act === 'attack') {
            bData.e.hp -= bData.p.atk; updateBattleUI();
            if(bData.e.hp <= 0) { document.getElementById('msg-window').innerText = "チャンス！封印しろ！"; bData.busy = false; return; }
        } else if(act === 'seal') {
            document.getElementById('seal-base-card').style.display = 'block';
            await new Promise(r => setTimeout(r, 1000));
            if(Math.random() < 0.4 + (1 - bData.e.hp/bData.e.max)) {
                alert("封印成功！"); saveCapture(bData.e); closeBattleUI(); return;
            }
            document.getElementById('seal-base-card').style.display = 'none';
        }
        bData.p.hp -= bData.e.atk * 0.3; updateBattleUI();
        if(bData.p.hp <= 0) { alert("敗北..."); closeBattleUI(); }
        bData.busy = false;
    }

    function saveCapture(m) {
        let exist = myDeck.find(d => d.id === m.id);
        if(exist) exist.count++; else myDeck.push({ ...m, count: 1, baseAtk: m.atk - (m.lv-1)*1000 });
        localStorage.setItem('myDeck', JSON.stringify(myDeck));
    }

    function openDeck() { document.getElementById('deck-screen').style.display = 'flex'; renderDeck(); }
    function closeDeck() { document.getElementById('deck-screen').style.display = 'none'; }
    function renderDeck() {
        const grid = document.getElementById('deck-grid'); grid.innerHTML = '';
        myDeck.forEach((m, i) => {
            grid.innerHTML += `<div class="card-box ${selectedIdx === i ? 'selected' : ''}" style="border:1px solid #444; position:relative;" onclick="selectedIdx=${i};renderDeck();"><img src="${m.img}" style="width:100%"><div style="position:absolute; bottom:0; right:0; background:red; font-size:10px;">×${m.count}</div></div>`;
        });
    }
    function executeSwap() { if(selectedIdx >= 0) { const [t] = myDeck.splice(selectedIdx, 1); myDeck.unshift(t); localStorage.setItem('myDeck', JSON.stringify(myDeck)); selectedIdx = -1; renderDeck(); } }
    function executeEnhance() { if(selectedIdx > 0) { myDeck[0].atk += 500; myDeck[selectedIdx].count--; if(myDeck[selectedIdx].count <= 0) myDeck.splice(selectedIdx,1); localStorage.setItem('myDeck', JSON.stringify(myDeck)); selectedIdx = -1; renderDeck(); } }

    function openShop() { document.getElementById('shop-screen').style.display = 'flex'; }
    function closeShop() { document.getElementById('shop-screen').style.display = 'none'; }
    function buyFreeCard(t) {
        const lastDate = localStorage.getItem('lastShopDate');
        if(lastDate === new Date().toLocaleDateString()) { alert("今日はもうもらったよ！"); return; }
        const m = (t === 'bm') ? {id:46986414, name:"ブラックマジシャン", atk:2500} : {id:89631139, name:"青眼の白龍", atk:3000};
        saveCapture({...m, lv: 1, img: `https://images.ygoprodeck.com/images/cards/${m.id}.jpg`});
        localStorage.setItem('lastShopDate', new Date().toLocaleDateString());
        alert(m.name + " ゲット！");
    }

    function closeBattleUI() { document.getElementById('battle-screen').style.display = 'none'; bData.busy = false; if(currentMarker) map.removeLayer(currentMarker); }
    function refreshGPS() { location.reload(); }
</script>
</body>
</html>
