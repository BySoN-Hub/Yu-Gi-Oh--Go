<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yu-Gi-Oh! GO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gold: #ffd700; --cyan: #00ffff; --red: #ff4d4d; --fusion: #8e44ad; --bg: #050510; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; color: white; }
        #version-tag { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.6); font-size: 10px; color: var(--gold); z-index: 100000; padding: 2px 5px; border-radius: 3px; pointer-events: none; }

        /* トップ画面 */
        #top-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a2e, #000); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999999; transition: opacity 0.5s; }
        .title-logo { font-size: 2.5rem; color: var(--gold); text-shadow: 0 0 20px #f00; font-weight: bold; margin-bottom: 50px; text-align: center; }
        .start-btn { padding: 18px 35px; font-size: 1.1rem; background: #000; color: var(--gold); border: 2px solid var(--gold); border-radius: 50px; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px var(--gold); }

        /* マップ画面 */
        #map { width: 100%; height: 100%; position: absolute; z-index: 1; visibility: hidden; background: #000; }
        .mon-chip { border: 2px solid var(--gold); border-radius: 4px; box-shadow: 0 0 8px rgba(255,215,0,0.5); object-fit: cover; background: #000; }
        
        /* UIボタン */
        .ui-btn { position: fixed; width: 60px; height: 60px; background: rgba(0,0,0,0.85); border: 2px solid var(--gold); border-radius: 50%; color: var(--gold); z-index: 1000; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px var(--gold); }
        #deck-btn-ui { bottom: 25px; left: 20px; }
        #gps-btn-ui { bottom: 25px; right: 20px; font-size: 22px; }

        /* 戦闘・ステータス表示 */
        #battle-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a3e, #000); display: none; flex-direction: column; z-index: 9000; }
        .battle-stage { flex: 1; display: flex; flex-direction: column; justify-content: space-around; padding: 10px; align-items: center; }
        .m-box { width: 100%; display: flex; align-items: center; justify-content: center; height: 35%; position: relative; }
        .battle-img { max-height: 100%; width: auto; max-width: 40%; border: 2px solid #555; border-radius: 5px; }
        .status-ui { width: 160px; background: rgba(255,255,255,0.95); border: 2px solid #333; padding: 5px; border-radius: 6px; color: #111; font-size: 11px; margin: 0 10px; font-weight: bold; }
        .hp-bar-bg { width: 100%; height: 8px; background: #ccc; border-radius: 4px; overflow: hidden; margin-top: 3px; border: 1px solid #777; }
        .hp-bar-fill { height: 100%; background: #2ecc71; width: 100%; transition: width 0.3s; }
        .hp-danger { background: var(--red) !important; }

        #msg-window { height: 60px; background: #fff; color: #111; margin: 5px 15px; border: 4px solid #555; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; text-align: center; font-size: 14px; }
        #cmd-grid { height: 110px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; background: #222; }
        .cmd-btn { background: #eee; border: 2px solid #888; border-radius: 8px; font-weight: bold; font-size: 16px; }

        /* 封印演出 */
        #fusion-vortex { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, var(--fusion), transparent); display: none; z-index: 9500; align-items: center; justify-content: center; mix-blend-mode: screen; }
        .vortex-anim { width: 250px; height: 250px; border: 10px dashed #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg) scale(1.5); } to { transform: rotate(360deg) scale(0); } }
        #success-pop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 999999; }
        #pop-card { width: 210px; border: 5px solid #fff; border-radius: 8px; transform: scale(0); transition: 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.49); }
        #pop-card.show { transform: scale(1); }
    </style>
</head>
<body>

<div id="version-tag">Ver 0.9.0</div>

<div id="top-screen">
    <div class="title-logo">Yu-Gi-Oh! GO</div>
    <button class="start-btn" onclick="startGame()">闇のゲームを始める</button>
</div>

<div id="map"></div>
<div id="deck-btn-ui" class="ui-btn" onclick="alert('デッキ画面へ')">DECK</div>
<div id="gps-btn-ui" class="ui-btn" onclick="refreshGPS()">🛰️</div>

<div id="battle-screen">
    <div class="battle-stage">
        <div class="m-box">
            <div class="status-ui">
                <div id="w-name-label" style="border-bottom:1px solid #999; margin-bottom:3px; overflow:hidden;">野生</div>
                <div id="w-stat-label" style="font-size:9px;">Lv.1 ATK:0</div>
                <div class="hp-bar-bg"><div id="w-hp-fill" class="hp-bar-fill"></div></div>
                <div style="text-align:right; font-size:9px;">HP:<span id="w-hp-now">0</span> / <span id="w-hp-max">0</span></div>
            </div>
            <img id="w-img" class="battle-img" src="">
        </div>
        <div class="m-box">
            <div class="status-ui">
                <div id="p-name-label" style="border-bottom:1px solid #999; margin-bottom:3px; overflow:hidden;">自分</div>
                <div id="p-stat-label" style="font-size:9px;">Lv.1 ATK:0</div>
                <div class="hp-bar-bg"><div id="p-hp-fill" class="hp-bar-fill"></div></div>
                <div style="text-align:right; font-size:9px;">HP:<span id="p-hp-now">0</span> / <span id="p-hp-max">0</span></div>
            </div>
            <img id="p-img" class="battle-img" src="">
        </div>
    </div>
    <div id="msg-window"><div id="msg-text"></div></div>
    <div id="cmd-grid">
        <button class="cmd-btn" onclick="battleTurn('attack')">攻撃</button>
        <button class="cmd-btn" onclick="battleTurn('seal')">封印</button>
        <button class="cmd-btn" onclick="closeBattleUI()">逃げる</button>
        <button class="cmd-btn">交代</button>
    </div>
</div>

<div id="fusion-vortex"><div class="vortex-anim"></div></div>
<div id="success-pop" onclick="finishSeal()">
    <h1 style="color:var(--gold)">封印成功！！</h1>
    <img id="pop-card" src="">
    <p style="color:white; margin-top:10px;">タップしてマップへ</p>
</div>

<script>
    let map, bData = { p: null, e: null, busy: false }, currentMarker;
    let myDeck = JSON.parse(localStorage.getItem('myDeck') || '[{"name":"クリボー","id":40640057,"img":"https://images.ygoprodeck.com/images/cards/40640057.jpg","atk":300,"level":1,"count":1}]');

    // 厳選されたモンスターカードのみのプール（魔法・罠を排除）
    const monsterLib = [
        {name:"青眼の白龍", id:89631139, atk:3000}, {name:"ブラック・マジシャン", id:46986414, atk:2500},
        {name:"真紅眼の黒竜", id:74677422, atk:2400}, {name:"ブラック・マジシャン・ガール", id:38033121, atk:2000},
        {name:"デーモンの召喚", id:70781052, atk:2500}, {name:"バスター・ブレイダー", id:78193831, atk:2600},
        {name:"オシリスの天空竜", id:33731070, atk:4000}, {name:"オベリスクの巨神兵", id:13839129, atk:4000},
        {name:"ラーの翼神竜", id:10000010, atk:4000}, {name:"エルフの剣士", id:91152256, atk:1400},
        {name:"カオス・ソルジャー", id:54056941, atk:3000}, {name:"暗黒騎士ガイア", id:6382542, atk:2300},
        {name:"人造人間-サイコ・ショッカー", id:77585513, atk:2400}, {name:"封印されしエクゾディア", id:33396948, atk:1000}
    ];

    function startGame() {
        document.getElementById('top-screen').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('top-screen').style.display = 'none';
            document.getElementById('map').style.visibility = 'visible';
            initMap();
        }, 500);
    }

    function initMap() {
        if(map) return;
        navigator.geolocation.getCurrentPosition(pos => {
            map = L.map('map', {zoomControl:false, fadeAnimation: false}).setView([pos.coords.latitude, pos.coords.longitude], 17);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            setTimeout(() => { map.invalidateSize(); spawn(pos.coords.latitude, pos.coords.longitude); }, 200);
        });
    }

    function spawn(lat, lon) {
        map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });
        for(let i=0; i<15; i++) {
            let m = monsterLib[Math.floor(Math.random()*monsterLib.length)];
            let lv = Math.floor(Math.random()*5)+1;
            let marker = L.marker([lat+(Math.random()-0.5)*0.008, lon+(Math.random()-0.5)*0.008], {
                icon: L.icon({iconUrl: `https://images.ygoprodeck.com/images/cards_small/${m.id}.jpg`, iconSize:[45,45], className:'mon-chip'})
            }).addTo(map);
            marker.on('click', () => {
                const totalAtk = m.atk * lv;
                bData.e = { ...m, lv: lv, atk: totalAtk, hp: totalAtk, max: totalAtk, img: `https://images.ygoprodeck.com/images/cards/${m.id}.jpg` };
                bData.p = { ...myDeck[0], hp: myDeck[0].atk, max: myDeck[0].atk };
                currentMarker = marker;
                document.getElementById('battle-screen').style.display = 'flex';
                updateUI();
                document.getElementById('msg-text').innerText = `${bData.e.name} (Lv.${lv}) が現れた！`;
            });
        }
    }

    function updateUI() {
        const set = (p, d) => {
            document.getElementById(`${p}-name-label`).innerText = d.name;
            document.getElementById(`${p}-stat-label`).innerText = `Lv.${d.lv || d.level || 1} ATK:${d.atk}`;
            document.getElementById(`${p}-hp-now`).innerText = Math.floor(d.hp);
            document.getElementById(`${p}-hp-max`).innerText = Math.floor(d.max);
            const fill = document.getElementById(`${p}-hp-fill`);
            fill.style.width = (d.hp/d.max*100) + '%';
            fill.classList.toggle('hp-danger', (d.hp/d.max) <= 0.3);
            document.getElementById(`${p}-img`).src = d.img;
        };
        set('w', bData.e); set('p', bData.p);
    }

    async function battleTurn(act) {
        if(bData.busy) return; bData.busy = true;
        if(act === 'attack') {
            document.getElementById('msg-text').innerText = `${bData.p.name}の攻撃！`;
            await new Promise(r => setTimeout(r, 600));
            bData.e.hp = Math.max(0, bData.e.hp - bData.p.atk);
            updateUI();
            if(bData.e.hp <= 0) { document.getElementById('msg-text').innerText = "封印チャンス！"; bData.busy = false; return; }
        } else if(act === 'seal') {
            document.getElementById('fusion-vortex').style.display = 'flex';
            await new Promise(r => setTimeout(r, 1200));
            document.getElementById('fusion-vortex').style.display = 'none';
            if(Math.random() > (bData.e.hp/bData.e.max)) {
                document.getElementById('pop-card').src = bData.e.img;
                document.getElementById('success-pop').style.display = 'flex';
                setTimeout(() => document.getElementById('pop-card').classList.add('show'), 100);
                saveCapture(bData.e); return;
            }
            document.getElementById('msg-text').innerText = "失敗！";
        }
        await new Promise(r => setTimeout(r, 800));
        document.getElementById('msg-text').innerText = `${bData.e.name}の反撃！`;
        bData.p.hp = Math.max(0, bData.p.hp - (bData.e.atk*0.4));
        updateUI();
        if(bData.p.hp <= 0) { alert("敗北..."); closeBattleUI(); }
        bData.busy = false;
    }

    function saveCapture(m) {
        let deck = JSON.parse(localStorage.getItem('myDeck') || '[]');
        let exist = deck.find(d => d.id === m.id);
        if(exist) exist.count++; else deck.push({...m, count:1, level:1, uid:Date.now()});
        localStorage.setItem('myDeck', JSON.stringify(deck));
    }

    function finishSeal() { document.getElementById('success-pop').style.display = 'none'; if(currentMarker) map.removeLayer(currentMarker); closeBattleUI(); }
    function closeBattleUI() { document.getElementById('battle-screen').style.display = 'none'; bData.busy = false; setTimeout(() => map.invalidateSize(), 200); }
    function refreshGPS() { navigator.geolocation.getCurrentPosition(pos => { map.setView([pos.coords.latitude, pos.coords.longitude]); spawn(pos.coords.latitude, pos.coords.longitude); }); }
    window.onload = () => { /* ページ読み込み時に何もしない、スタートボタン待ち */ };
</script>
</body>
</html>
