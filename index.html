<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yu-Gi-Oh! GO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gold: #ffd700; --cyan: #00ffff; --red: #ff4d4d; --green: #2ecc71; --fusion: #8e44ad; --bg: #050510; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; color: white; }
        #version-tag { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.6); font-size: 10px; color: #aaa; z-index: 5000; padding: 2px 5px; border-radius: 3px; }
        
        /* マップ設定（軽量化） */
        #map { width: 100%; height: 100%; position: absolute; z-index: 1; outline: none; background: #000; }
        .monster-icon { filter: drop-shadow(0 0 5px var(--gold)); border-radius: 4px; border: none !important; }

        /* UIボタン */
        .ui-btn { position: fixed; width: 65px; height: 65px; background: rgba(0,0,0,0.85); border: 2px solid var(--gold); border-radius: 50%; color: var(--gold); font-weight: bold; z-index: 1000; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--gold); }
        #deck-btn-ui { bottom: 30px; left: 20px; }
        #gps-btn-ui { bottom: 30px; right: 20px; font-size: 24px; }

        /* --- デッキ画面：最前面 --- */
        #deck-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: none; flex-direction: column; z-index: 99999; padding: 20px; box-sizing: border-box; }
        .deck-header { display: flex; align-items: center; justify-content: space-around; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 2px solid var(--cyan); margin-bottom: 15px; }
        .main-card-img { width: 120px; border: 2px solid var(--gold); border-radius: 5px; box-shadow: 0 0 15px var(--cyan); }
        .deck-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; overflow-y: auto; flex: 1; }
        .card-box { border: 1px solid #444; padding: 5px; text-align: center; position: relative; background: #111; }
        .card-box.selected { border: 2px solid var(--gold); background: rgba(255,215,0,0.1); }
        .card-box img { width: 100%; border-radius: 2px; }

        /* --- バトル画面 --- */
        #battle-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a3e, #000); display: none; flex-direction: column; z-index: 9000; }
        .battle-stage { flex: 2; position: relative; display: flex; flex-direction: column; justify-content: space-between; padding: 50px 20px; }
        .status-ui { position: absolute; width: 170px; background: rgba(255,255,255,0.95); border: 2px solid #333; padding: 6px; border-radius: 8px; color: #111; font-size: 11px; z-index: 9100; font-weight: bold; }
        .status-ui.wild { top: 0; left: -180px; border-left: 5px solid var(--gold); }
        .status-ui.player { bottom: 0; right: -180px; border-right: 5px solid var(--cyan); }
        .hp-bg { width: 100%; height: 10px; background: #ccc; border-radius: 5px; overflow: hidden; margin-top: 4px; border: 1px solid #777; }
        .hp-bar { height: 100%; background: var(--green); width: 100%; transition: width 0.3s, background 0.3s; }
        .hp-bar.danger { background: var(--red); }

        /* --- 封印演出レイヤー --- */
        #fusion-vortex { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, var(--fusion), transparent); display: none; z-index: 9500; align-items: center; justify-content: center; mix-blend-mode: screen; }
        .vortex-anim { width: 300px; height: 300px; border: 12px dashed #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg) scale(1.5); } to { transform: rotate(360deg) scale(0); } }

        #success-pop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 99999; }
        #pop-card { width: 230px; border: 5px solid #fff; border-radius: 10px; transform: scale(0); transition: 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.49); box-shadow: 0 0 40px #fff; }
        #pop-card.show { transform: scale(1); }

        #msg-window { height: 70px; background: #fff; color: #111; margin: 10px; border: 4px solid #555; border-radius: 10px; display: flex; align-items: center; justify-content: center; text-align: center; font-weight: bold; }
        #cmd-grid { height: 120px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; background: #222; }
        .cmd-btn { background: #eee; border: 2px solid #888; border-radius: 8px; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

<div id="version-tag">Ver 0.8.6</div>
<div id="map"></div>
<div id="deck-btn-ui" class="ui-btn" onclick="openDeck()">DECK</div>
<div id="gps-btn-ui" class="ui-btn" onclick="refreshGPS()">🛰️</div>

<div id="deck-screen">
    <h3 style="text-align:center; color:var(--gold);">DUELIST DECK</h3>
    <div class="deck-header">
        <div style="text-align:center;">
            <img id="main-mon-img" class="main-card-img" src="">
            <div id="main-mon-stat" style="font-size:12px; margin-top:5px; font-weight:bold;"></div>
        </div>
        <div style="display:flex; flex-direction:column; gap:10px;">
            <button onclick="executeSwap()" style="background:var(--cyan); border:none; padding:10px; border-radius:5px; font-weight:bold;">🔄 交代</button>
            <button onclick="executeEnhance()" style="background:var(--gold); border:none; padding:10px; border-radius:5px; font-weight:bold;">⚡ 強化</button>
        </div>
    </div>
    <div id="deck-grid" class="deck-grid"></div>
    <button onclick="closeDeck()" style="width:100%; padding:15px; background:#444; border:none; border-radius:10px; margin-top:10px; font-weight:bold;">戻る</button>
</div>

<div id="battle-screen">
    <div class="battle-stage">
        <div class="m-box wild">
            <div class="status-ui wild">
                <div id="w-name">野生</div>
                <div id="w-stat">ATK:0</div>
                <div class="hp-bg"><div id="w-hp-bar" class="hp-bar"></div></div>
                <div style="text-align:right; font-size:10px;">HP: <span id="w-hp-now">0</span> / <span id="w-hp-max">0</span></div>
            </div>
            <img id="w-img" class="battle-img" src="">
        </div>
        <div class="m-box player">
            <div class="status-ui player">
                <div id="p-name">自分</div>
                <div id="p-stat">ATK:0</div>
                <div class="hp-bg"><div id="p-hp-bar" class="hp-bar"></div></div>
                <div style="text-align:right; font-size:10px;">HP: <span id="p-hp-now">0</span> / <span id="p-hp-max">0</span></div>
            </div>
            <img id="p-img" class="battle-img" src="">
        </div>
    </div>
    <div id="msg-window"><div id="msg-text"></div></div>
    <div id="cmd-grid">
        <button class="btn-ctrl cmd-btn" onclick="battleTurn('attack')">攻撃</button>
        <button class="btn-ctrl cmd-btn" onclick="battleTurn('seal')">封印</button>
        <button class="btn-ctrl cmd-btn" onclick="location.reload()">逃げる</button>
        <button class="btn-ctrl cmd-btn" onclick="openDeck()">交代</button>
    </div>
</div>

<div id="fusion-vortex"><div class="vortex-anim"></div></div>
<div id="success-pop" onclick="finishAll()">
    <h1 style="color:var(--gold); text-shadow:0 0 10px #f00;">封印成功！！</h1>
    <img id="pop-card" src="">
    <p style="color:white; margin-top:15px;">タップしてマップへ</p>
</div>

<script>
    let map, bData = { p: null, e: null, busy: false }, currentMarker;
    let myDeck = JSON.parse(localStorage.getItem('myDeck') || '[{"name":"クリボー","id":40640057,"img":"https://images.ygoprodeck.com/images/cards/40640057.jpg","atk":300,"level":1,"count":1}]');
    let selectedIdx = -1;

    const monsterPool = [89631139, 46986414, 74677422, 38033121, 70781052, 91152256, 13839129, 33731070, 10000010, 33396948, 78193831, 77585513, 6382542, 28279543];

    function init() {
        navigator.geolocation.getCurrentPosition(pos => {
            const lat = pos.coords.latitude, lon = pos.coords.longitude;
            map = L.map('map', {zoomControl:false, fadeAnimation: false}).setView([lat, lon], 17);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            spawn(lat, lon);
        });
    }

    function spawn(lat, lon) {
        map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });
        for(let i=0; i<15; i++) {
            let id = monsterPool[Math.floor(Math.random()*monsterPool.length)];
            let lv = Math.floor(Math.random()*5)+1;
            let marker = L.marker([lat+(Math.random()-0.5)*0.008, lon+(Math.random()-0.5)*0.008], {
                icon: L.icon({iconUrl: `https://images.ygoprodeck.com/images/cards_small/${id}.jpg`, iconSize:[45,65]})
            }).addTo(map);
            marker.on('click', () => {
                bData.e = { id, atk: 500*lv, hp: 500*lv, maxHp: 500*lv, lv, img: `https://images.ygoprodeck.com/images/cards/${id}.jpg` };
                bData.p = { ...myDeck[0], hp: myDeck[0].atk*2, maxHp: myDeck[0].atk*2 };
                currentMarker = marker;
                document.getElementById('battle-screen').style.display = 'flex';
                updateBattleUI();
                setMsg("モンスターが現れた！");
            });
        }
    }

    function updateBattleUI() {
        const update = (p, d) => {
            document.getElementById(`${p}-stat`).innerText = `Lv.${d.lv||1} ATK:${d.atk}`;
            document.getElementById(`${p}-hp-now`).innerText = Math.floor(d.hp);
            document.getElementById(`${p}-hp-max`).innerText = Math.floor(d.maxHp);
            const bar = document.getElementById(`${p}-hp-bar`);
            const per = (d.hp/d.maxHp)*100;
            bar.style.width = per + '%';
            bar.classList.toggle('danger', per <= 30);
            document.getElementById(`${p}-img`).src = d.img;
        };
        update('w', bData.e); update('p', bData.p);
    }

    function setMsg(t) { document.getElementById('msg-text').innerText = t; }

    async function battleTurn(act) {
        if(bData.busy) return; bData.busy = true;
        if(act === 'attack') {
            setMsg("攻撃！");
            await new Promise(r => setTimeout(r, 600));
            bData.e.hp = Math.max(0, bData.e.hp - bData.p.atk);
            updateBattleUI();
            if(bData.e.hp <= 0) { setMsg("封印チャンス！"); bData.busy = false; return; }
        } else {
            document.getElementById('fusion-vortex').style.display = 'flex';
            await new Promise(r => setTimeout(r, 1200));
            document.getElementById('fusion-vortex').style.display = 'none';
            if(Math.random() > (bData.e.hp/bData.e.maxHp)) {
                document.getElementById('pop-card').src = bData.e.img;
                document.getElementById('success-pop').style.display = 'flex';
                setTimeout(() => document.getElementById('pop-card').classList.add('show'), 100);
                let exist = myDeck.find(d => d.id === bData.e.id);
                if(exist) exist.count++; else myDeck.push({...bData.e, count:1});
                localStorage.setItem('myDeck', JSON.stringify(myDeck));
                return;
            }
            setMsg("失敗！");
        }
        await new Promise(r => setTimeout(r, 800));
        bData.p.hp = Math.max(0, bData.p.hp - (bData.e.atk*0.5));
        updateBattleUI();
        if(bData.p.hp <= 0) { alert("敗北..."); location.reload(); }
        bData.busy = false;
    }

    function openDeck() { document.getElementById('deck-screen').style.display = 'flex'; renderDeck(); }
    function renderDeck() {
        const main = myDeck[0];
        document.getElementById('main-mon-img').src = main.img;
        document.getElementById('main-mon-stat').innerText = `ATK:${main.atk} (Lv.${main.level||1})`;
        const grid = document.getElementById('deck-grid'); grid.innerHTML = '';
        myDeck.forEach((m, i) => {
            if(i === 0) return;
            grid.innerHTML += `<div class="card-box ${selectedIdx === i ? 'selected' : ''}" onclick="selectedIdx=${i};renderDeck();">
                ${m.count>1?`<div class="stock-badge">×${m.count}</div>`:''}<img src="https://images.ygoprodeck.com/images/cards_small/${m.id}.jpg"></div>`;
        });
    }
    function executeSwap() {
        if(selectedIdx === -1) return;
        const [target] = myDeck.splice(selectedIdx, 1); myDeck.unshift(target);
        saveDeck(); alert("交代しました！");
    }
    function executeEnhance() {
        if(selectedIdx === -1) return;
        myDeck[0].atk += Math.floor(myDeck[selectedIdx].atk * 0.05);
        myDeck[selectedIdx].count--;
        if(myDeck[selectedIdx].count <= 0) myDeck.splice(selectedIdx, 1);
        saveDeck(); alert("強化完了！");
    }
    function saveDeck() { localStorage.setItem('myDeck', JSON.stringify(myDeck)); selectedIdx = -1; renderDeck(); }
    function finishAll() { document.getElementById('success-pop').style.display = 'none'; document.getElementById('battle-screen').style.display = 'none'; if(currentMarker) map.removeLayer(currentMarker); }
    function closeDeck() { document.getElementById('deck-screen').style.display = 'none'; }
    function refreshGPS() { navigator.geolocation.getCurrentPosition(pos => { map.setView([pos.coords.latitude, pos.coords.longitude]); spawn(pos.coords.latitude, pos.coords.longitude); }); }
    window.onload = init;
</script>
</body>
</html>
