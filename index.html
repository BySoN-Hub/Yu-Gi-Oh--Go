<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yu-Gi-Oh! GO</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #battle-screen {
            width: 100%;
            max-width: 400px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .monster-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .status-window {
            background: white;
            color: black;
            padding: 10px;
            border-radius: 5px;
            width: 150px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        .hp-bar-container {
            width: 100%;
            height: 8px;
            background: #eee;
            margin: 5px 0;
            border-radius: 4px;
            overflow: hidden;
        }

        .hp-bar {
            height: 100%;
            background: #2ecc71;
            transition: width 0.3s;
        }

        .monster-card {
            width: 140px;
            border-radius: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.7);
        }

        #message-box {
            background: white;
            color: black;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            margin: 10px 0;
            min-height: 50px;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 15px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background: #f0f0f0;
            color: #333;
        }

        button:active {
            background: #ccc;
        }
    </style>
</head>
<body>

<div id="battle-screen">
    <div class="monster-container">
        <div id="enemy-status" class="status-window"></div>
        <img id="enemy-img" class="monster-card" src="" alt="Enemy">
    </div>

    <div class="monster-container" style="flex-direction: row-reverse;">
        <div id="player-status" class="status-window"></div>
        <img id="player-img" class="monster-card" src="" alt="Player">
    </div>

    <div id="message-box">野生のモンスターが現れた！</div>

    <div class="controls">
        <button onclick="attack()">攻撃</button>
        <button>封印</button>
        <button>逃げる</button>
        <button>交代</button>
    </div>
</div>

<script>
    // モンスターデータ（例）
    const enemy = {
        name: "DARK MAGICIAN GIRL",
        level: 6,
        atk: 2000,
        img: "https://limitlesscards.com/wp-content/uploads/2024/02/Dark-Magician-Girl-LART-EN019-Ultra-Rare.png"
    };

    const player = {
        name: "BUSTER BLADER",
        level: 7,
        atk: 2600,
        img: "https://images.ygoprodeck.com/images/cards/78193831.jpg"
    };

    function updateDisplay() {
        // 野生（エネミー）側の表示更新
        const enemyStatus = document.getElementById('enemy-status');
        enemyStatus.innerHTML = `
            <div style="font-weight:bold; margin-bottom:5px;">${enemy.name} Lv.${enemy.level}</div>
            <div style="font-size:0.8em;">ATK: ${enemy.atk}</div>
            <div class="hp-bar-container">
                <div class="hp-bar" style="width: 100%;"></div>
            </div>
            <div style="text-align:right; font-size:0.8em;">HP: ${enemy.atk}</div>
        `;
        document.getElementById('enemy-img').src = enemy.img;

        // 自分（プレイヤー）側の表示更新
        const playerStatus = document.getElementById('player-status');
        playerStatus.innerHTML = `
            <div style="font-weight:bold; margin-bottom:5px;">${player.name} Lv.${player.level}</div>
            <div style="font-size:0.8em;">ATK: ${player.atk}</div>
            <div class="hp-bar-container">
                <div class="hp-bar" style="width: 100%;"></div>
            </div>
            <div style="text-align:right; font-size:0.8em;">HP: ${player.atk}</div>
        `;
        document.getElementById('player-img').src = player.img;
    }

    function attack() {
        document.getElementById('message-box').innerText = `${player.name} の攻撃！`;
    }

    // 初回実行
    updateDisplay();
</script>

</body>
</html>
