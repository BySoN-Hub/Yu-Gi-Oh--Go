<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Yu-Gi-Oh! GO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gold: #ffd700; --cyan: #00ffff; --bg: #050510; --fusion: #8e44ad; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; overflow: hidden; height: 100dvh; color: white; }
        #map { width: 100%; height: 100%; position: absolute; z-index: 1; background: #000; }
        .ui-btn { position: fixed; width: 60px; height: 60px; background: rgba(0,0,0,0.85); border: 2px solid var(--gold); border-radius: 50%; color: var(--gold); z-index: 500; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; box-shadow: 0 0 10px var(--gold); }
        #deck-btn { bottom: 30px; left: 20px; }
        #scan-btn { bottom: 30px; right: 20px; overflow: hidden; }
        #scan-btn img { width: 80%; height: 80%; object-fit: contain; }

        /* ホーム画面：背景画像を main-vis.png に設定（Ver 1.5.4） */
        #top-screen { 
            position: fixed; inset: 0; 
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('main-vis.png');
            background-size: cover; background-position: center;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9000; 
        }
        .start-btn { padding: 15px 40px; background: rgba(0,0,0,0.7); color: var(--gold); border: 2px solid var(--gold); border-radius: 30px; font-size: 18px; cursor: pointer; font-weight: bold; }

        /* バトル共通 */
        .overlay { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; z-index: 8000; padding: 20px; }
        .mon-icon { border: 2px solid var(--gold); border-radius: 4px; background: #000; }

        /* 迫力の封印エフェクト（Ver 1.5.4 強化版） */
        #fusion-vortex { 
            position: absolute; top: 50%; left: 50%; width: 300px; height: 300px; 
            transform: translate(-50%, -50%); display: none; z-index: 1000; pointer-events: none; 
        }
        .vortex-anim { 
            width: 100%; height: 100%; 
            border: 25px dashed var(--fusion); /* 太さを3倍に */
            border-radius: 50%; 
            animation: spin-v 1.2s forwards cubic-bezier(0.1, 0.7, 0.1, 1); /* 時間を長く、緩急をつける */
            box-shadow: 0 0 80px var(--fusion), inset 0 0 50px var(--fusion); /* グロウ効果を強化 */
            box-sizing: border-box;
        }
        @keyframes spin-v { 
            from { transform: rotate(0deg) scale(3.5); opacity: 0.9; } 
            to { transform: rotate(1440deg) scale(0); opacity: 0; } /* 回転数を4倍に */
        }
        .sucking { transform: scale(0) rotate(1440deg) !important; opacity: 0 !important; transition: all 1.2s ease-in; }

    </style>
</head>
<body>

<div id="top-screen">
    <h1 style="color:var(--gold); font-style:italic; text-shadow: 0 0 15px #f00;">Yu-Gi-Oh! GO</h1>
    <button class="start-btn" onclick="initGame()">探索開始</button>
</div>

<div id="map"></div>

<div id="deck-btn" class="ui-btn" style="display:none;" onclick="alert('デッキ機能はVer 1.5.0ベースのため調整中')">DECK</div>
<div id="scan-btn" class="ui-btn" style="display:none;" onclick="alert('スキャン機能はVer 1.5.0ベースのため調整中')">
    <img src="https://images.ygoprodeck.com/images/cards_small/60750341.jpg">
</div>

<script>
    let map;
    const monsterLib = [
        {id:89631139, name:"青眼の白龍"}, {id:46986414, name:"ブラック・マジシャン"},
        {id:74677422, name:"真紅眼の黒竜"}
    ];

    function initGame() {
        document.getElementById('top-screen').style.display = 'none';
        navigator.geolocation.getCurrentPosition(pos => {
            const {latitude: lat, longitude: lon} = pos.coords;
            map = L.map('map', {zoomControl: false}).setView([lat, lon], 16);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            document.getElementById('deck-btn').style.display = 'flex';
            document.getElementById('scan-btn').style.display = 'flex';
            spawn(lat, lon);
        });
    }

    function spawn(lat, lon) {
        for(let i=0; i<15; i++) {
            let m = monsterLib[Math.floor(Math.random()*monsterLib.length)];
            const icon = L.divIcon({ html: `<img src="https://images.ygoprodeck.com/images/cards_small/${m.id}.jpg" class="mon-icon" style="width:40px;">`, iconSize: [40, 40] });
            L.marker([lat+(Math.random()-0.5)*0.01, lon+(Math.random()-0.5)*0.01], {icon: icon}).addTo(map);
        }
    }
</script>
</body>
</html>
