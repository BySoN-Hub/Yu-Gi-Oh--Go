<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yu-Gi-Oh! GO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gold: #ffd700; --cyan: #00ffff; --red: #ff4d4d; --fusion: #8e44ad; }
        body { margin: 0; padding: 0; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; color: white; }
        #map { width: 100%; height: 100%; position: absolute; z-index: 1; }
        
        /* --- バトル画面 --- */
        #battle-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a3e, #000);
            display: none; flex-direction: column; z-index: 2000;
        }
        .battle-stage { flex: 2; position: relative; display: flex; flex-direction: column; justify-content: space-between; padding: 40px 20px; }
        .m-box { width: 45%; text-align: center; position: relative; }
        .m-box.wild { align-self: flex-end; }
        .m-box.player { align-self: flex-start; }
        .battle-img { width: 110px; border-radius: 5px; border: 2px solid #555; background: #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        /* ステータスバー（被り回避のため位置調整） */
        .s-bar { position: absolute; width: 160px; background: rgba(255,255,255,0.95); border: 2px solid #333; padding: 6px; border-radius: 10px 0 10px 0; color: #111; font-weight: bold; font-size: 13px; z-index: 10; }
        .s-bar.wild { top: -20px; left: -100px; } /* アイコンの左上に配置 */
        .s-bar.player { bottom: -20px; right: -100px; } /* アイコンの右下に配置 */
        .hp-bg { width: 100%; height: 10px; background: #ccc; border-radius: 5px; margin-top: 5px; border: 1px solid #666; overflow: hidden; }
        .hp-fill { height: 100%; background: #2ecc71; width: 100%; transition: width 0.5s, background 0.3s; }
        .hp-low { background: var(--red) !important; } /* 3割以下の赤 */

        /* 下部UI */
        #msg-window { height: 70px; background: #fff; color: #111; margin: 10px; border: 4px solid #555; border-radius: 10px; padding: 10px; font-size: 1rem; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        #cmd-grid { height: 110px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; background: #222; }
        .cmd-btn { background: linear-gradient(#eee, #ccc); border: 2px solid #666; color: #111; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer; }

        /* --- 派手な演出用 --- */
        #fusion-vortex { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, var(--fusion), transparent); display: none; z-index: 3000; align-items: center; justify-content: center; mix-blend-mode: screen; }
        .vortex-anim { width: 400px; height: 400px; border: 15px dashed #fff; border-radius: 50%; animation: rotate 0.8s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg) scale(1.5); opacity: 1; } to { transform: rotate(360deg) scale(0); opacity: 0; } }
        
        #success-pop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 4000; }
        #pop-card { width: 250px; border: 5px solid #fff; border-radius: 10px; transform: scale(0); transition: 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.49); box-shadow: 0 0 50px #fff; }
        #pop-card.show { transform: scale(1); }

        #deck-btn { position: fixed; bottom: 20px; left: 20px; width: 60px; height: 60px; background: rgba(0,0,0,0.8); border: 2px solid var(--gold); border-radius: 50%; color: var(--gold); font-weight: bold; z-index: 1000; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="deck-btn" onclick="openDeck()">DECK</div>

<div id="battle-screen">
    <div class="battle-stage">
        <div class="m-box wild">
            <div class="s-bar wild">
                <div id="w-name">野生</div>
                <div class="hp-bg"><div id="w-hp-bar" class="hp-fill"></div></div>
            </div>
            <img id="w-img" class="battle-img" src="">
        </div>
        <div class="m-box player">
            <div class="s-bar player">
                <div id="p-name">自分</div>
                <div class="hp-bg"><div id="p-hp-bar" class="hp-fill"></div></div>
            </div>
            <img id="p-img" class="battle-img" src="">
        </div>
    </div>
    <div id="msg-window"><div id="msg-text"></div></div>
    <div id="cmd-grid">
        <button id="btn-atk" class="cmd-btn" onclick="handleTurn('attack')">攻撃</button>
        <button id="btn-seal" class="cmd-btn" onclick="handleTurn('seal')">封印</button>
        <button class="cmd-btn" onclick="location.reload()">逃げる</button>
        <button class="cmd-btn" onclick="openDeck()">交代</button>
    </div>
</div>

<div id="fusion-vortex"><div class="vortex-anim"></div></div>
<div id="success-pop" onclick="location.reload()">
    <h1 style="color:var(--gold); text-shadow: 0 0 20px #f00; font-size: 3rem; margin-bottom: 20px;">封印成功！！</h1>
    <img id="pop-card" src="">
    <h2 style="margin-top:20px; color:white;">ガッチャ！楽しいデュエルだったぜ！</h2>
    <p style="color:#aaa;">(画面タップでマップへ戻る)</p>
</div>

<script>
    let map, currentMarker;
    let myDeck = JSON.parse(localStorage.getItem('myDeck') || '[{"name":"クリボー","img":"https://images.ygoprodeck.com/images/cards/40640057.jpg","atk":300,"hp":100,"maxHp":100,"level":1,"uid":1,"count":1}]');
    let bData = { p: null, e: null, busy: false };

    // 位置情報取得
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            map = L.map('map', {zoomControl:false}).setView([pos.coords.latitude, pos.coords.longitude], 17);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            L.circleMarker([pos.coords.latitude, pos.coords.longitude], {color:'#00ffff', radius:8}).addTo(map);
            spawn(pos.coords.latitude, pos.coords.longitude);
        });
    }

    function spawn(lat, lon) {
        const pool = [
            {name:"青眼の白龍", img:"https://images.ygoprodeck.com/images/cards/89631139.jpg", atk:3000},
            {name:"ブラック・マジシャン", img:"https://images.ygoprodeck.com/images/cards/46986414.jpg", atk:2500},
            {name:"真紅眼の黒竜", img:"https://images.ygoprodeck.com/images/cards/74677422.jpg", atk:2400}
        ];
        for(let i=0; i<12; i++) {
            let m = pool[Math.floor(Math.random()*pool.length)];
            let marker = L.marker([lat+(Math.random()-0.5)*0.006, lon+(Math.random()-0.5)*0.006], {
                icon: L.icon({iconUrl: m.img, iconSize:[50,70]})
            }).addTo(map);
            marker.on('click', () => {
                bData.e = {...m, hp: 100, max: 100};
                bData.p = {...myDeck[0], hp: 100, max: 100};
                currentMarker = marker;
                document.getElementById('battle-screen').style.display = 'flex';
                updateUI();
                setMsg(`野生の ${m.name} が 現れた！`);
            });
        }
    }

    function updateUI() {
        const wFill = document.getElementById('w-hp-bar');
        const pFill = document.getElementById('p-hp-bar');
        
        document.getElementById('w-name').innerText = bData.e.name;
        document.getElementById('w-img').src = bData.e.img;
        let wPer = (bData.e.hp / bData.e.max) * 100;
        wFill.style.width = wPer + '%';
        wFill.classList.toggle('hp-low', wPer <= 30); // 30%以下で赤

        document.getElementById('p-name').innerText = bData.p.name;
        document.getElementById('p-img').src = bData.p.img;
        let pPer = (bData.p.hp / bData.p.max) * 100;
        pFill.style.width = pPer + '%';
        pFill.classList.toggle('hp-low', pPer <= 30); // 30%以下で赤
    }

    function setMsg(t) { document.getElementById('msg-text').innerText = t; }

    async function handleTurn(act) {
        if(bData.busy) return;
        bData.busy = true;
        
        if(act === 'attack') {
            setMsg(`${bData.p.name} の こうげき！`);
            await wait(800);
            bData.e.hp = Math.max(0, bData.e.hp - 40);
            updateUI();
            if(bData.e.hp <= 0) { setMsg("封印のチャンスだ！"); bData.busy = false; return; }
        } else {
            document.getElementById('fusion-vortex').style.display = 'flex';
            setMsg("封印カードを展開！");
            await wait(1500);
            document.getElementById('fusion-vortex').style.display = 'none';
            if(Math.random() > (bData.e.hp/130)) {
                success(bData.e);
                return;
            }
            setMsg("失敗！封印しきれない！");
        }

        await wait(800);
        setMsg(`${bData.e.name} の 反撃！`);
        bData.p.hp = Math.max(0, bData.p.hp - 25);
        updateUI();
        if(bData.p.hp <= 0) { setMsg("力尽きた..."); await wait(1000); location.reload(); }
        bData.busy = false;
    }

    function success(m) {
        const pop = document.getElementById('success-pop');
        const card = document.getElementById('pop-card');
        card.src = m.img;
        pop.style.display = 'flex';
        setTimeout(() => card.classList.add('show'), 100);
        
        let deck = JSON.parse(localStorage.getItem('myDeck') || '[]');
        let exist = deck.find(d => d.name === m.name);
        if(exist) exist.count++;
        else deck.push({...m, count:1, level:1, uid:Date.now()});
        localStorage.setItem('myDeck', JSON.stringify(deck));
    }

    function wait(ms) { return new Promise(r => setTimeout(r, ms)); }
    function openDeck() { alert("デッキ画面へ(既存のロジックを呼び出し)"); }
</script>
</body>
</html>
