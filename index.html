<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yu-Gi-Oh! GO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gold: #ffd700; --cyan: #00ffff; --red: #ff4d4d; --fusion: #8e44ad; --bg: #050510; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; overflow: hidden; height: 100vh; color: white; }
        
        #version-tag { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.6); font-size: 10px; color: #aaa; z-index: 5000; padding: 2px 5px; border-radius: 3px; pointer-events: none; }
        #map { width: 100%; height: 100%; position: absolute; z-index: 1; }
        
        /* UIボタン */
        .ui-btn { position: fixed; width: 65px; height: 65px; background: rgba(0,0,0,0.85); border: 2px solid var(--gold); border-radius: 50%; color: var(--gold); font-weight: bold; z-index: 1000; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px var(--gold); }
        #deck-btn { bottom: 30px; left: 20px; }
        #gps-btn { bottom: 30px; right: 20px; font-size: 24px; }

        /* --- デッキ画面（階層レイアウト復元） --- */
        #deck-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: none; flex-direction: column; z-index: 9999; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .main-mon-area { display: flex; align-items: center; justify-content: space-around; background: rgba(255,255,255,0.08); padding: 15px; border-radius: 12px; border: 2px solid var(--cyan); margin-bottom: 15px; }
        .main-card-big { width: 130px; border: 2px solid var(--gold); border-radius: 5px; box-shadow: 0 0 15px var(--cyan); }
        .sub-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; flex: 1; }
        .card-box { border: 1px solid #444; padding: 4px; text-align: center; position: relative; background: #111; }
        .card-box.selected { border: 2px solid var(--gold); background: rgba(255,215,0,0.1); }
        .card-box img { width: 100%; }
        .stock-badge { position: absolute; top: -5px; right: -5px; background: var(--red); padding: 1px 5px; border-radius: 10px; font-size: 10px; border: 1px solid #fff; }

        /* --- バトル画面 --- */
        #battle-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a3e, #000); display: none; flex-direction: column; z-index: 9000; }
        .battle-stage { flex: 2; position: relative; display: flex; flex-direction: column; justify-content: space-between; padding: 50px 20px; }
        .status-ui { position: absolute; width: 160px; background: rgba(255,255,255,0.95); border: 2px solid #333; padding: 5px; border-radius: 8px; color: #111; font-size: 11px; z-index: 9100; font-weight: bold; }
        .status-ui.wild { top: 0; left: -170px; border-left: 5px solid var(--gold); }
        .status-ui.player { bottom: 0; right: -170px; border-right: 5px solid var(--cyan); }
        .hp-bar-fill { height: 8px; background: #2ecc71; width: 100%; transition: width 0.4s; border-radius: 4px; }

        /* 封印演出（紫） */
        #fusion-vortex { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, var(--fusion), transparent); display: none; z-index: 9500; align-items: center; justify-content: center; mix-blend-mode: screen; }
        .vortex-anim { width: 300px; height: 300px; border: 12px dashed #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg) scale(1.5); } to { transform: rotate(360deg) scale(0); } }

        #success-pop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        #pop-card { width: 220px; border: 4px solid #fff; border-radius: 10px; transform: scale(0); transition: 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.49); }

        #msg-window { height: 70px; background: #fff; color: #111; margin: 10px; border: 4px solid #555; border-radius: 10px; padding: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; text-align: center; }
        #cmd-grid { height: 120px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; background: #222; }
        .cmd-btn { background: #eee; border: 2px solid #888; border-radius: 8px; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

<div id="version-tag">Ver 0.8.4</div>
<div id="map"></div>

<div id="deck-btn" class="ui-btn" onclick="openDeck()">DECK</div>
<div id="gps-btn" class="ui-btn" onclick="refreshGPS()">🛰️</div>

<div id="deck-screen">
    <h3 style="text-align:center; color:var(--gold); margin:0 0 10px 0;">DUELIST DECK</h3>
    <div class="main-mon-area">
        <div style="text-align:center;">
            <img id="main-mon-img" class="main-card-big" src="">
            <div id="main-mon-name" style="font-size:12px; margin-top:5px; font-weight:bold;"></div>
        </div>
        <div style="display:flex; flex-direction:column; gap:10px;">
            <button onclick="executeSwap()" style="background:var(--cyan); border:none; padding:10px; border-radius:5px; font-weight:bold;">🔄 交換</button>
            <button onclick="executeEnhance()" style="background:var(--gold); border:none; padding:10px; border-radius:5px; font-weight:bold;">⚡ 強化</button>
        </div>
    </div>
    <div style="font-size:13px; color:#aaa; margin-bottom:10px;">控えモンスター</div>
    <div id="deck-grid" class="sub-grid"></div>
    <button onclick="closeDeck()" style="width:100%; padding:15px; background:#444; color:white; border:none; border-radius:10px; margin-top:15px; font-weight:bold;">閉じる</button>
</div>

<div id="battle-screen">
    <div class="battle-stage">
        <div style="align-self: flex-end; position: relative; width: 110px;">
            <div class="status-ui wild">
                <div id="w-name-val">野生</div>
                <div id="w-status-val">Lv.1 ATK:0</div>
                <div style="height:8px; background:#ccc; border-radius:4px; overflow:hidden; margin-top:3px;"><div id="w-hp-bar" class="hp-bar-fill"></div></div>
                <div style="text-align:right; font-size:9px;">HP: <span id="w-hp-val">0</span></div>
            </div>
            <img id="w-img" style="width:100%; border:2px solid #555;" src="">
        </div>
        <div style="align-self: flex-start; position: relative; width: 110px;">
            <div class="status-ui player">
                <div id="p-name-val">自分</div>
                <div id="p-status-val">Lv.1 ATK:0</div>
                <div style="height:8px; background:#ccc; border-radius:4px; overflow:hidden; margin-top:3px;"><div id="p-hp-bar" class="hp-bar-fill"></div></div>
                <div style="text-align:right; font-size:9px;">HP: <span id="p-hp-val">0</span></div>
            </div>
            <img id="p-img" style="width:100%; border:2px solid var(--cyan);" src="">
        </div>
    </div>
    <div id="msg-window"><div id="msg-text"></div></div>
    <div id="cmd-grid">
        <button class="btn-ctrl cmd-btn" onclick="handleBattle('attack')">攻撃</button>
        <button class="btn-ctrl cmd-btn" onclick="handleBattle('seal')">封印</button>
        <button class="btn-ctrl cmd-btn" onclick="closeBattleUI()">逃げる</button>
        <button class="btn-ctrl cmd-btn" onclick="openDeck()">交代</button>
    </div>
</div>

<div id="fusion-vortex"><div class="vortex-anim"></div></div>
<div id="success-pop" onclick="finishCapture()">
    <h1 style="color:var(--gold); text-shadow:0 0 10px #f00;">封印成功！！</h1>
    <img id="pop-card" src="">
    <p style="color:white; margin-top:10px;">ガッチャ！タップで戻るぜ！</p>
</div>

<script>
    let map, bData = { p: null, e: null, busy: false }, currentMarker;
    let myDeck = JSON.parse(localStorage.getItem('myDeck') || '[{"name":"クリボー","img":"https://images.ygoprodeck.com/images/cards/40640057.jpg","atk":300,"level":1,"uid":1,"count":1}]');
    let selectedSubIdx = -1;

    const monsterPool = [
        {name:"青眼の白龍", id:89631139, baseAtk:3000}, {name:"ブラック・マジシャン", id:46986414, baseAtk:2500}, 
        {name:"真紅眼の黒竜", id:74677422, baseAtk:2400}, {name:"オシリスの天空竜", id:33731070, baseAtk:4000}
    ];

    function init() {
        navigator.geolocation.getCurrentPosition(pos => {
            const lat = pos.coords.latitude, lon = pos.coords.longitude;
            map = L.map('map', {zoomControl:false}).setView([lat, lon], 17);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            spawn(lat, lon);
        });
    }

    function refreshGPS() {
        navigator.geolocation.getCurrentPosition(pos => {
            map.setView([pos.coords.latitude, pos.coords.longitude]);
            spawn(pos.coords.latitude, pos.coords.longitude);
        });
    }

    function spawn(lat, lon) {
        map.eachLayer(layer => { if(layer instanceof L.Marker) map.removeLayer(layer); });
        for(let i=0; i<15; i++) {
            let m = monsterPool[Math.floor(Math.random()*monsterPool.length)];
            let lv = Math.floor(Math.random()*5)+1;
            let marker = L.marker([lat+(Math.random()-0.5)*0.008, lon+(Math.random()-0.5)*0.008], {
                icon: L.icon({iconUrl: `https://images.ygoprodeck.com/images/cards_small/${m.id}.jpg`, iconSize:[45,65]})
            }).addTo(map);
            marker.on('click', () => {
                bData.e = { ...m, level: lv, atk: m.baseAtk * lv, hp: 500 * lv, maxHp: 500 * lv, img: `https://images.ygoprodeck.com/images/cards/${m.id}.jpg` };
                bData.p = { ...myDeck[0], hp: 1000, maxHp: 1000 };
                currentMarker = marker;
                document.getElementById('battle-screen').style.display = 'flex';
                updateBattleUI();
                document.getElementById('msg-text').innerText = `${bData.e.name}が現れた！`;
            });
        }
    }

    function updateBattleUI() {
        document.getElementById('w-name-val').innerText = bData.e.name;
        document.getElementById('w-status-val').innerText = `Lv.${bData.e.level} ATK:${bData.e.atk}`;
        document.getElementById('w-hp-val').innerText = bData.e.hp;
        document.getElementById('w-hp-bar').style.width = (bData.e.hp / bData.e.maxHp * 100) + '%';
        document.getElementById('w-img').src = bData.e.img;
        document.getElementById('p-name-val').innerText = bData.p.name;
        document.getElementById('p-status-val').innerText = `Lv.${bData.p.level || 1} ATK:${bData.p.atk}`;
        document.getElementById('p-hp-val').innerText = bData.p.hp;
        document.getElementById('p-hp-bar').style.width = (bData.p.hp / bData.p.maxHp * 100) + '%';
        document.getElementById('p-img').src = bData.p.img;
    }

    async function handleBattle(act) {
        if(bData.busy) return; bData.busy = true;
        if(act === 'attack') {
            document.getElementById('msg-text').innerText = `${bData.p.name}の攻撃！`;
            await new Promise(r => setTimeout(r, 600));
            bData.e.hp = Math.max(0, bData.e.hp - Math.floor(bData.p.atk/5));
            updateBattleUI();
            if(bData.e.hp <= 0) { document.getElementById('msg-text').innerText = "チャンス！"; bData.busy = false; return; }
        } else {
            document.getElementById('fusion-vortex').style.display = 'flex';
            await new Promise(r => setTimeout(r, 1200));
            document.getElementById('fusion-vortex').style.display = 'none';
            if(Math.random() > (bData.e.hp / bData.e.maxHp)) {
                document.getElementById('pop-card').src = bData.e.img;
                document.getElementById('success-pop').style.display = 'flex';
                setTimeout(() => document.getElementById('pop-card').style.transform = 'scale(1)', 100);
                saveCapture(bData.e); return;
            }
            document.getElementById('msg-text').innerText = "失敗！";
        }
        await new Promise(r => setTimeout(r, 800));
        document.getElementById('msg-text').innerText = "反撃！";
        bData.p.hp = Math.max(0, bData.p.hp - Math.floor(bData.e.atk/10));
        updateBattleUI();
        if(bData.p.hp <= 0) { alert("敗退..."); closeBattleUI(); return; }
        bData.busy = false;
    }

    function openDeck() {
        document.getElementById('deck-screen').style.display = 'flex';
        renderDeck();
    }
    function renderDeck() {
        const main = myDeck[0];
        document.getElementById('main-mon-img').src = main.img;
        document.getElementById('main-mon-name').innerText = `${main.name} (ATK:${main.atk})`;
        const grid = document.getElementById('deck-grid'); grid.innerHTML = '';
        myDeck.forEach((m, i) => {
            if(i === 0) return;
            grid.innerHTML += `<div class="card-box ${selectedSubIdx === i ? 'selected' : ''}" onclick="selectedSubIdx=${i};renderDeck();">
                ${m.count>1?`<div class="stock-badge">×${m.count}</div>`:''}<img src="${m.img}"></div>`;
        });
    }
    function executeSwap() {
        if(selectedSubIdx === -1) return;
        const [target] = myDeck.splice(selectedSubIdx, 1);
        myDeck.unshift(target);
        localStorage.setItem('myDeck', JSON.stringify(myDeck));
        selectedSubIdx = -1; renderDeck();
        if(document.getElementById('battle-screen').style.display === 'flex') {
            bData.p = {...myDeck[0], hp: 1000, maxHp: 1000}; updateBattleUI();
        }
    }
    function executeEnhance() {
        if(selectedSubIdx === -1) return;
        myDeck[0].atk += Math.floor(myDeck[selectedSubIdx].atk * 0.05);
        myDeck[selectedSubIdx].count--;
        if(myDeck[selectedSubIdx].count <= 0) myDeck.splice(selectedSubIdx, 1);
        localStorage.setItem('myDeck', JSON.stringify(myDeck));
        selectedSubIdx = -1; renderDeck();
        alert("強化完了！");
    }
    function saveCapture(m) {
        let exist = myDeck.find(d => d.name === m.name);
        if(exist) exist.count++; else myDeck.push({...m, count:1, level:1, uid:Date.now()});
        localStorage.setItem('myDeck', JSON.stringify(myDeck));
    }
    function finishCapture() {
        document.getElementById('success-pop').style.display = 'none';
        if(currentMarker) map.removeLayer(currentMarker);
        closeBattleUI();
    }
    function closeBattleUI() { document.getElementById('battle-screen').style.display = 'none'; bData.busy = false; setTimeout(() => map.invalidateSize(), 200); }
    function closeDeck() { document.getElementById('deck-screen').style.display = 'none'; }
    window.onload = init;
</script>
</body>
</html>
