<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yu-Gi-Oh! GO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gold: #ffd700; --cyan: #00ffff; --red: #ff4d4d; --bg: #050510; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; overflow: hidden; height: 100vh; color: white; }
        #map { width: 100%; height: 100%; position: absolute; z-index: 1; }
        
        /* デッキ・強化画面 */
        #deck-screen { 
            position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); 
            display:none; z-index: 4000; padding: 20px; box-sizing: border-box; 
            flex-direction: column; 
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 15px; overflow-y: auto; flex: 1; padding-bottom: 20px; }
        
        /* カードボックスのスタイル */
        .card-box { border: 2px solid #333; padding: 5px; border-radius: 5px; text-align: center; position: relative; transition: 0.2s; background: #1a1a2e; }
        .card-box.is-main { border-color: var(--cyan); box-shadow: 0 0 8px var(--cyan); }
        .card-box.base-select { border-color: var(--gold); transform: scale(1.05); z-index: 10; box-shadow: 0 0 15px var(--gold); }
        .card-box.sac-select { border-color: var(--red); background: rgba(255, 77, 77, 0.3); }
        .card-box img { width: 100%; border-radius: 3px; display: block; }
        
        /* 枚数バッジ */
        .stock-badge { 
            position: absolute; top: -8px; right: -8px; background: var(--red); color: white; 
            border-radius: 12px; padding: 2px 8px; font-size: 12px; font-weight: bold; border: 2px solid white; z-index: 20;
        }

        .controls { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .btn-ui { padding: 15px; border: none; font-weight: bold; border-radius: 8px; font-size: 14px; cursor: pointer; }
        
        /* マップボタン */
        #deck-btn { position: fixed; bottom: 30px; left: 20px; width: 65px; height: 65px; background: rgba(0,0,0,0.8); border: 2px solid var(--gold); border-radius: 50%; color: var(--gold); font-weight: bold; z-index: 1000; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--gold); }
        
        /* 共通：他画面 */
        #seal-screen, #result-popup { position: fixed; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; z-index: 2000; background: #111; align-items: center; justify-content: center; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="deck-btn" onclick="openDeck()">DECK</div>

<div id="deck-screen">
    <h3 id="mode-title" style="text-align:center; color:var(--gold); margin:0;">MY DECK</h3>
    <p id="mode-desc" style="text-align:center; font-size:12px; color:#aaa; margin:5px 0;">カードを選択してください</p>
    
    <div id="deck-grid" class="grid"></div>

    <div class="controls">
        <div style="display:flex; gap:8px;">
            <button id="set-main-btn" onclick="setAsBattleMonster()" style="flex:1; background:var(--cyan); display:none;" class="btn-ui">戦闘に出す</button>
            <button id="enhance-mode-toggle" onclick="toggleEnhanceMode()" style="flex:1; background:var(--gold);" class="btn-ui">強化モード</button>
        </div>
        <button id="execute-sac-btn" onclick="confirmSacrifice()" style="display:none; background:var(--red); color:white;" class="btn-ui">生贄に捧げる（強化）</button>
        <button onclick="closeDeck()" style="background:#333; color:white;" class="btn-ui">マップに戻る</button>
    </div>
</div>

<div id="seal-screen">
    <h2 id="w-name" style="color:var(--gold)"></h2>
    <img id="w-img" style="width:200px; border:2px solid #fff;">
    <div style="margin-top:30px; display:flex; gap:20px;">
        <button onclick="doSeal()" style="padding:20px 40px; background:var(--gold); border:none; border-radius:10px; font-weight:bold;">封印</button>
        <button onclick="location.reload()" style="padding:20px 40px; background:#444; color:white; border:none; border-radius:10px;">逃げる</button>
    </div>
</div>

<div id="result-popup" onclick="location.reload()">
    <h2 style="color:var(--gold)">封印成功！</h2>
    <img id="res-img" style="width:200px; border:4px solid white;">
    <p>ストックに追加されました</p>
</div>

<script>
    let map, currentEnemy;
    // データは count（枚数）を持つ形式
    let myDeck = JSON.parse(localStorage.getItem('myDeck') || '[{"name":"クリボー","img":"https://images.ygoprodeck.com/images/cards/40640057.jpg","atk":300,"level":1,"uid":1,"count":1}]');

    let enhanceActive = false;
    let baseCard = null;
    let sacrifices = [];

    // 地図初期化
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            map = L.map('map', {zoomControl:false}).setView([pos.coords.latitude, pos.coords.longitude], 17);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            L.circleMarker([pos.coords.latitude, pos.coords.longitude], {color:'#00ffff', radius:8}).addTo(map);
            spawnMonsters(pos.coords.latitude, pos.coords.longitude);
        });
    }

    function spawnMonsters(lat, lon) {
        const pool = [
            {name:"青眼の白龍", img:"https://images.ygoprodeck.com/images/cards/89631139.jpg", atk:3000},
            {name:"ブラック・マジシャン", img:"https://images.ygoprodeck.com/images/cards/46986414.jpg", atk:2500},
            {name:"真紅眼の黒竜", img:"https://images.ygoprodeck.com/images/cards/74677422.jpg", atk:2400}
        ];
        for(let i=0; i<12; i++){
            let m = pool[Math.floor(Math.random()*pool.length)];
            L.marker([lat+(Math.random()-0.5)*0.006, lon+(Math.random()-0.5)*0.006], {
                icon: L.icon({iconUrl: m.img, iconSize:[50,70], className:'monster-icon'})
            }).addTo(map).on('click', function(){
                currentEnemy = m;
                document.getElementById('seal-screen').style.display = 'flex';
                document.getElementById('w-name').innerText = m.name;
                document.getElementById('w-img').src = m.img;
            });
        }
    }

    function doSeal() {
        // 捕獲処理
        let target = myDeck.find(d => d.name === currentEnemy.name);
        if(target) target.count++;
        else myDeck.push({...currentEnemy, count:1, level:1, uid:Date.now()});
        
        localStorage.setItem('myDeck', JSON.stringify(myDeck));
        document.getElementById('res-img').src = currentEnemy.img;
        document.getElementById('result-popup').style.display = 'flex';
    }

    // デッキ画面ロジック
    function openDeck() {
        enhanceActive = false;
        baseCard = null;
        sacrifices = [];
        document.getElementById('deck-screen').style.display = 'flex';
        renderDeck();
    }

    function toggleEnhanceMode() {
        enhanceActive = !enhanceActive;
        baseCard = null;
        sacrifices = [];
        renderDeck();
    }

    function renderDeck() {
        const grid = document.getElementById('deck-grid');
        const modeTitle = document.getElementById('mode-title');
        const modeDesc = document.getElementById('mode-desc');
        grid.innerHTML = '';

        if(enhanceActive) {
            modeTitle.innerText = "強化モード";
            modeTitle.style.color = "var(--red)";
            modeDesc.innerText = !baseCard ? "強化したいベースを選択" : "生贄にする素材を選択（複数可）";
        } else {
            modeTitle.innerText = "MY DECK";
            modeTitle.style.color = "var(--gold)";
            modeDesc.innerText = "カードを選択してください";
        }

        myDeck.forEach((m, i) => {
            let cls = 'card-box';
            if(i === 0) cls += ' is-main';
            if(baseCard && baseCard.uid === m.uid) cls += ' base-select';
            if(sacrifices.some(s => s.uid === m.uid)) cls += ' sac-select';

            grid.innerHTML += `
                <div class="${cls}" onclick="handleCardClick(${i})">
                    ${m.count > 1 ? `<div class="stock-badge">×${m.count}</div>` : ''}
                    <img src="${m.img}">
                    <div style="font-size:10px; margin-top:4px;">ATK:${m.atk}</div>
                </div>`;
        });

        // ボタン表示制御
        document.getElementById('set-main-btn').style.display = (!enhanceActive && baseCard && myDeck[0].uid !== baseCard.uid) ? "block" : "none";
        document.getElementById('execute-sac-btn').style.display = (enhanceActive && baseCard && sacrifices.length > 0) ? "block" : "none";
        document.getElementById('enhance-mode-toggle').innerText = enhanceActive ? "キャンセル" : "強化モード";
    }

    function handleCardClick(index) {
        const card = myDeck[index];
        if(!enhanceActive) {
            // 通常モード：1枚選択
            baseCard = (baseCard?.uid === card.uid) ? null : card;
        } else {
            // 強化モード
            if(!baseCard) {
                baseCard = card;
            } else if(baseCard.uid === card.uid) {
                baseCard = null; sacrifices = [];
            } else {
                const sIdx = sacrifices.findIndex(s => s.uid === card.uid);
                if(sIdx > -1) sacrifices.splice(sIdx, 1);
                else sacrifices.push(card);
            }
        }
        renderDeck();
    }

    function setAsBattleMonster() {
        const idx = myDeck.findIndex(m => m.uid === baseCard.uid);
        const [target] = myDeck.splice(idx, 1);
        myDeck.unshift(target);
        saveAndRefresh();
    }

    function confirmSacrifice() {
        if(!confirm(`${sacrifices.length}種類のカードを生贄に捧げ、${baseCard.name}を強化しますか？`)) return;
        
        const target = myDeck.find(m => m.uid === baseCard.uid);
        sacrifices.forEach(s => {
            const material = myDeck.find(m => m.uid === s.uid);
            material.count--;
            target.level++;
            target.atk = Math.floor(target.atk * 1.15); // 15%アップ
            if(material.count <= 0) {
                myDeck = myDeck.filter(m => m.uid !== s.uid);
            }
        });
        saveAndRefresh();
        alert("強化が完了しました！");
    }

    function saveAndRefresh() {
        localStorage.setItem('myDeck', JSON.stringify(myDeck));
        baseCard = null;
        sacrifices = [];
        renderDeck();
    }

    function closeDeck() { document.getElementById('deck-screen').style.display = 'none'; }
</script>
</body>
</html>
