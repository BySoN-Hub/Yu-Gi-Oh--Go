<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yu-Gi-Oh! GO - Evolution</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --main-bg: #050510; --gold: #ffd700; --cyan: #00ffff; --red: #e74c3c; --fusion-purple: #8e44ad; }
        body { margin: 0; padding: 0; background: var(--main-bg); font-family: 'Segoe UI', sans-serif; overflow: hidden; color: white; }
        #map { width: 100vw; height: 100vh; z-index: 1; }
        
        /* マップUI */
        .monster-icon { filter: drop-shadow(0 0 5px var(--gold)); border: 1px solid var(--gold); border-radius: 4px; background: rgba(0,0,0,0.5); }
        #menu-btn { position: fixed; bottom: 20px; left: 20px; width: 60px; height: 60px; background: var(--gold); border-radius: 50%; border: 3px solid white; z-index: 1000; display: flex; align-items: center; justify-content: center; color: black; font-weight: bold; cursor: pointer; box-shadow: 0 0 15px rgba(0,0,0,0.5); }

        /* --- 封印（バトル）画面 --- */
        #seal-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, #1a1a2e, #000); display: none; flex-direction: column; z-index: 2000; }
        .battle-stage { flex: 2; display: flex; align-items: center; justify-content: space-around; padding: 20px; position: relative; }
        .monster-box { text-align: center; width: 45%; }
        .battle-img { width: 100%; max-width: 180px; border-radius: 10px; border: 2px solid #333; }
        .gauge-bg { width: 100%; height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin-top: 3px; }
        .gauge-fill { height: 100%; background: lime; width: 100%; transition: width 0.5s; }
        #command-panel { flex: 1; background: #222; border-top: 4px solid #444; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; }
        .cmd-btn { background: linear-gradient(to bottom, #444, #222); border: 2px solid #666; border-radius: 8px; color: white; font-size: 1.2rem; font-weight: bold; cursor: pointer; }

        /* --- エフェクト系 --- */
        #fusion-effect { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, var(--fusion-purple), transparent); display: none; z-index: 3000; align-items: center; justify-content: center; overflow: hidden; }
        .vortex { width: 300px; height: 300px; border: 10px dashed white; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg) scale(1); } to { transform: rotate(360deg) scale(0); } }
        
        #yugi-cutin { position: fixed; top: 50%; left: -100%; width: 120%; height: 150px; background: rgba(0,0,255,0.7); transform: translateY(-50%) skewX(-20deg); z-index: 3100; transition: left 0.5s; display: flex; align-items: center; padding-left: 100px; border-top: 5px solid gold; border-bottom: 5px solid gold; }
        #yugi-cutin.active { left: -10%; }
        #yugi-cutin img { height: 200px; margin-top: -30px; filter: drop-shadow(0 0 10px white); }

        /* --- デッキ＆強化画面 --- */
        #deck-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a1a; display: none; flex-direction: column; z-index: 4000; padding: 20px; box-sizing: border-box; }
        .deck-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; overflow-y: auto; flex: 1; }
        .card-item { background: #1a1a2e; padding: 5px; border-radius: 5px; text-align: center; border: 1px solid #444; font-size: 0.7rem; position: relative; }
        .card-item.selected { border-color: var(--cyan); box-shadow: 0 0 10px var(--cyan); }
        .card-item img { width: 100%; border-radius: 3px; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-main { flex: 1; padding: 15px; background: var(--gold); color: black; border: none; font-weight: bold; border-radius: 5px; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="menu-btn" onclick="openDeck()">デッキ</div>

<div id="seal-screen">
    <div class="battle-stage">
        <div class="monster-box"><div id="p-name" style="color:var(--cyan)"></div><img id="p-img" class="battle-img"></div>
        <div class="monster-box"><div id="w-name" style="color:var(--gold)"></div><div class="gauge-bg"><div id="w-gauge" class="gauge-fill"></div></div><img id="w-img" class="battle-img"></div>
    </div>
    <div id="message-window" style="padding:15px; background:rgba(255,255,255,0.1); margin:10px; border-radius:10px; min-height:50px;">
        <span id="battle-msg"></span>
    </div>
    <div id="command-panel">
        <button class="cmd-btn" onclick="handleCommand('fight')">攻撃</button>
        <button class="cmd-btn" onclick="handleCommand('seal')">封印</button>
        <button class="cmd-btn" onclick="closeBattle()">逃げる</button>
    </div>
</div>

<div id="fusion-effect"><div class="vortex"></div></div>
<div id="yugi-cutin"><img src="https://images.ygoprodeck.com/images/cards/character_yugi.png" onerror="this.src='https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png'"><h1 style="color:white; margin-left:20px;">「運命のドロー！」</h1></div>

<div id="deck-screen">
    <h2>デュエリスト・デッキ</h2>
    <p>強化：ベースを選び、生贄にするカードを選択</p>
    <div id="deck-grid" class="deck-grid"></div>
    <div class="btn-group">
        <button id="powerup-btn" class="btn-main" onclick="executePowerUp()" style="background:#2ecc71; display:none;">強化実行</button>
        <button class="btn-main" onclick="closeDeck()" style="background:#444; color:white;">戻る</button>
    </div>
</div>

<script>
    let map, userMarker, currentBattle = null;
    let myDeck = JSON.parse(localStorage.getItem('myDeck') || '[{"name":"クリボー","img":"https://images.ygoprodeck.com/images/cards/40640057.jpg","atk":300,"level":1,"uid":1}]');
    let powerupBase = null;
    let powerupMaterials = [];

    // --- マップ初期化 ---
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            const {latitude, longitude} = pos.coords;
            map = L.map('map', {zoomControl:false}).setView([latitude, longitude], 17);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            userMarker = L.circleMarker([latitude, longitude], {color: '#00ffff', radius: 8}).addTo(map);
            spawnMonsters(latitude, longitude);
        });
    }

    function spawnMonsters(lat, lon) {
        const monsters = [
            {name:"青眼の白龍", img:"https://images.ygoprodeck.com/images/cards/89631139.jpg", atk:3000},
            {name:"ブラック・マジシャン", img:"https://images.ygoprodeck.com/images/cards/46986414.jpg", atk:2500},
            {name:"真紅眼の黒竜", img:"https://images.ygoprodeck.com/images/cards/74677422.jpg", atk:2400}
        ];
        for(let i=0; i<5; i++){
            let m = monsters[Math.floor(Math.random()*monsters.length)];
            let marker = L.marker([lat+(Math.random()-0.5)*0.003, lon+(Math.random()-0.5)*0.003], 
                {icon: L.icon({iconUrl: m.img, iconSize:[50,72], className:'monster-icon'})}).addTo(map);
            marker.on('click', () => startBattle(m, marker));
        }
    }

    // --- バトルシステム ---
    function startBattle(m, marker) {
        currentBattle = {wild: {...m, hp: m.atk, max: m.atk}, marker};
        document.getElementById('seal-screen').style.display = 'flex';
        updateUI();
    }

    function updateUI() {
        const p = myDeck[0]; const w = currentBattle.wild;
        document.getElementById('p-name').innerText = `${p.name} Lv.${p.level} (ATK:${p.atk})`;
        document.getElementById('p-img').src = p.img;
        document.getElementById('w-name').innerText = w.name;
        document.getElementById('w-img').src = w.img;
        document.getElementById('w-gauge').style.width = (w.hp/w.max*100)+'%';
    }

    function handleCommand(cmd) {
        if(cmd === 'fight') {
            currentBattle.wild.hp = Math.max(0, currentBattle.wild.hp - myDeck[0].atk);
            updateUI();
        } else if(cmd === 'seal') {
            const isCritical = currentBattle.wild.hp === 0;
            showFusionEffect(isCritical);
        }
    }

    function showFusionEffect(isCritical) {
        const fusion = document.getElementById('fusion-effect');
        const cutin = document.getElementById('yugi-cutin');
        fusion.style.display = 'flex';
        
        if(isCritical) {
            setTimeout(() => cutin.classList.add('active'), 200);
        }

        setTimeout(() => {
            const success = isCritical || Math.random() > (currentBattle.wild.hp/currentBattle.wild.max);
            fusion.style.display = 'none';
            cutin.classList.remove('active');
            if(success) {
                alert("封印成功！カードを手に入れた！");
                myDeck.push({...currentBattle.wild, level: 1, uid: Date.now()});
                saveDeck();
                map.removeLayer(currentBattle.marker);
                closeBattle();
            } else {
                alert("封印失敗！もっと弱らせろ！");
            }
        }, 2000);
    }

    function closeBattle() { document.getElementById('seal-screen').style.display = 'none'; }
    function saveDeck() { localStorage.setItem('myDeck', JSON.stringify(myDeck)); }

    // --- デッキ＆強化システム ---
    function openDeck() {
        document.getElementById('deck-screen').style.display = 'flex';
        renderDeck();
    }

    function renderDeck() {
        const grid = document.getElementById('deck-grid');
        grid.innerHTML = '';
        myDeck.forEach(m => {
            const div = document.createElement('div');
            div.className = `card-item ${powerupBase?.uid === m.uid ? 'selected' : ''} ${powerupMaterials.includes(m.uid) ? 'selected' : ''}`;
            div.innerHTML = `<img src="${m.img}"><div>${m.name}<br>Lv.${m.level} ATK:${m.atk}</div>`;
            div.onclick = () => selectForPowerUp(m);
            grid.appendChild(div);
        });
        document.getElementById('powerup-btn').style.display = powerupBase && powerupMaterials.length > 0 ? 'block' : 'none';
    }

    function selectForPowerUp(m) {
        if(!powerupBase) {
            powerupBase = m;
        } else if (powerupBase.uid === m.uid) {
            powerupBase = null; powerupMaterials = [];
        } else {
            const idx = powerupMaterials.indexOf(m.uid);
            if(idx > -1) powerupMaterials.splice(idx, 1);
            else powerupMaterials.push(m.uid);
        }
        renderDeck();
    }

    function executePowerUp() {
        if(!confirm(`${powerupMaterials.length}枚を生贄に捧げ、${powerupBase.name}を強化しますか？`)) return;
        
        const base = myDeck.find(d => d.uid === powerupBase.uid);
        powerupMaterials.forEach(muid => {
            const midx = myDeck.findIndex(d => d.uid === muid);
            myDeck.splice(midx, 1);
            base.level += 1;
            base.atk = Math.floor(base.atk * 1.1); // 10%強化
        });
        
        powerupBase = null; powerupMaterials = [];
        saveDeck();
        renderDeck();
        alert("強化完了！攻撃力が上昇した！");
    }

    function closeDeck() { document.getElementById('deck-screen').style.display = 'none'; powerupBase=null; powerupMaterials=[]; }
</script>
</body>
</html>
