<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yu-Gi-Oh! GO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gold: #ffd700; --cyan: #00ffff; }
        body { margin: 0; padding: 0; background: #000; font-family: 'Hiragino Kaku Gothic ProN', sans-serif; overflow: hidden; height: 100vh; width: 100vw; }
        
        /* マップ表示 */
        #map { width: 100%; height: 100%; z-index: 1; position: absolute; }
        
        /* マップ上のカードイラスト */
        .monster-icon {
            filter: drop-shadow(0 0 8px var(--gold));
            border-radius: 2px;
            transition: transform 0.2s;
        }

        /* 下部メニュー */
        #ui-layer { position: fixed; bottom: 0; width: 100%; height: 80px; z-index: 1000; display: flex; justify-content: center; pointer-events: none; }
        #deck-btn { 
            width: 70px; height: 70px; background: rgba(0,0,0,0.8); border: 2px solid var(--gold); border-radius: 50%;
            color: var(--gold); font-weight: bold; font-size: 14px; pointer-events: auto; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--gold);
        }

        /* 封印成功ポップアップ */
        #result-popup {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 5000;
            animation: fadeIn 0.3s;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        #result-card { width: 220px; border: 4px solid white; border-radius: 10px; transform: scale(0); transition: 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.49); }
        #result-card.show { transform: scale(1); box-shadow: 0 0 50px white; }
        .gatcha-text { color: var(--gold); font-size: 40px; font-weight: bold; text-shadow: 0 0 20px #f00; margin-bottom: 20px; }

        /* バトル画面（縦長スマホ用） */
        #seal-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; display:none; flex-direction:column; z-index: 2000; }
        .battle-view { flex: 1; display:flex; flex-direction:column; justify-content: space-around; align-items: center; padding: 20px; }
        #command-panel { height: 30%; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; background: #111; border-top: 3px solid #333; }
        .cmd-btn { background: #222; border: 2px solid #555; color: white; font-size: 1.2rem; border-radius: 10px; }

        /* デッキ画面 */
        #deck-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#050510; display:none; z-index: 4000; padding: 20px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; overflow-y: auto; height: 75%; }
        .card-box { border: 1px solid #444; padding: 4px; text-align: center; font-size: 10px; }
        .card-box img { width: 100%; }
    </style>
</head>
<body>

<div id="map"></div>

<div id="ui-layer">
    <div id="deck-btn" onclick="openDeck()">DECK</div>
</div>

<div id="seal-screen">
    <div class="battle-view">
        <div id="w-info" style="text-align:center;">
            <h3 id="w-name" style="color:var(--gold); margin:0;"></h3>
            <div style="width:200px; height:10px; background:#333; border-radius:5px; margin:5px auto;">
                <div id="w-hp" style="width:100%; height:100%; background:lime; transition:0.3s;"></div>
            </div>
            <img id="w-img" style="width:180px; border-radius:8px;">
        </div>
        <div id="p-info" style="text-align:center;">
            <img id="p-img" style="width:120px; border-radius:5px; border:2px solid var(--cyan);">
            <p id="p-name" style="margin:5px 0; font-size:14px;"></p>
        </div>
    </div>
    <div id="command-panel">
        <button class="cmd-btn" onclick="battleAction('attack')" style="border-color: #e74c3c;">攻撃</button>
        <button class="cmd-btn" onclick="battleAction('seal')" style="border-color: var(--gold);">封印</button>
        <button class="cmd-btn" onclick="closeBattle()" style="grid-column: span 2;">逃げる</button>
    </div>
</div>

<div id="result-popup" onclick="closeResult()">
    <div class="gatcha-text">封印成功ッ！！</div>
    <img id="result-card" src="">
    <div style="color:white; margin-top:20px; font-weight:bold;">ガッチャ！楽しいデュエルだったぜ！</div>
    <p style="color:#aaa; font-size:12px;">タップして閉じる</p>
</div>

<div id="deck-screen">
    <h2 style="color:var(--gold);">MY DECK</h2>
    <div id="deck-grid" class="grid"></div>
    <button onclick="closeDeck()" style="width:100%; padding:15px; margin-top:15px; background:#333; color:white; border:none; border-radius:10px;">閉じる</button>
</div>

<script>
    let map, userMarker, currentEnemy = null;
    let myDeck = JSON.parse(localStorage.getItem('myDeck') || '[{"name":"クリボー","img":"https://images.ygoprodeck.com/images/cards/40640057.jpg","atk":300,"level":1,"uid":1}]');

    // GPS初期化
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            const {latitude, longitude} = pos.coords;
            map = L.map('map', {zoomControl:false, attributionControl:false}).setView([latitude, longitude], 17);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            userMarker = L.circleMarker([latitude, longitude], {color: '#00ffff', radius: 8, fillOpacity: 0.8}).addTo(map);
            spawnMonsters(latitude, longitude);
        });
    }

    // 出現割合アップ（10体召喚）
    function spawnMonsters(lat, lon) {
        const pool = [
            {name:"青眼の白龍", img:"https://images.ygoprodeck.com/images/cards/89631139.jpg", atk:3000},
            {name:"ブラック・マジシャン", img:"https://images.ygoprodeck.com/images/cards/46986414.jpg", atk:2500},
            {name:"真紅眼の黒竜", img:"https://images.ygoprodeck.com/images/cards/74677422.jpg", atk:2400},
            {name:"デーモンの召喚", img:"https://images.ygoprodeck.com/images/cards/70781052.jpg", atk:2500},
            {name:"エルフの剣士", img:"https://images.ygoprodeck.com/images/cards/91152256.jpg", atk:1400}
        ];
        for(let i=0; i<10; i++) {
            let m = pool[Math.floor(Math.random()*pool.length)];
            let mLat = lat + (Math.random()-0.5)*0.005;
            let mLon = lon + (Math.random()-0.5)*0.005;
            let marker = L.marker([mLat, mLon], {
                icon: L.icon({iconUrl: m.img, iconSize:[45,65], className:'monster-icon'})
            }).addTo(map);
            marker.on('click', () => startBattle(m, marker));
        }
    }

    function startBattle(m, marker) {
        currentEnemy = { ...m, hp: 100, marker };
        document.getElementById('seal-screen').style.display = 'flex';
        updateBattleUI();
    }

    function updateBattleUI() {
        document.getElementById('w-name').innerText = currentEnemy.name;
        document.getElementById('w-img').src = currentEnemy.img;
        document.getElementById('w-hp').style.width = currentEnemy.hp + '%';
        document.getElementById('p-img').src = myDeck[0].img;
        document.getElementById('p-name').innerText = myDeck[0].name + " Lv." + myDeck[0].level;
    }

    function battleAction(type) {
        if(type === 'attack') {
            currentEnemy.hp = Math.max(0, currentEnemy.hp - 40);
            updateBattleUI();
        } else {
            const success = Math.random() > (currentEnemy.hp / 120);
            if(success) showSuccess(currentEnemy);
            else alert("封印失敗！もっと叩け！");
        }
    }

    function showSuccess(monster) {
        document.getElementById('result-card').src = monster.img;
        document.getElementById('result-popup').style.display = 'flex';
        setTimeout(() => document.getElementById('result-card').classList.add('show'), 100);
        
        // デッキ保存
        myDeck.push({...monster, level: 1, uid: Date.now()});
        localStorage.setItem('myDeck', JSON.stringify(myDeck));
        map.removeLayer(currentEnemy.marker);
    }

    function closeResult() {
        document.getElementById('result-popup').style.display = 'none';
        document.getElementById('result-card').classList.remove('show');
        document.getElementById('seal-screen').style.display = 'none';
    }

    function openDeck() {
        const grid = document.getElementById('deck-grid');
        grid.innerHTML = '';
        myDeck.forEach(m => {
            grid.innerHTML += `<div class="card-box"><img src="${m.img}"><div>Lv.${m.level}</div></div>`;
        });
        document.getElementById('deck-screen').style.display = 'block';
    }

    function closeDeck() { document.getElementById('deck-screen').style.display = 'none'; }
    function closeBattle() { document.getElementById('seal-screen').style.display = 'none'; }
</script>
</body>
</html>
