<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yu-Gi-Oh! GO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gold: #ffd700; --cyan: #00ffff; --red: #ff4d4d; --bg: #050510; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; overflow: hidden; height: 100vh; color: white; }
        #map { width: 100%; height: 100%; position: absolute; z-index: 1; }
        
        /* バトル画面 */
        #battle-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #1a1a2e, #000);
            display: none; flex-direction: column; z-index: 2000;
        }
        .battle-stage { flex: 2; position: relative; display: flex; flex-direction: column; justify-content: space-around; padding: 10px; }
        .m-box { width: 50%; text-align: center; position: relative; }
        .m-box.wild { align-self: flex-end; }
        .m-box.player { align-self: flex-start; }
        .battle-img { width: 120px; border-radius: 8px; border: 2px solid #444; }
        
        /* ステータスバー */
        .s-bar { position: absolute; width: 160px; background: rgba(0,0,0,0.7); border: 1px solid #666; padding: 5px; border-radius: 5px; font-size: 12px; }
        .s-bar.wild { top: 10px; left: 10px; border-left: 4px solid var(--gold); }
        .s-bar.player { bottom: 10px; right: 10px; border-right: 4px solid var(--cyan); }
        .hp-bg { width: 100%; height: 6px; background: #333; border-radius: 3px; margin-top: 3px; overflow: hidden; }
        .hp-fill { height: 100%; background: lime; width: 100%; transition: width 0.4s; }

        /* メッセージ＆コマンド */
        #msg-window { flex: 0.5; background: #fff; color: #111; margin: 10px; border: 3px solid #555; border-radius: 8px; padding: 10px; font-size: 1.1rem; font-weight: bold; }
        #cmd-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; background: #222; }
        .cmd-btn { background: #444; border: 2px solid #666; color: white; border-radius: 5px; font-size: 1.2rem; font-weight: bold; }

        /* UI */
        #deck-btn { position: fixed; bottom: 20px; left: 20px; width: 60px; height: 60px; background: rgba(0,0,0,0.8); border: 2px solid var(--gold); border-radius: 50%; color: var(--gold); font-weight: bold; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        #deck-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); display:none; z-index: 4000; padding: 20px; box-sizing: border-box; flex-direction: column; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .card-box { border: 2px solid #333; padding: 4px; border-radius: 4px; text-align: center; position: relative; background: #111; }
        .card-box img { width: 100%; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="deck-btn" onclick="openDeck()">DECK</div>

<div id="battle-screen">
    <div class="battle-stage">
        <div class="m-box wild">
            <div class="s-bar wild">
                <div id="w-name" style="color:var(--gold)"></div>
                <div class="hp-bg"><div id="w-hp" class="hp-fill"></div></div>
            </div>
            <img id="w-img" class="battle-img" src="">
        </div>
        <div class="m-box player">
            <div class="s-bar player">
                <div id="p-name" style="color:var(--cyan)"></div>
                <div id="p-status" style="font-size:10px;"></div>
            </div>
            <img id="p-img" class="battle-img" src="">
        </div>
    </div>
    <div id="msg-window"><div id="msg-text"></div></div>
    <div id="cmd-grid">
        <button class="cmd-btn" onclick="battleAction('fight')">攻撃</button>
        <button class="cmd-btn" onclick="battleAction('seal')">封印</button>
        <button class="cmd-btn" onclick="battleAction('run')">逃げる</button>
        <button class="cmd-btn" onclick="openDeck()">交代</button>
    </div>
</div>

<div id="deck-screen">
    <h3 style="text-align:center; color:var(--gold);">DECK / ENHANCE</h3>
    <div id="deck-grid" class="grid"></div>
    <button onclick="closeDeck()" style="width:100%; padding:15px; background:#444; color:white; border:none; border-radius:5px; margin-top:20px;">閉じる</button>
</div>

<script>
    let map, currentBattle = null;
    let myDeck = JSON.parse(localStorage.getItem('myDeck') || '[{"name":"クリボー","img":"https://images.ygoprodeck.com/images/cards/40640057.jpg","atk":300,"level":1,"uid":1,"count":1}]');

    // 初期化
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            initMap(pos.coords.latitude, pos.coords.longitude);
        });
    }

    function initMap(lat, lon) {
        map = L.map('map', {zoomControl:false}).setView([lat, lon], 17);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
        L.circleMarker([lat, lon], {color:'#00ffff', radius:8}).addTo(map);
        spawnMonsters(lat, lon);
    }

    function spawnMonsters(lat, lon) {
        const pool = [
            {name:"青眼の白龍", img:"https://images.ygoprodeck.com/images/cards/89631139.jpg", atk:3000},
            {name:"ブラック・マジシャン", img:"https://images.ygoprodeck.com/images/cards/46986414.jpg", atk:2500},
            {name:"真紅眼の黒竜", img:"https://images.ygoprodeck.com/images/cards/74677422.jpg", atk:2400}
        ];
        for(let i=0; i<12; i++){
            let m = pool[Math.floor(Math.random()*pool.length)];
            let marker = L.marker([lat+(Math.random()-0.5)*0.006, lon+(Math.random()-0.5)*0.006], {
                icon: L.icon({iconUrl: m.img, iconSize:[50,70]})
            }).addTo(map);
            marker.on('click', () => startBattle(m, marker));
        }
    }

    function startBattle(monster, marker) {
        currentBattle = { enemy: {...monster, hp: 100}, marker };
        document.getElementById('battle-screen').style.display = 'flex';
        updateBattleUI();
        setMsg(`野生の ${monster.name} が とびだしてきた！`);
    }

    function updateBattleUI() {
        const p = myDeck[0];
        const e = currentBattle.enemy;
        document.getElementById('w-name').innerText = e.name;
        document.getElementById('w-img').src = e.img;
        document.getElementById('w-hp').style.width = e.hp + '%';
        document.getElementById('p-name').innerText = p.name;
        document.getElementById('p-status').innerText = `Lv.${p.level} ATK:${p.atk}`;
        document.getElementById('p-img').src = p.img;
    }

    function setMsg(txt) { document.getElementById('msg-text').innerText = txt; }

    function battleAction(type) {
        const enemy = currentBattle.enemy;
        if(type === 'fight') {
            enemy.hp = Math.max(0, enemy.hp - 40);
            setMsg(`${myDeck[0].name} の こうげき！`);
            updateBattleUI();
        } else if(type === 'seal') {
            setMsg("封印カードを なげた！");
            setTimeout(() => {
                if(Math.random() > (enemy.hp/120)) {
                    setMsg("封印成功！");
                    saveCaptured(enemy);
                } else {
                    setMsg("だめだ！封印しきれない！");
                }
            }, 800);
        } else if(type === 'run') {
            document.getElementById('battle-screen').style.display = 'none';
        }
    }

    function saveCaptured(enemy) {
        let target = myDeck.find(d => d.name === enemy.name);
        if(target) target.count++;
        else myDeck.push({...enemy, count:1, level:1, uid:Date.now()});
        localStorage.setItem('myDeck', JSON.stringify(myDeck));
        
        // 【修正】リロードせず、マーカーを消して戻る
        setTimeout(() => {
            map.removeLayer(currentBattle.marker);
            document.getElementById('battle-screen').style.display = 'none';
            currentBattle = null;
        }, 1000);
    }

    function openDeck() {
        document.getElementById('deck-grid').innerHTML = myDeck.map(m => `
            <div class="card-box">
                <img src="${m.img}"><div>×${m.count}</div>
            </div>`).join('');
        document.getElementById('deck-screen').style.display = 'flex';
    }
    function closeDeck() { document.getElementById('deck-screen').style.display = 'none'; }
</script>
</body>
</html>
