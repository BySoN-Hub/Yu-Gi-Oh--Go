<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Yu-Gi-Oh! GO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gold: #ffd700; --cyan: #00ffff; --red: #ff4d4d; --fusion: #8e44ad; --bg: #050510; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; overflow: hidden; height: 100dvh; width: 100vw; color: white; touch-action: manipulation; }
        #version-tag { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7); font-size: 10px; color: var(--gold); z-index: 2000000; padding: 2px 5px; border-radius: 3px; pointer-events: none; border: 1px solid rgba(255,215,0,0.3); }

        #map { width: 100%; height: 100%; position: absolute; z-index: 1; visibility: hidden; background: #000; }
        .mon-chip { border: 2px solid var(--gold); border-radius: 4px; object-fit: cover; background: #000; box-shadow: 0 0 10px rgba(255,215,0,0.5); }
        .lv-badge { position: absolute; top: -5px; right: -5px; background: #000; color: var(--gold); border: 1px solid var(--gold); font-size: 10px; padding: 1px 3px; border-radius: 3px; font-weight: bold; z-index: 10; }
        
        .ui-btn { position: fixed; width: 60px; height: 60px; background: rgba(0,0,0,0.85); border: 2px solid var(--gold); border-radius: 50%; color: var(--gold); z-index: 1000; display: none; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 0 10px var(--gold); }
        #deck-btn-ui { bottom: 40px; left: 20px; }
        #shop-btn-ui { bottom: 110px; left: 20px; color: var(--cyan); border-color: var(--cyan); box-shadow: 0 0 10px var(--cyan); }
        #gps-btn-ui { bottom: 40px; right: 20px; font-size: 24px; }
        
        #loading-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #000; display:none; flex-direction:column; align-items:center; justify-content:center; z-index: 10000000; }
        .load-text { color: var(--gold); font-size: 1.5rem; font-weight: bold; text-shadow: 0 0 10px var(--gold); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        #top-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('main-vis.png'); background-size: cover; background-position: center; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999999; }
        .top-title { color:var(--gold); text-shadow:0 0 20px #f00, 0 0 10px #000; margin-bottom: 20px; font-size: 3rem; font-style: italic; }
        .top-cards-container { display: flex; gap: 20px; align-items: center; margin-bottom: 40px; }
        .top-card-img { width: 90px; border: 2px solid #555; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.7); }
        .start-btn { padding:15px 40px; background:rgba(0,0,0,0.8); color:var(--gold); border:2px solid var(--gold); border-radius:50px; font-weight:bold; cursor:pointer; font-size: 1.2rem; }

        /* ショップ画面 */
        #shop-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; background: var(--bg); display: none; flex-direction: column; z-index: 99999; padding: 20px; box-sizing: border-box; }
        .shop-item-row { display: flex; gap: 15px; justify-content: center; margin-top: 30px; }
        .shop-card { width: 120px; text-align: center; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; border: 1px solid #444; }
        .shop-card img { width: 100%; border-radius: 4px; margin-bottom: 10px; }
        .shop-btn { width: 100%; padding: 8px; background: var(--gold); color: #000; border: none; border-radius: 5px; font-weight: bold; font-size: 12px; }
        .shop-btn:disabled { background: #555; color: #888; }

        #battle-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: radial-gradient(circle, #1a1a3e, #000); display: none; flex-direction: column; z-index: 9000; overflow: hidden; }
        .battle-stage { flex: 1; position: relative; padding: 20px 0; }
        .m-row { position: absolute; width: 100%; display: flex; align-items: center; height: 26dvh; box-sizing: border-box; justify-content: center; gap: 10px; }
        .m-row.wild { top: 10dvh; }
        .m-row.player { top: 40dvh; }
        .battle-img-container { height: 100%; width: 45%; position: relative; display: flex; align-items: center; justify-content: center; }
        .battle-img { height: 100%; width: auto; max-width: 100%; border: 2px solid #555; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.5); background: #000; position: relative; z-index: 200; }
        #seal-base-card { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://images.ygoprodeck.com/images/cards/back_high.jpg'); background-size: contain; background-repeat: no-repeat; background-position: center; z-index: 100; display: none; pointer-events: none; }
        #fusion-vortex { position: absolute; top: 50%; left: 50%; width: 300px; height: 300px; transform: translate(-50%, -50%); display: none; z-index: 300; align-items: center; justify-content: center; pointer-events: none; }
        .vortex-anim { width: 100%; height: 100%; border: 20px dashed var(--fusion); border-radius: 50%; animation: spin-converge 1.2s cubic-bezier(0.1, 0.7, 0.1, 1) forwards; box-shadow: 0 0 100px var(--fusion); }
        .sucking { transition: transform 1.2s cubic-bezier(0.1, 0.7, 0.1, 1), opacity 1s !important; transform: scale(0) rotate(1080deg) !important; opacity: 0 !important; }
        @keyframes spin-converge { 0% { transform: scale(4) rotate(0deg); opacity: 0; } 20% { opacity: 0.8; } 100% { transform: scale(0) rotate(1080deg); opacity: 0; } }

        .status-ui { width: 125px; background: rgba(255,255,255,0.92); border: 2px solid #333; padding: 6px; border-radius: 6px; color: #111; font-size: 10px; font-weight: bold; }
        .hp-bar-bg { width: 100%; height: 8px; background: #ccc; border-radius: 4px; overflow: hidden; margin-top: 4px; }
        .hp-bar-fill { height: 100%; background: #2ecc71; width: 100%; transition: width 0.3s; }

        #deck-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; background: var(--bg); display: none; flex-direction: column; z-index: 99999; padding: 20px; box-sizing: border-box; }
        .deck-header { display: flex; align-items: center; justify-content: space-around; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; border: 1px solid var(--cyan); margin-bottom: 10px; }
        .deck-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; overflow-y: auto; flex: 1; padding-bottom: 20px; }
        .card-box { aspect-ratio: 1 / 1.45; border: 1px solid #444; background: #111; text-align: center; position: relative; overflow: hidden; border-radius: 4px; }
        .card-box.selected { border: 2px solid var(--gold); background: rgba(255,215,0,0.15); box-shadow: 0 0 10px var(--gold); }
        .card-box img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .stock-badge { position: absolute; bottom: 4px; right: 4px; background: var(--red); color: white; font-size: 10px; padding: 1px 5px; border-radius: 10px; font-weight: bold; z-index: 5; }
        #success-pop { position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 999999; }
        #msg-window { height: 50px; background: #fff; color: #111; margin: 5px 15px; border: 3px solid #555; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; text-align: center; z-index: 9100; }
        #cmd-grid { height: 110px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px 15px 30px 15px; background: #222; z-index: 9100; }
        .cmd-btn { background: #eee; border: 2px solid #888; border-radius: 8px; font-weight: bold; font-size: 16px; }
        .btn-chance { animation: blink-btn 0.6s infinite alternate; border: 3px solid #ff8c00 !important; background: #fff !important; color: #ff8c00 !important; }
    </style>
</head>
<body>

<div id="version-tag">Ver 1.3.0</div>
<audio id="bgm" loop></audio>

<div id="loading-screen"><div class="load-text">周辺探索中…</div></div>

<div id="top-screen">
    <h1 class="top-title">Yu-Gi-Oh! GO</h1>
    <div class="top-cards-container">
        <img class="top-card-img" src="https://images.ygoprodeck.com/images/cards/46986414.jpg">
        <img class="top-card-img" src="https://images.ygoprodeck.com/images/cards/89631139.jpg">
    </div>
    <button class="start-btn" onclick="startGame()">闇のゲームを開始</button>
</div>

<div id="map"></div>
<div id="deck-btn-ui" class="ui-btn" onclick="openDeck()">DECK</div>
<div id="shop-btn-ui" class="ui-btn" onclick="openShop()">SHOP</div>
<div id="gps-btn-ui" class="ui-btn" onclick="refreshGPS()">🛰️</div>

<div id="shop-screen">
    <h2 style="text-align:center; color:var(--cyan); text-shadow:0 0 10px var(--cyan);">CARD SHOP</h2>
    <p style="text-align:center; font-size:12px; color:var(--gold);">1日1回、限定モンスターを無料配布！</p>
    <div class="shop-item-row">
        <div class="shop-card">
            <img src="https://images.ygoprodeck.com/images/cards/46986414.jpg">
            <button id="shop-btn-bm" class="shop-btn" onclick="buyFreeCard('bm')">入手する</button>
        </div>
        <div class="shop-card">
            <img src="https://images.ygoprodeck.com/images/cards/89631139.jpg">
