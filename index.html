<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Yu-Gi-Oh! GO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gold: #ffd700; --cyan: #00ffff; --red: #ff4d4d; --fusion: #8e44ad; --bg: #050510; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; overflow: hidden; height: 100dvh; width: 100vw; color: white; touch-action: manipulation; }
        #version-tag { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.7); font-size: 10px; color: var(--gold); z-index: 2000000; padding: 2px 5px; border-radius: 3px; pointer-events: none; border: 1px solid rgba(255,215,0,0.3); }

        #map { width: 100%; height: 100%; position: absolute; z-index: 1; visibility: hidden; }
        .mon-chip { border: 2px solid var(--gold); border-radius: 4px; object-fit: cover; background: #000; }
        .lv-badge { position: absolute; top: -5px; right: -5px; background: #000; color: var(--gold); border: 1px solid var(--gold); font-size: 10px; padding: 1px 3px; border-radius: 3px; font-weight: bold; z-index: 10; }
        .ui-btn { position: fixed; width: 60px; height: 60px; background: rgba(0,0,0,0.85); border: 2px solid var(--gold); border-radius: 50%; color: var(--gold); z-index: 1000; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 0 10px var(--gold); }
        #deck-btn-ui { bottom: 40px; left: 20px; }
        #gps-btn-ui { bottom: 40px; right: 20px; font-size: 24px; }
        
        #top-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; background: radial-gradient(circle, #1a1a2e, #000); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999999; }
        .top-title { color:var(--gold); text-shadow:0 0 15px #f00; margin-bottom: 20px; font-size: 2.5rem; }
        .top-cards-container { display: flex; gap: 20px; align-items: center; margin-bottom: 40px; }
        .top-card-img { width: 100px; border: 2px solid #555; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        .start-btn { padding:15px 30px; background:#000; color:var(--gold); border:2px solid var(--gold); border-radius:50px; font-weight:bold; cursor:pointer; }

        /* --- バトル画面：相手カードをさらに右へ --- */
        #battle-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh; background: radial-gradient(circle, #1a1a3e, #000); display: none; flex-direction: column; z-index: 9000; overflow: hidden; }
        .battle-stage { flex: 1; position: relative; }
        
        .m-row { position: absolute; width: 100%; display: flex; align-items: center; height: 25dvh; box-sizing: border-box; }
        /* 相手：右端配置 */
        .m-row.wild { top: 12dvh; justify-content: flex-end; padding-right: 5%; flex-direction: row-reverse; }
        /* 自分：左端配置 */
        .m-row.player { top: 42dvh; justify-content: flex-start; padding-left: 5%; flex-direction: row; }

        .battle-img { height: 100%; width: auto; max-width: 40%; border: 2px solid #555; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.5); background: #000; transition: transform 1s, opacity 1s; }
        
        .status-ui { width: 130px; background: rgba(255,255,255,0.92); border: 2px solid #333; padding: 6px; border-radius: 6px; color: #111; font-size: 10px; font-weight: bold; margin: 0 10px; }
        .hp-bar-bg { width: 100%; height: 8px; background: #ccc; border-radius: 4px; overflow: hidden; margin-top: 4px; }
        .hp-bar-fill { height: 100%; background: #2ecc71; width: 100%; transition: width 0.3s; }

        /* --- 封印エフェクト：追従 --- */
        #seal-base-card { position: absolute; background: #3c2415; border: 3px solid var(--gold); border-radius: 5px; display: none; z-index: 9400; box-shadow: 0 0 30px var(--fusion); pointer-events: none; }
        #fusion-vortex { position: absolute; display: none; z-index: 9500; align-items: center; justify-content: center; pointer-events: none; }
        .vortex-anim { width: 220px; height: 220px; border: 15px dashed var(--fusion); border-radius: 50%; animation: spin-v 1.1s ease-in forwards; box-shadow: inset 0 0 20px var(--fusion); }
        @keyframes spin-v { 0% { transform: scale(2.5) rotate(0deg); opacity: 0; } 100% { transform: scale(0) rotate(720deg); opacity: 0; } }
        .sucking { transform: scale(0) rotate(360deg) !important; opacity: 0 !important; }

        #msg-window { height: 50px; background: #fff; color: #111; margin: 5px 15px; border: 3px solid #555; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 13px; text-align: center; }
        #cmd-grid { height: 110px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px 15px 30px 15px; background: #222; }
        .cmd-btn { background: #eee; border: 2px solid #888; border-radius: 8px; font-weight: bold; font-size: 16px; }
        .btn-chance { animation: blink-btn 0.6s infinite alternate; border: 3px solid #ff8c00 !important; background: #fff !important; color: #ff8c00 !important; }
        @keyframes blink-btn { from { opacity: 1; transform: scale(1); } to { opacity: 0.7; transform: scale(1.05); } }

        /* --- デッキ画面：所持数バッジ復活 --- */
        #deck-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; background: var(--bg); display: none; flex-direction: column; z-index: 99999; padding: 20px; box-sizing: border-box; }
        .deck-header { display: flex; align-items: center; justify-content: space-around; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; border: 1px solid var(--cyan); margin-bottom: 10px; }
        .deck-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; overflow-y: auto; flex: 1; }
        .card-box { border: 1px solid #444; padding: 5px; background: #111; text-align: center; position: relative; }
        .card-box img { width: 100%; }
        .stock-badge { position: absolute; bottom: 2px; right: 2px; background: var(--red); color: white; font-size: 10px; padding: 1px 4px; border-radius: 10px; font-weight: bold; z-index: 5; }
        #success-pop { position: fixed; top: 0; left: 0; width: 100%; height: 100dvh; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 999999; }
    </style>
</head>
<body>

<div id="version-tag">Ver 0.9.19</div>

<div id="top-screen">
    <h1 class="top-title">Yu-Gi-Oh! GO</h1>
    <div class="top-cards-container">
        <img class="top-card-img" src="https://images.ygoprodeck.com/images/cards/46986414.jpg">
        <img class="top-card-img" src="https://images.ygoprodeck.com/images/cards/89631139.jpg">
    </div>
    <button class="start-btn" onclick="startGame()">闇のゲームを開始</button>
</div>

<div id="map"></div>
<div id="deck-btn-ui" class="ui-btn" onclick="openDeck()">DECK</div>
<div id="gps-btn-ui" class="ui-btn" onclick="refreshGPS()">🛰️</div>

<div id="battle-screen">
    <div class="battle-stage">
        <div class="m-row wild">
            <img id="w-img" class="battle-img" src="">
            <div class="status-ui">
                <div id="w-name-label" style="border-bottom:1px solid #999; overflow:hidden;">---</div>
                <div id="w-stat-label">Lv.1 ATK:0</div>
                <div class="hp-bar-bg"><div id="w-hp-fill" class="hp-bar-fill"></div></div>
                <div id="w-hp-num" style="text-align:right; font-size:10px; margin-top:2px;">0/0</div>
            </div>
        </div>
        <div id="seal-base-card"></div>
        <div id="fusion-vortex"><div class="vortex-anim"></div></div>
        <div class="m-row player">
            <img id="p-img" class="battle-img" src="" style="border-color: var(--cyan);">
            <div class="status-ui">
                <div id="p-name-label" style="border-bottom:1px solid #999; overflow:hidden;">---</div>
                <div id="p-stat-label">Lv.1 ATK:0</div>
                <div class="hp-bar-bg"><div id="p-hp-fill" class="hp-bar-fill"></div></div>
                <div id="p-hp-num" style="text-align:right; font-size:10px; margin-top:2px;">0/0</div>
            </div>
        </div>
    </div>
    <div id="msg-window"><div id="msg-text"></div></div>
    <div id="cmd-grid">
        <button class="cmd-btn" onclick="battleTurn('attack')">攻撃</button>
        <button id="seal-btn" class="cmd-btn" onclick="battleTurn('seal')">封印</button>
        <button class="cmd-btn" onclick="closeBattleUI()">逃げる</button>
        <button class="cmd-btn" onclick="openDeck()">交代</button>
    </div>
</div>

<div id="success-pop" onclick="finishSeal()"><h1 style="color:var(--gold)">封印成功！！</h1><img id="pop-card" style="width:180px; border:4px solid #fff; border-radius:8px;"><p style="margin-top:10px;">タップで戻る</p></div>

<div id="deck-screen">
    <h3 style="text-align:center; color:var(--gold);">DUELIST DECK</h3>
    <div class="deck-header">
        <div style="text-align:center;"><img id="main-mon-img" style="width:90px; border:2px solid var(--gold);"><div id="main-mon-stat" style="font-size:10px; font-weight:bold;"></div></div>
        <div style="display:flex; flex-direction:column; gap:5px;"><button onclick="executeSwap()" style="background:var(--cyan); border:none; padding:8px; border-radius:5px; font-weight:bold;">🔄 交代</button><button onclick="executeEnhance()" style="background:var(--gold); border:none; padding:8px; border-radius:5px; font-weight:bold;">⚡ 強化</button></div>
    </div>
    <div id="deck-grid" class="deck-grid"></div>
    <button onclick="closeDeck()" style="width:100%; padding:15px; background:#444; border:none; border-radius:8px; margin-top:10px; color:white; font-weight:bold;">閉じる</button>
</div>

<script>
    let map, bData = { p: null, e: null, busy: false }, currentMarker;
    let myDeck = JSON.parse(localStorage.getItem('myDeck') || '[{"name":"青眼の白龍","id":89631139,"img":"https://images.ygoprodeck.com/images/cards/89631139.jpg","atk":3000,"level":1,"count":1}]');
    let selectedIdx = -1;

    const monsterLib = [{name:"青眼の白龍", id:89631139, atk:3000}, {name:"ブラック・マジシャン", id:46986414, atk:2500}, {name:"真紅眼の黒竜", id:74677422, atk:2400}, {name:"デーモンの召喚", id:70781052, atk:2500}, {name:"オシリスの天空竜", id:33731070, atk:4000}, {name:"ラーの翼神竜", id:10000010, atk:4000}];

    function startGame() { document.getElementById('top-screen').style.display = 'none'; document.getElementById('map').style.visibility = 'visible'; initMap(); }

    function initMap() {
        navigator.geolocation.getCurrentPosition(pos => {
            map = L.map('map', {zoomControl:false, fadeAnimation: false}).setView([pos.coords.latitude, pos.coords.longitude], 17);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            spawn(pos.coords.latitude, pos.coords.longitude);
            map.on('moveend', () => { spawn(map.getCenter().lat, map.getCenter().lng); });
        });
    }

    function spawn(lat, lon) {
        map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });
        for(let i=0; i<12; i++) {
            let m = monsterLib[Math.floor(Math.random()*monsterLib.length)];
            let lv = Math.floor(Math.random()*3)+1;
            const icon = L.divIcon({ className: 'mon-container', html: `<img src="https://images.ygoprodeck.com/images/cards_small/${m.id}.jpg" class="mon-chip" style="width:40px;height:40px;"><div class="lv-badge">Lv.${lv}</div>`, iconSize: [40, 40] });
            let marker = L.marker([lat+(Math.random()-0.5)*0.008, lon+(Math.random()-0.5)*0.008], {icon: icon}).addTo(map);
            marker.on('click', () => {
                bData.e = { name: m.name, id: m.id, atk: m.atk * lv, hp: m.atk * lv, max: m.atk * lv, lv, img: `https://images.ygoprodeck.com/images/cards/${m.id}.jpg` };
                bData.p = { ...myDeck[0], hp: myDeck[0].atk, max: myDeck[0].atk };
                currentMarker = marker;
                document.getElementById('battle-screen').style.display = 'flex';
                document.getElementById('w-img').classList.remove('sucking');
                document.getElementById('seal-btn').classList.remove('btn-chance');
                updateUI();
                document.getElementById('msg-text').innerText = `${bData.e.name}が現れた！`;
            });
        }
    }

    function updateUI() {
        if(!bData.e || !bData.p) return;
        const updateBox = (p, d) => {
            document.getElementById(`${p}-name-label`).innerText = d.name;
            document.getElementById(`${p}-stat-label`).innerText = `Lv.${d.level||d.lv} ATK:${d.atk}`;
            document.getElementById(`${p}-hp-fill`).style.width = (d.hp/d.max*100) + '%';
            document.getElementById(`${p}-hp-num`).innerText = `${Math.floor(d.hp)} / ${Math.floor(d.max)}`;
            document.getElementById(`${p}-img`).src = d.img;
        };
        updateBox('w', bData.e); updateBox('p', bData.p);
    }

    async function battleTurn(act) {
        if(bData.busy) return; bData.busy = true;
        if(act === 'attack') {
            document.getElementById('msg-text').innerText = "攻撃！";
            await new Promise(r => setTimeout(r, 600));
            bData.e.hp = Math.max(0, bData.e.hp - bData.p.atk);
            updateUI();
            if(bData.e.hp <= 0) { document.getElementById('msg-text').innerText = "チャンス！カードに封印だ！"; document.getElementById('seal-btn').classList.add('btn-chance'); bData.busy = false; return; }
        } else if(act === 'seal') {
            const eImg = document.getElementById('w-img');
            const rect = eImg.getBoundingClientRect();
            const vortex = document.getElementById('fusion-vortex');
            const baseCard = document.getElementById('seal-base-card');
            
            vortex.style.left = `${rect.left + rect.width / 2}px`;
            vortex.style.top = `${rect.top + rect.height / 2}px`;
            vortex.style.transform = `translate(-50%, -50%)`;
            baseCard.style.left = `${rect.left}px`;
            baseCard.style.top = `${rect.top}px`;
            baseCard.style.width = `${rect.width}px`;
            baseCard.style.height = `${rect.height}px`;

            baseCard.style.display = 'block';
            vortex.style.display = 'flex';
            setTimeout(() => { eImg.classList.add('sucking'); }, 50);
            await new Promise(r => setTimeout(r, 1100));
            vortex.style.display = 'none';
            baseCard.style.display = 'none';
            if(Math.random() > (bData.e.hp/bData.e.max)) {
                document.getElementById('pop-card').src = bData.e.img;
                document.getElementById('success-pop').style.display = 'flex';
                saveCapture(bData.e); return;
            }
            eImg.classList.remove('sucking');
            document.getElementById('msg-text').innerText = "失敗！";
        }
        await new Promise(r => setTimeout(r, 800));
        bData.p.hp = Math.max(0, bData.p.hp - (bData.e.atk*0.4));
        updateUI();
        if(bData.p.hp <= 0) { alert("敗北..."); closeBattleUI(); }
        bData.busy = false;
    }

    function saveCapture(m) {
        let exist = myDeck.find(d => d.id === m.id);
        if(exist) exist.count++; else myDeck.push({...m, count:1, level:1, uid:Date.now()});
        localStorage.setItem('myDeck', JSON.stringify(myDeck));
    }

    function openDeck() { document.getElementById('deck-screen').style.display = 'flex'; renderDeck(); }
    function renderDeck() {
        const main = myDeck[0];
        document.getElementById('main-mon-img').src = main.img;
        document.getElementById('main-mon-stat').innerText = `${main.name} (ATK:${main.atk})`;
        const grid = document.getElementById('deck-grid'); grid.innerHTML = '';
        myDeck.forEach((m, i) => {
            grid.innerHTML += `<div class="card-box ${selectedIdx === i ? 'selected' : ''}" onclick="selectedIdx=${i};renderDeck();">
                ${m.count > 1 ? `<div class="stock-badge">×${m.count}</div>` : ''}
                <img src="https://images.ygoprodeck.com/images/cards_small/${m.id}.jpg"></div>`;
        });
    }
    function executeSwap() {
        if(selectedIdx === -1) return;
        const [target] = myDeck.splice(selectedIdx, 1); myDeck.unshift(target);
        localStorage.setItem('myDeck', JSON.stringify(myDeck)); selectedIdx = -1; renderDeck();
    }
    function executeEnhance() {
        if(selectedIdx === -1 || selectedIdx === 0) return;
        myDeck[0].atk += Math.floor(myDeck[selectedIdx].atk * 0.1);
        myDeck[0].level = Math.floor(myDeck[0].atk / 1000) + 1;
        myDeck[selectedIdx].count--; if(myDeck[selectedIdx].count <= 0) myDeck.splice(selectedIdx, 1);
        localStorage.setItem('myDeck', JSON.stringify(myDeck)); selectedIdx = -1; renderDeck();
    }
    function closeDeck() { document.getElementById('deck-screen').style.display = 'none'; }
    function finishSeal() { document.getElementById('success-pop').style.display = 'none'; if(currentMarker) map.removeLayer(currentMarker); closeBattleUI(); }
    function closeBattleUI() { document.getElementById('battle-screen').style.display = 'none'; bData.busy = false; setTimeout(() => map.invalidateSize(), 200); }
    function refreshGPS() { navigator.geolocation.getCurrentPosition(pos => { map.setView([pos.coords.latitude, pos.coords.longitude]); spawn(pos.coords.latitude, pos.coords.longitude); }); }
</script>
</body>
</html>
