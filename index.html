<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yu-Gi-Oh! GO</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #000; color: white; overflow: hidden; }
        #map-container { 
            width: 100vw; height: 100vh; 
            background: radial-gradient(circle, #1e2a4a, #050510);
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.2) 1px, transparent 1px);
            background-size: 50px 50px;
            position: relative; 
        }
        .monster-icon {
            position: absolute; width: 100px; height: 145px;
            cursor: pointer; border: 2px solid gold; border-radius: 5px;
            background: #222; z-index: 999;
            box-shadow: 0 0 20px gold;
        }
        #status-msg { 
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: cyan; font-weight: bold; z-index: 1000;
        }
        #capture-screen {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.9); display:none; flex-direction:column;
            align-items:center; justify-content:center; z-index: 2000;
        }
    </style>
</head>
<body>

<div id="status-msg">システム再起動中...</div>
<div id="map-container"></div>

<div id="capture-screen">
    <h2 id="m-name"></h2>
    <img id="monster-art" src="" style="width:250px; border:2px solid gold;">
    <button onclick="location.reload()" style="margin-top:20px; padding:10px 20px;">封印して戻る</button>
</div>

<script>
    const map = document.getElementById('map-container');
    const statusMsg = document.getElementById('status-msg');

    // 1. まずは「青眼の白龍」を確実に1体出す（APIが死んでても出るように）
    function spawnStaticMonster() {
        const card = {
            name: "青眼の白龍",
            image: "https://images.ygoprodeck.com/images/cards/89631139.jpg"
        };
        createIcon(card);
        statusMsg.innerText = "ターゲット捕捉！（固定データ）";
    }

    // 2. アイコンを画面に作る
    function createIcon(card) {
        const icon = document.createElement('img');
        icon.src = card.image;
        icon.className = 'monster-icon';
        icon.style.left = "40%";
        icon.style.top = "40%";
        icon.onclick = () => {
            document.getElementById('m-name').innerText = card.name;
            document.getElementById('monster-art').src = card.image;
            document.getElementById('capture-screen').style.display = 'flex';
        };
        map.appendChild(icon);
    }

    // 起動時に実行
    window.onload = () => {
        spawnStaticMonster();
        // ここでAPIからも呼んでみる
        fetch('https://db.ygoprodeck.com/api/v7/randomcard.php')
            .then(res => res.json())
            .then(data => {
                const newCard = {
                    name: data.name,
                    image: data.card_images[0].image_url
                };
                createIcon(newCard);
                statusMsg.innerText = "さらにモンスターを検知！";
            })
            .catch(err => {
                console.log("APIは失敗しましたが、固定キャラは出ているはずです");
            });
    };
</script>
</body>
</html>
