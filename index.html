<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yu-Gi-Oh! GO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gold: #ffd700; --cyan: #00ffff; --red: #ff4d4d; --bg: #050510; }
        body { margin: 0; padding: 0; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; color: white; }
        
        /* --- ホーム画面 --- */
        #home-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #1a1a2e, #000);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999;
        }
        .millennium-items { font-size: 30px; letter-spacing: 15px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--gold)); }
        .game-title { font-size: 2.5rem; color: var(--gold); text-shadow: 0 0 20px #f00; font-weight: bold; margin-bottom: 50px; }
        #start-btn { 
            padding: 20px 40px; font-size: 1.5rem; background: #000; color: var(--gold);
            border: 2px solid var(--gold); border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 20px var(--gold); font-weight: bold;
        }

        #map-container { width: 100%; height: 100%; position: absolute; z-index: 1; visibility: hidden; }
        #map { width: 100%; height: 100%; }

        /* --- バトル・デッキUIは既存を維持（安定化修正済み） --- */
        #battle-screen, #deck-screen { position: fixed; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; z-index: 5000; background: #000; }
        #deck-btn { position: fixed; bottom: 30px; left: 20px; width: 65px; height: 65px; background: rgba(0,0,0,0.8); border: 2px solid var(--gold); border-radius: 50%; color: var(--gold); font-weight: bold; z-index: 1000; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--gold); }
    </style>
</head>
<body>

<div id="home-screen">
    <div class="millennium-items">👁️ ⚖️ 🧩 🗝️ 🔮 🗡️</div>
    <div class="game-title">Yu-Gi-Oh! GO</div>
    <button id="start-btn" onclick="startGame()">闇のゲームスタート</button>
</div>

<div id="map-container">
    <div id="map"></div>
    <div id="deck-btn" onclick="openDeck()">DECK</div>
</div>

<div id="battle-screen">
    <div id="msg-window" style="background:#fff; color:#000; padding:20px; margin:20px; border-radius:10px; font-weight:bold; text-align:center;">
        <span id="msg-text"></span>
    </div>
    <button onclick="closeBattle()" style="padding:15px; background:#444; color:#fff;">逃げる</button>
</div>

<div id="deck-screen">
    <h3 style="text-align:center; color:var(--gold);">デッキ & 強化</h3>
    <div id="deck-grid" style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; padding:15px; flex:1; overflow-y:auto;"></div>
    <button onclick="executePowerUp()" style="padding:15px; background:var(--gold); color:#000; font-weight:bold; border:none; margin:10px;">生贄強化</button>
    <button onclick="closeDeck()" style="padding:15px; background:#333; color:#fff; border:none;">閉じる</button>
</div>

<script>
    let map, userMarker, myDeck;
    myDeck = JSON.parse(localStorage.getItem('myDeck') || '[{"name":"クリボー","img":"https://images.ygoprodeck.com/images/cards/40640057.jpg","atk":300,"level":1,"uid":1,"count":1}]');

    function startGame() {
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('map-container').style.visibility = 'visible';
        initMap();
    }

    function initMap() {
        if (map) return;
        navigator.geolocation.getCurrentPosition(pos => {
            map = L.map('map', {zoomControl:false}).setView([pos.coords.latitude, pos.coords.longitude], 17);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            userMarker = L.circleMarker([pos.coords.latitude, pos.coords.longitude], {color:'#00ffff', radius:8}).addTo(map);
            
            // マップの描画を強制確定（真っ暗対策）
            setTimeout(() => { map.invalidateSize(); }, 200);
            spawnMonsters(pos.coords.latitude, pos.coords.longitude);
        });

        navigator.geolocation.watchPosition(pos => {
            if(userMarker) userMarker.setLatLng([pos.coords.latitude, pos.coords.longitude]);
        });
    }

    // 強化ロジック：生贄のATKの5%を加算
    function executePowerUp() {
        // baseCard と sacrifices は前回のロジックを引き継ぐ
        // ... (選択ロジック) ...
        const base = myDeck[0]; 
        const material = myDeck[1]; // 例として
        
        const bonusAtk = Math.floor(material.atk * 0.05);
        base.atk += bonusAtk;
        base.level++;
        
        alert(`強化完了！攻撃力が ${bonusAtk} アップした！`);
        saveDeck();
    }

    function closeBattle() {
        document.getElementById('battle-screen').style.display = 'none';
        // 戦闘終了後の描画バグ対策
        setTimeout(() => { map.invalidateSize(); }, 100);
    }

    function spawnMonsters(lat, lon) {
        // モンスターをマップに配置する既存ロジック
    }

    function saveDeck() { localStorage.setItem('myDeck', JSON.stringify(myDeck)); }
    function openDeck() { document.getElementById('deck-screen').style.display = 'flex'; }
    function closeDeck() { document.getElementById('deck-screen').style.display = 'none'; }
</script>
</body>
</html>
