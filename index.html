<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yu-Gi-Oh! GO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gold: #ffd700; --cyan: #00ffff; --red: #ff4d4d; --bg: #050510; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; overflow: hidden; height: 100vh; color: white; }
        #map { width: 100%; height: 100%; position: absolute; z-index: 1; }
        
        /* --- バトル画面（常にこのスタイルを維持） --- */
        #battle-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a3e, #000);
            display: none; flex-direction: column; z-index: 2000;
        }
        .battle-stage { flex: 2; position: relative; display: flex; flex-direction: column; justify-content: space-between; padding: 40px 20px; }
        .m-box { width: 45%; text-align: center; position: relative; }
        .m-box.wild { align-self: flex-end; }
        .m-box.player { align-self: flex-start; }
        .battle-img { width: 115px; border-radius: 5px; border: 2px solid #555; background: #000; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        /* ステータスバー（デザイン固定） */
        .s-bar { position: absolute; width: 160px; background: rgba(255,255,255,0.9); border: 2px solid #333; padding: 6px; border-radius: 10px 0 10px 0; color: #111; font-weight: bold; font-size: 13px; z-index: 10; }
        .s-bar.wild { top: -10px; left: -110px; border-left: 5px solid var(--gold); }
        .s-bar.player { bottom: -10px; right: -110px; border-right: 5px solid var(--cyan); }
        .hp-bg { width: 100%; height: 8px; background: #ccc; border-radius: 4px; margin-top: 5px; border: 1px solid #666; overflow: hidden; }
        .hp-fill { height: 100%; background: #2ecc71; width: 100%; transition: width 0.5s, background 0.3s; }
        .hp-low { background: var(--red) !important; }

        /* 下部UI（デザイン固定） */
        #msg-window { height: 75px; background: #fff; color: #111; margin: 10px; border: 4px solid #555; border-radius: 12px; padding: 10px; font-size: 1rem; font-weight: bold; display: flex; align-items: center; justify-content: center; text-align: center; }
        #cmd-grid { height: 110px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; background: #222; }
        .cmd-btn { background: linear-gradient(#eee, #ccc); border: 2px solid #666; color: #111; border-radius: 8px; font-size: 1.2rem; font-weight: bold; cursor: pointer; }

        /* デッキ画面等のUIは前回同様 */
        #deck-btn { position: fixed; bottom: 30px; left: 20px; width: 65px; height: 65px; background: rgba(0,0,0,0.85); border: 2px solid var(--gold); border-radius: 50%; color: var(--gold); font-weight: bold; z-index: 1000; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--gold); }
        #deck-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: none; flex-direction: column; z-index: 4000; padding: 15px; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="deck-btn" onclick="openDeck()">DECK</div>

<div id="battle-screen">
    <div class="battle-stage">
        <div class="m-box wild">
            <div class="s-bar wild">
                <div id="w-name">野生</div>
                <div class="hp-bg"><div id="w-hp-fill" class="hp-fill"></div></div>
            </div>
            <img id="w-img" class="battle-img" src="">
        </div>
        <div class="m-box player">
            <div class="s-bar player">
                <div id="p-name">自分</div>
                <div class="hp-bg"><div id="p-hp-fill" class="hp-fill"></div></div>
            </div>
            <img id="p-img" class="battle-img" src="">
        </div>
    </div>
    
    <div id="msg-window"><div id="msg-text"></div></div>
    
    <div id="cmd-grid">
        <button class="cmd-btn" onclick="handleTurn('attack')" style="border-color:var(--red);">攻撃</button>
        <button class="cmd-btn" onclick="handleTurn('seal')" style="border-color:var(--gold);">封印</button>
        <button class="cmd-btn" onclick="closeBattle()">逃げる</button>
        <button class="cmd-btn" onclick="openDeck()">交代</button>
    </div>
</div>

<script>
    let map, userMarker, currentEnemy, currentMarker;
    let myDeck = JSON.parse(localStorage.getItem('myDeck') || '[{"name":"クリボー","img":"https://images.ygoprodeck.com/images/cards/40640057.jpg","atk":300,"level":1,"uid":1,"count":1}]');
    let bData = { p: null, e: null, busy: false };

    // --- MAP初期化 ---
    function init() {
        if (!navigator.geolocation) return;
        navigator.geolocation.getCurrentPosition(pos => {
            const {latitude, longitude} = pos.coords;
            map = L.map('map', {zoomControl:false}).setView([latitude, longitude], 17);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            userMarker = L.circleMarker([latitude, longitude], {color: '#00ffff', radius: 8}).addTo(map);
            spawnMonsters(latitude, longitude);
        });
        navigator.geolocation.watchPosition(pos => {
            if(userMarker) userMarker.setLatLng([pos.coords.latitude, pos.coords.longitude]);
        });
    }

    function spawnMonsters(lat, lon) {
        const pool = [
            {name:"青眼の白龍", img:"https://images.ygoprodeck.com/images/cards/89631139.jpg", atk:3000},
            {name:"ブラック・マジシャン", img:"https://images.ygoprodeck.com/images/cards/46986414.jpg", atk:2500},
            {name:"真紅眼の黒竜", img:"https://images.ygoprodeck.com/images/cards/74677422.jpg", atk:2400}
        ];
        for(let i=0; i<12; i++) {
            let m = pool[Math.floor(Math.random()*pool.length)];
            let marker = L.marker([lat+(Math.random()-0.5)*0.006, lon+(Math.random()-0.5)*0.006], {
                icon: L.icon({iconUrl: m.img, iconSize:[50,70]})
            }).addTo(map);
            marker.on('click', () => startBattle(m, marker));
        }
    }

    // --- 戦闘開始 ---
    function startBattle(monster, marker) {
        currentMarker = marker;
        bData.e = {...monster, hp: 100, max: 100};
        bData.p = {...myDeck[0], hp: 100, max: 100};
        bData.busy = false;
        
        document.getElementById('battle-screen').style.display = 'flex';
        updateBattleUI();
        setMsg(`野生の ${monster.name} が 現れた！`);
    }

    function updateBattleUI() {
        const wFill = document.getElementById('w-hp-fill');
        const pFill = document.getElementById('p-hp-fill');
        
        document.getElementById('w-name').innerText = bData.e.name;
        document.getElementById('w-img').src = bData.e.img;
        let wPer = (bData.e.hp / bData.e.max) * 100;
        wFill.style.width = wPer + '%';
        wFill.classList.toggle('hp-low', wPer <= 30);

        document.getElementById('p-name').innerText = bData.p.name;
        document.getElementById('p-img').src = bData.p.img;
        let pPer = (bData.p.hp / bData.p.max) * 100;
        pFill.style.width = pPer + '%';
        pFill.classList.toggle('hp-low', pPer <= 30);
    }

    function setMsg(txt) { document.getElementById('msg-text').innerText = txt; }

    async function handleTurn(act) {
        if(bData.busy) return;
        bData.busy = true;

        if(act === 'attack') {
            setMsg(`${bData.p.name} の こうげき！`);
            await wait(800);
            bData.e.hp = Math.max(0, bData.e.hp - 40);
            updateBattleUI();
            if(bData.e.hp <= 0) { setMsg("チャンスだ！封印しろ！"); bData.busy = false; return; }
        } else {
            setMsg("封印を試みた！");
            await wait(1000);
            if(Math.random() > (bData.e.hp/130)) {
                return captureSuccess(bData.e);
            }
            setMsg("失敗！封印しきれない！");
        }

        // 敵のターン
        await wait(800);
        setMsg(`${bData.e.name} の はんげき！`);
        bData.p.hp = Math.max(0, bData.p.hp - 25);
        updateBattleUI();
        if(bData.p.hp <= 0) { 
            setMsg("力尽きた..."); 
            await wait(1500); 
            closeBattle(); 
            return;
        }
        bData.busy = false;
        await wait(800);
        setMsg("どうする？");
    }

    function captureSuccess(m) {
        setMsg(`${m.name} を 封印したぞ！`);
        let exist = myDeck.find(d => d.name === m.name);
        if(exist) exist.count++;
        else myDeck.push({...m, count:1, level:1, uid:Date.now()});
        localStorage.setItem('myDeck', JSON.stringify(myDeck));
        
        setTimeout(() => {
            if(currentMarker) map.removeLayer(currentMarker);
            closeBattle();
        }, 1500);
    }

    function closeBattle() {
        document.getElementById('battle-screen').style.display = 'none';
        bData.busy = false;
    }

    function wait(ms) { return new Promise(r => setTimeout(r, ms)); }
    function openDeck() { alert("デッキ画面（実装済みUI）を表示"); }

    window.onload = init;
</script>
</body>
</html>
