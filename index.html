<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yu-Gi-Oh! GO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gold: #ffd700; --cyan: #00ffff; --red: #ff4d4d; --fusion: #8e44ad; --bg: #050510; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; color: white; touch-action: manipulation; }
        #version-tag { position: fixed; top: 10px; right: 10px; background: rgba(0,0,0,0.6); font-size: 10px; color: var(--gold); z-index: 100000; padding: 2px 5px; border-radius: 3px; pointer-events: none; }

        /* --- マップ --- */
        #map { width: 100%; height: 100%; position: absolute; z-index: 1; visibility: hidden; }
        .mon-chip { border: 2px solid var(--gold); border-radius: 4px; box-shadow: 0 0 8px rgba(255,215,0,0.5); object-fit: cover; }
        .lv-badge { position: absolute; top: -5px; right: -5px; background: #000; color: var(--gold); border: 1px solid var(--gold); font-size: 10px; padding: 1px 3px; border-radius: 3px; font-weight: bold; z-index: 10; }

        /* --- UIボタン --- */
        .ui-btn { position: fixed; width: 65px; height: 65px; background: rgba(0,0,0,0.85); border: 2px solid var(--gold); border-radius: 50%; color: var(--gold); z-index: 1000; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 0 10px var(--gold); }
        #deck-btn-ui { bottom: 30px; left: 20px; }
        #gps-btn-ui { bottom: 30px; right: 20px; font-size: 24px; }

        /* --- バトル画面：ここをスマホに完全固定 --- */
        #battle-screen { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: radial-gradient(circle, #1a1a3e, #000); 
            display: none; flex-direction: column; z-index: 9000; overflow: hidden; 
        }
        .battle-stage { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px; gap: 5px; }
        
        .m-box { width: 100%; display: flex; align-items: center; justify-content: center; height: 32vh; }
        /* カード画像を強制的に縦幅30%以下に制限 */
        .battle-img { 
            max-height: 28vh !important; 
            width: auto !important; 
            max-width: 45% !important; 
            border: 2px solid #555; border-radius: 5px; box-shadow: 0 0 15px rgba(0,0,0,0.5); 
        }

        .status-ui { width: 150px; background: rgba(255,255,255,0.92); border: 2px solid #333; padding: 6px; border-radius: 6px; color: #111; font-size: 11px; margin: 0 8px; font-weight: bold; }
        .hp-bar-bg { width: 100%; height: 8px; background: #ccc; border-radius: 4px; overflow: hidden; margin-top: 3px; border: 1px solid #777; }
        .hp-bar-fill { height: 100%; background: #2ecc71; width: 100%; transition: width 0.3s; }
        .hp-danger { background: var(--red) !important; }

        /* 下部UI：絶対に隠れないように高さを固定 */
        #msg-window { height: 55px; background: #fff; color: #111; margin: 5px 15px; border: 3px solid #555; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; text-align: center; font-size: 14px; flex-shrink: 0; }
        #cmd-grid { height: 110px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; background: #222; flex-shrink: 0; }
        .cmd-btn { background: #eee; border: 2px solid #888; border-radius: 8px; font-weight: bold; font-size: 16px; }

        /* デッキ画面・演出 */
        #top-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a2e, #000); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999999; }
        #deck-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); display: none; flex-direction: column; z-index: 99999; padding: 20px; box-sizing: border-box; }
        .deck-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; overflow-y: auto; flex: 1; }
        .card-box { border: 1px solid #444; padding: 5px; text-align: center; position: relative; background: #111; }
        .card-box.selected { border: 2px solid var(--gold); background: rgba(255,215,0,0.1); }
        .card-box img { width: 100%; }
        #fusion-vortex { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, var(--fusion), transparent); display: none; z-index: 9500; align-items: center; justify-content: center; mix-blend-mode: screen; }
        .vortex-anim { width: 250px; height: 250px; border: 10px dashed #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg) scale(1.5); } to { transform: rotate(360deg) scale(0); } }
        #success-pop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 999999; }
    </style>
</head>
<body>

<div id="version-tag">Ver 0.9.3</div>

<div id="top-screen">
    <h1 style="color:var(--gold); text-shadow:0 0 15px #f00;">Yu-Gi-Oh! GO</h1>
    <button style="padding:15px 30px; background:#000; color:var(--gold); border:2px solid var(--gold); border-radius:50px; font-weight:bold; cursor:pointer;" onclick="startGame()">闇のゲームを開始</button>
</div>

<div id="map"></div>
<div id="deck-btn-ui" class="ui-btn" onclick="openDeck()">DECK</div>
<div id="gps-btn-ui" class="ui-btn" onclick="refreshGPS()">🛰️</div>

<div id="deck-screen">
    <h3 style="text-align:center; color:var(--gold);">DECK</h3>
    <div style="display:flex; align-items:center; justify-content:space-around; background:rgba(255,255,255,0.05); padding:10px; border-radius:10px; border:1px solid var(--cyan); margin-bottom:10px;">
        <div style="text-align:center;"><img id="main-mon-img" style="width:100px; border:2px solid var(--gold);"><div id="main-mon-stat" style="font-size:10px;"></div></div>
        <div style="display:flex; flex-direction:column; gap:5px;"><button onclick="executeSwap()" style="background:var(--cyan); border:none; padding:8px; border-radius:5px; font-weight:bold;">交代</button><button onclick="executeEnhance()" style="background:var(--gold); border:none; padding:8px; border-radius:5px; font-weight:bold;">強化</button></div>
    </div>
    <div id="deck-grid" class="deck-grid"></div>
    <button onclick="closeDeck()" style="width:100%; padding:12px; background:#444; border:none; border-radius:8px; margin-top:10px; color:white;">閉じる</button>
</div>

<div id="battle-screen">
    <div class="battle-stage">
        <div class="m-box">
            <div class="status-ui">
                <div id="w-name-label" style="border-bottom:1px solid #999;">---</div>
                <div id="w-stat-label" style="font-size:9px;">Lv.1 ATK:0</div>
                <div class="hp-bar-bg"><div id="w-hp-fill" class="hp-bar-fill"></div></div>
                <div style="text-align:right; font-size:9px;">HP:<span id="w-hp-now">0</span></div>
            </div>
            <img id="w-img" class="battle-img" src="">
        </div>
        <div class="m-box">
            <div class="status-ui">
                <div id="p-name-label" style="border-bottom:1px solid #999;">---</div>
                <div id="p-stat-label" style="font-size:9px;">Lv.1 ATK:0</div>
                <div class="hp-bar-bg"><div id="p-hp-fill" class="hp-bar-fill"></div></div>
                <div style="text-align:right; font-size:9px;">HP:<span id="p-hp-now">0</span></div>
            </div>
            <img id="p-img" class="battle-img" src="" style="border:2px solid var(--cyan);">
        </div>
    </div>
    <div id="msg-window"><div id="msg-text"></div></div>
    <div id="cmd-grid">
        <button class="cmd-btn" onclick="battleTurn('attack')">攻撃</button>
        <button class="cmd-btn" onclick="battleTurn('seal')">封印</button>
        <button class="cmd-btn" onclick="closeBattleUI()">逃げる</button>
        <button class="cmd-btn" onclick="openDeck()">交代</button>
    </div>
</div>

<div id="fusion-vortex"><div class="vortex-anim"></div></div>
<div id="success-pop" onclick="finishSeal()"><h1 style="color:var(--gold)">封印成功！！</h1><img id="pop-card" style="width:200px; border:4px solid #fff; border-radius:8px;"><p style="margin-top:10px;">タップで戻る</p></div>

<script>
    let map, bData = { p: null, e: null, busy: false }, currentMarker;
    let myDeck = JSON.parse(localStorage.getItem('myDeck') || '[{"name":"クリボー","id":40640057,"img":"https://images.ygoprodeck.com/images/cards/40640057.jpg","atk":300,"level":1,"count":1}]');
    let selectedIdx = -1;

    const monsterLib = [
        {name:"青眼の白龍", id:89631139, atk:3000}, {name:"ブラック・マジシャン", id:46986414, atk:2500},
        {name:"真紅眼の黒竜", id:74677422, atk:2400}, {name:"ブラック・マジシャン・ガール", id:38033121, atk:2000},
        {name:"デーモンの召喚", id:70781052, atk:2500}, {name:"オシリスの天空竜", id:33731070, atk:4000},
        {name:"オベリスクの巨神兵", id:13839129, atk:4000}, {name:"ラーの翼神竜", id:10000010, atk:4000}
    ];

    function startGame() { document.getElementById('top-screen').style.display = 'none'; document.getElementById('map').style.visibility = 'visible'; initMap(); }

    function initMap() {
        navigator.geolocation.getCurrentPosition(pos => {
            map = L.map('map', {zoomControl:false, fadeAnimation: false}).setView([pos.coords.latitude, pos.coords.longitude], 17);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            spawn(pos.coords.latitude, pos.coords.longitude);
            map.on('moveend', () => { spawn(map.getCenter().lat, map.getCenter().lng); });
        });
    }

    function spawn(lat, lon) {
        map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });
        for(let i=0; i<12; i++) {
            let m = monsterLib[Math.floor(Math.random()*monsterLib.length)];
            let lv = Math.floor(Math.random()*10)+1;
            const icon = L.divIcon({ className: 'mon-container', html: `<img src="https://images.ygoprodeck.com/images/cards_small/${m.id}.jpg" class="mon-chip" style="width:45px;height:45px;"><div class="lv-badge">Lv.${lv}</div>`, iconSize: [45, 45], iconAnchor: [22, 22] });
            let marker = L.marker([lat+(Math.random()-0.5)*0.008, lon+(Math.random()-0.5)*0.008], {icon: icon}).addTo(map);
            marker.on('click', () => {
                const total = m.atk * lv;
                bData.e = { ...m, lv: lv, atk: total, hp: total, max: total, img: `https://images.ygoprodeck.com/images/cards/${m.id}.jpg` };
                bData.p = { ...myDeck[0], hp: myDeck[0].atk, max: myDeck[0].atk };
                currentMarker = marker;
                document.getElementById('battle-screen').style.display = 'flex';
                updateUI();
                document.getElementById('msg-text').innerText = `${m.name} (Lv.${lv}) が現れた！`;
            });
        }
    }

    function updateUI() {
        const set = (p, d) => {
            document.getElementById(`${p}-name-label`).innerText = d.name;
            document.getElementById(`${p}-stat-label`).innerText = `Lv.${d.lv||d.level||1} ATK:${d.atk}`;
            document.getElementById(`${p}-hp-now`).innerText = Math.floor(d.hp);
            const fill = document.getElementById(`${p}-hp-fill`);
            const per = (d.hp/d.max*100);
            fill.style.width = per + '%';
            fill.classList.toggle('hp-danger', per <= 30);
            document.getElementById(`${p}-img`).src = d.img;
        };
        set('w', bData.e); set('p', bData.p);
    }

    async function battleTurn(act) {
        if(bData.busy) return; bData.busy = true;
        if(act === 'attack') {
            document.getElementById('msg-text').innerText = `${bData.p.name}の攻撃！`;
            await new Promise(r => setTimeout(r, 600));
            bData.e.hp = Math.max(0, bData.e.hp - bData.p.atk);
            updateUI();
            if(bData.e.hp <= 0) { document.getElementById('msg-text').innerText = "チャンス！"; bData.busy = false; return; }
        } else if(act === 'seal') {
            document.getElementById('fusion-vortex').style.display = 'flex';
            await new Promise(r => setTimeout(r, 1200));
            document.getElementById('fusion-vortex').style.display = 'none';
            if(Math.random() > (bData.e.hp/bData.e.max)) {
                document.getElementById('pop-card').src = bData.e.img;
                document.getElementById('success-pop').style.display = 'flex';
                let exist = myDeck.find(d => d.id === bData.e.id);
                if(exist) exist.count++; else myDeck.push({...bData.e, count:1, level:1, uid:Date.now()});
                localStorage.setItem('myDeck', JSON.stringify(myDeck));
                return;
            }
            document.getElementById('msg-text').innerText = "失敗！";
        }
        await new Promise(r => setTimeout(r, 800));
        document.getElementById('msg-text').innerText = `${bData.e.name}の反撃！`;
        bData.p.hp = Math.max(0, bData.p.hp - (bData.e.atk*0.4));
        updateUI();
        if(bData.p.hp <= 0) { alert("敗北..."); closeBattleUI(); }
        bData.busy = false;
    }

    function openDeck() { document.getElementById('deck-screen').style.display = 'flex'; renderDeck(); }
    function renderDeck() {
        const main = myDeck[0];
        document.getElementById('main-mon-img').src = main.img;
        document.getElementById('main-mon-stat').innerText = `${main.name} (ATK:${main.atk})`;
        const grid = document.getElementById('deck-grid'); grid.innerHTML = '';
        myDeck.forEach((m, i) => {
            if(i === 0) return;
            grid.innerHTML += `<div class="card-box ${selectedIdx === i ? 'selected' : ''}" onclick="selectedIdx=${i};renderDeck();">
                ${m.count>1?`<div class="stock-badge">×${m.count}</div>`:''}<img src="https://images.ygoprodeck.com/images/cards_small/${m.id}.jpg"></div>`;
        });
    }
    function executeSwap() {
        if(selectedIdx === -1) return;
        const [target] = myDeck.splice(selectedIdx, 1); myDeck.unshift(target);
        localStorage.setItem('myDeck', JSON.stringify(myDeck)); selectedIdx = -1; renderDeck();
    }
    function executeEnhance() {
        if(selectedIdx === -1) return;
        myDeck[0].atk += Math.floor(myDeck[selectedIdx].atk * 0.05);
        myDeck[selectedIdx].count--;
        if(myDeck[selectedIdx].count <= 0) myDeck.splice(selectedIdx, 1);
        localStorage.setItem('myDeck', JSON.stringify(myDeck)); selectedIdx = -1; renderDeck();
    }
    function finishSeal() { document.getElementById('success-pop').style.display = 'none'; if(currentMarker) map.removeLayer(currentMarker); closeBattleUI(); }
    function closeBattleUI() { document.getElementById('battle-screen').style.display = 'none'; bData.busy = false; setTimeout(() => map.invalidateSize(), 200); }
    function closeDeck() { document.getElementById('deck-screen').style.display = 'none'; }
    function refreshGPS() { navigator.geolocation.getCurrentPosition(pos => { map.setView([pos.coords.latitude, pos.coords.longitude]); spawn(pos.coords.latitude, pos.coords.longitude); }); }
</script>
</body>
</html>
