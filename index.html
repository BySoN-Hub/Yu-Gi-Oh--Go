<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yu-Gi-Oh! GO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gold: #ffd700; --cyan: #00ffff; --red: #ff4d4d; --bg: #050510; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; overflow: hidden; height: 100vh; width: 100vw; color: white; }

        /* マップ設定：軽量化のためアニメーションを抑制 */
        #map { width: 100%; height: 100%; position: absolute; z-index: 1; background: #000; }
        
        /* マップアイコン：画像ではなく、軽い円形マークに属性文字 */
        .simple-mon-icon {
            background: rgba(0,0,0,0.7); border: 2px solid var(--gold);
            border-radius: 50%; color: var(--gold); font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; box-shadow: 0 0 8px var(--gold);
        }

        /* UIボタン */
        .ui-btn { position: fixed; width: 60px; height: 60px; background: rgba(0,0,0,0.8); border: 2px solid var(--gold); border-radius: 50%; color: var(--gold); z-index: 1000; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 10px var(--gold); }
        #deck-btn { bottom: 20px; left: 20px; }
        #gps-btn { bottom: 20px; right: 20px; font-size: 24px; }

        /* --- 戦闘画面：スマホサイズに完全固定 --- */
        #battle-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a3e, #000);
            display: none; flex-direction: column; z-index: 9000; overflow: hidden;
        }
        .battle-stage { flex: 1; display: flex; flex-direction: column; justify-content: space-around; padding: 10px; align-items: center; }
        
        .m-box { width: 100%; display: flex; align-items: center; justify-content: center; position: relative; height: 35%; }
        .m-box.wild { flex-direction: row-reverse; } /* 敵は右側にステータス */
        .m-box.player { flex-direction: row; } /* 自分は左側にステータス */

        /* カード画像のサイズ制限：ここが重要 */
        .battle-img { 
            max-height: 100%; width: auto; max-width: 40%; 
            border: 2px solid #555; border-radius: 5px; background: #000;
        }

        /* ステータスUIのコンパクト化 */
        .status-ui {
            width: 140px; background: rgba(255,255,255,0.9);
            border: 2px solid #333; padding: 5px; border-radius: 5px;
            color: #111; font-size: 11px; margin: 0 10px;
        }
        .hp-bg { width: 100%; height: 6px; background: #ccc; border-radius: 3px; overflow: hidden; margin-top: 3px; }
        .hp-fill { height: 100%; background: #2ecc71; width: 100%; transition: width 0.3s; }
        .hp-danger { background: var(--red) !important; }

        /* 下部UI */
        #msg-window { height: 50px; background: #fff; color: #111; margin: 5px 10px; border: 3px solid #555; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
        #cmd-grid { height: 100px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; padding: 5px 10px 15px 10px; background: #222; }
        .cmd-btn { background: #eee; border: 2px solid #888; border-radius: 5px; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="deck-btn" class="ui-btn" onclick="alert('DECK')">DECK</div>
<div id="gps-btn" class="ui-btn" onclick="refreshGPS()">🛰️</div>

<div id="battle-screen">
    <div class="battle-stage">
        <div class="m-box wild">
            <div class="status-ui">
                <div id="w-name" style="font-weight:bold;">野生</div>
                <div id="w-stat" style="font-size:9px;">Lv.1 ATK:0</div>
                <div class="hp-bg"><div id="w-hp-fill" class="hp-fill"></div></div>
                <div style="text-align:right; font-size:9px;">HP: <span id="w-hp-now">0</span></div>
            </div>
            <img id="w-img" class="battle-img" src="">
        </div>

        <div class="m-box player">
            <div class="status-ui">
                <div id="p-name" style="font-weight:bold;">自分</div>
                <div id="p-stat" style="font-size:9px;">Lv.1 ATK:0</div>
                <div class="hp-bg"><div id="p-hp-fill" class="hp-fill"></div></div>
                <div style="text-align:right; font-size:9px;">HP: <span id="p-hp-now">0</span></div>
            </div>
            <img id="p-img" class="battle-img" src="">
        </div>
    </div>
    
    <div id="msg-window"><div id="msg-text"></div></div>
    <div id="cmd-grid">
        <button class="cmd-btn" onclick="battleAction('attack')">攻撃</button>
        <button class="cmd-btn" onclick="battleAction('seal')">封印</button>
        <button class="cmd-btn" onclick="location.reload()">逃げる</button>
        <button class="cmd-btn">交代</button>
    </div>
</div>

<script>
    let map, bData = { p: null, e: null, busy: false };
    const myDeck = JSON.parse(localStorage.getItem('myDeck') || '[{"name":"クリボー","id":40640057,"img":"https://images.ygoprodeck.com/images/cards/40640057.jpg","atk":300,"level":1}]');

    function init() {
        navigator.geolocation.getCurrentPosition(pos => {
            const {latitude, longitude} = pos.coords;
            map = L.map('map', {zoomControl:false, fadeAnimation: false}).setView([latitude, longitude], 17);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            spawn(latitude, longitude);
        });
    }

    function spawn(lat, lon) {
        map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });
        const monsters = [
            {name:"青眼の白龍", id:89631139, atk:3000, attr:"光"},
            {name:"ブラック・マジシャン", id:46986414, atk:2500, attr:"闇"},
            {name:"真紅眼の黒竜", id:74677422, atk:2400, attr:"闇"},
            {name:"オシリスの天空竜", id:33731070, atk:4000, attr:"神"}
        ];

        for(let i=0; i<15; i++) {
            const m = monsters[Math.floor(Math.random()*monsters.length)];
            const lv = Math.floor(Math.random()*5)+1;
            
            // 軽量アイコンの作成
            const icon = L.divIcon({
                className: 'custom-div-icon',
                html: `<div class="simple-mon-icon">${m.attr}</div>`,
                iconSize: [30, 30],
                iconAnchor: [15, 15]
            });

            const marker = L.marker([lat+(Math.random()-0.5)*0.008, lon+(Math.random()-0.5)*0.008], {icon: icon}).addTo(map);
            
            marker.on('click', () => {
                bData.e = { ...m, level: lv, atk: m.atk*lv, hp: 500*lv, max: 500*lv, img: `https://images.ygoprodeck.com/images/cards/${m.id}.jpg` };
                bData.p = { ...myDeck[0], hp: 1000, max: 1000 };
                document.getElementById('battle-screen').style.display = 'flex';
                updateUI();
                setMsg(m.name + "が現れた！");
            });
        }
    }

    function updateUI() {
        const set = (p, d) => {
            document.getElementById(`${p}-name`).innerText = d.name;
            document.getElementById(`${p}-stat`).innerText = `Lv.${d.level||1} ATK:${d.atk}`;
            document.getElementById(`${p}-hp-now`).innerText = Math.floor(d.hp);
            document.getElementById(`${p}-hp-fill`).style.width = (d.hp/d.max*100) + '%';
            document.getElementById(`${p}-hp-fill`).classList.toggle('hp-danger', (d.hp/d.max) <= 0.3);
            document.getElementById(`${p}-img`).src = d.img;
        };
        set('w', bData.e); set('p', bData.p);
    }

    function setMsg(t) { document.getElementById('msg-text').innerText = t; }

    async function battleAction(act) {
        if(bData.busy) return; bData.busy = true;
        if(act === 'attack') {
            setMsg("攻撃！");
            await new Promise(r => setTimeout(r, 600));
            bData.e.hp = Math.max(0, bData.e.hp - 400);
            updateUI();
            if(bData.e.hp <= 0) { setMsg("チャンス！"); bData.busy = false; return; }
        } else if(act === 'seal') {
            setMsg("封印...");
            await new Promise(r => setTimeout(r, 1000));
            if(Math.random() > 0.5) { alert("封印成功！"); location.reload(); } else { setMsg("失敗！"); }
        }
        await new Promise(r => setTimeout(r, 600));
        bData.p.hp = Math.max(0, bData.p.hp - 150);
        updateUI();
        if(bData.p.hp <= 0) { alert("敗北"); location.reload(); }
        bData.busy = false;
    }

    function refreshGPS() { navigator.geolocation.getCurrentPosition(pos => { map.setView([pos.coords.latitude, pos.coords.longitude]); spawn(pos.coords.latitude, pos.coords.longitude); }); }
    window.onload = init;
</script>
</body>
</html>
