<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yu-Gi-Oh! GO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gold: #ffd700; --cyan: #00ffff; --red: #ff4d4d; --fusion: #8e44ad; }
        body { margin: 0; padding: 0; background: #000; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; color: white; }
        
        /* --- ホーム画面 --- */
        #home-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, #1a1a2e, #000); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; }
        .millennium-items { font-size: 30px; letter-spacing: 15px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--gold)); }
        .game-title { font-size: 2.5rem; color: var(--gold); text-shadow: 0 0 20px #f00; font-weight: bold; margin-bottom: 50px; text-align: center; }
        #start-btn { padding: 20px 40px; font-size: 1.2rem; background: #000; color: var(--gold); border: 2px solid var(--gold); border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px var(--gold); font-weight: bold; }

        /* --- マップ画面 --- */
        #map-container { width: 100%; height: 100%; position: absolute; z-index: 1; visibility: hidden; }
        #map { width: 100%; height: 100%; }
        .monster-icon { filter: drop-shadow(0 0 8px var(--gold)); border-radius: 5px; }

        /* --- バトル画面 --- */
        #battle-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #1a1a3e, #000); display: none; flex-direction: column; z-index: 2000; }
        .battle-stage { flex: 2; position: relative; display: flex; flex-direction: column; justify-content: space-between; padding: 40px 20px; }
        .m-box { width: 45%; text-align: center; position: relative; }
        .m-box.wild { align-self: flex-end; }
        .m-box.player { align-self: flex-start; }
        .battle-img { width: 110px; border-radius: 5px; border: 2px solid #555; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .s-bar { position: absolute; width: 150px; background: rgba(255,255,255,0.9); border: 2px solid #333; padding: 5px; border-radius: 8px 0 8px 0; color: #111; font-weight: bold; font-size: 12px; z-index: 10; }
        .s-bar.wild { top: -15px; left: -100px; }
        .s-bar.player { bottom: -15px; right: -100px; }
        .hp-bg { width: 100%; height: 8px; background: #ccc; border-radius: 4px; margin-top: 4px; overflow: hidden; border: 1px solid #666; }
        .hp-fill { height: 100%; background: #2ecc71; width: 100%; transition: width 0.5s; }
        .hp-low { background: var(--red) !important; }

        /* --- 豪華演出レイヤー --- */
        #fusion-vortex { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, var(--fusion), transparent); display: none; z-index: 3000; align-items: center; justify-content: center; mix-blend-mode: screen; }
        .vortex-anim { width: 400px; height: 400px; border: 15px dashed #fff; border-radius: 50%; animation: rotate 0.8s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg) scale(1.5); } to { transform: rotate(360deg) scale(0); } }
        
        #yugi-cutin { position: fixed; top: 50%; left: -120%; width: 120%; height: 120px; background: rgba(0,0,255,0.6); transform: translateY(-50%) skewX(-20deg); z-index: 3100; transition: left 0.4s; display: flex; align-items: center; border-top: 4px solid gold; border-bottom: 4px solid gold; }
        #yugi-cutin.active { left: -10%; }

        #success-pop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 4000; text-align: center; }
        #pop-card { width: 240px; border: 5px solid #fff; border-radius: 10px; transform: scale(0); transition: 0.5s cubic-bezier(0.17, 0.89, 0.32, 1.49); box-shadow: 0 0 50px #fff; }
        #pop-card.show { transform: scale(1); }

        #msg-window { height: 70px; background: #fff; color: #111; margin: 10px; border: 4px solid #555; border-radius: 10px; padding: 10px; font-weight: bold; display: flex; align-items: center; justify-content: center; text-align: center; z-index: 2100; }
        #cmd-grid { height: 110px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; background: #222; }
        .cmd-btn { background: #eee; border: 2px solid #888; color: #111; border-radius: 5px; font-size: 1.1rem; font-weight: bold; }
        #deck-btn { position: fixed; bottom: 30px; left: 20px; width: 65px; height: 65px; background: rgba(0,0,0,0.8); border: 2px solid var(--gold); border-radius: 50%; color: var(--gold); font-weight: bold; z-index: 1000; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--gold); }
    </style>
</head>
<body>

<div id="home-screen">
    <div class="millennium-items">👁️ ⚖️ 🧩 🗝️ 🔮 🗡️</div>
    <div class="game-title">Yu-Gi-Oh! GO</div>
    <button id="start-btn" onclick="startGame()">闇のゲームスタート</button>
</div>

<div id="map-container">
    <div id="map"></div>
    <div id="deck-btn" onclick="alert('デッキ画面を表示')">DECK</div>
</div>

<div id="battle-screen">
    <div class="battle-stage">
        <div class="m-box wild">
            <div class="s-bar wild"><div id="w-name">野生</div><div class="hp-bg"><div id="w-hp" class="hp-fill"></div></div></div>
            <img id="w-img" class="battle-img" src="">
        </div>
        <div class="m-box player">
            <div class="s-bar player"><div id="p-name">自分</div><div class="hp-bg"><div id="p-hp" class="hp-fill"></div></div></div>
            <img id="p-img" class="battle-img" src="">
        </div>
    </div>
    <div id="msg-window"><div id="msg-text"></div></div>
    <div id="cmd-grid">
        <button class="cmd-btn" onclick="battleTurn('attack')">攻撃</button>
        <button class="cmd-btn" onclick="battleTurn('seal')">封印</button>
        <button class="cmd-btn" onclick="location.reload()">逃げる</button>
        <button class="cmd-btn">交代</button>
    </div>
</div>

<div id="fusion-vortex"><div class="vortex-anim"></div></div>
<div id="yugi-cutin"><h2 style="color:white; margin-left:120px; font-style:italic;">「運命のドロー！封印完了！！」</h2></div>
<div id="success-pop" onclick="location.reload()">
    <h1 style="color:var(--gold); text-shadow:0 0 15px #f00;">封印成功！！</h1>
    <img id="pop-card" src="">
    <h2 style="color:white; margin-top:15px;">ガッチャ！楽しいデュエルだったぜ！</h2>
</div>

<script>
    let map, userMarker, currentMarker;
    let bData = { p: null, e: null, busy: false };
    let myDeck = JSON.parse(localStorage.getItem('myDeck') || '[{"name":"クリボー","img":"https://images.ygoprodeck.com/images/cards/40640057.jpg","atk":300,"level":1,"count":1}]');

    function startGame() {
        document.getElementById('home-screen').style.display = 'none';
        document.getElementById('map-container').style.visibility = 'visible';
        initMap();
    }

    function initMap() {
        navigator.geolocation.getCurrentPosition(pos => {
            map = L.map('map', {zoomControl:false}).setView([pos.coords.latitude, pos.coords.longitude], 17);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            userMarker = L.circleMarker([pos.coords.latitude, pos.coords.longitude], {color:'#00ffff', radius:8}).addTo(map);
            setTimeout(() => map.invalidateSize(), 300);
            spawnMonsters(pos.coords.latitude, pos.coords.longitude);
        });
    }

    function spawnMonsters(lat, lon) {
        // モンスタープール増量（20種類以上）
        const pool = [
            {name:"青眼の白龍", img:"https://images.ygoprodeck.com/images/cards/89631139.jpg", atk:3000},
            {name:"ブラック・マジシャン", img:"https://images.ygoprodeck.com/images/cards/46986414.jpg", atk:2500},
            {name:"真紅眼の黒竜", img:"https://images.ygoprodeck.com/images/cards/74677422.jpg", atk:2400},
            {name:"オシリスの天空竜", img:"https://images.ygoprodeck.com/images/cards/33731070.jpg", atk:4000},
            {name:"オベリスクの巨神兵", img:"https://images.ygoprodeck.com/images/cards/13839129.jpg", atk:4000},
            {name:"ラーの翼神竜", img:"https://images.ygoprodeck.com/images/cards/10000010.jpg", atk:4000},
            {name:"デーモンの召喚", img:"https://images.ygoprodeck.com/images/cards/70781052.jpg", atk:2500},
            {name:"ブラック・マジシャン・ガール", img:"https://images.ygoprodeck.com/images/cards/38033121.jpg", atk:2000},
            {name:"エルフの剣士", img:"https://images.ygoprodeck.com/images/cards/91152256.jpg", atk:1400},
            {name:"時の魔術師", img:"https://images.ygoprodeck.com/images/cards/71625222.jpg", atk:500},
            {name:"バスター・ブレイダー", img:"https://images.ygoprodeck.com/images/cards/78193831.jpg", atk:2600},
            {name:"人造人間－サイコ・ショッカー", img:"https://images.ygoprodeck.com/images/cards/77585513.jpg", atk:2400},
            {name:"暗黒騎士ガイア", img:"https://images.ygoprodeck.com/images/cards/6382542.jpg", atk:2300},
            {name:"カース・オブ・ドラゴン", img:"https://images.ygoprodeck.com/images/cards/28279543.jpg", atk:2000},
            {name:"ホーリー・エルフ", img:"https://images.ygoprodeck.com/images/cards/15025844.jpg", atk:800},
            {name:"砦を守る翼竜", img:"https://images.ygoprodeck.com/images/cards/87796900.jpg", atk:1400}
        ];
        for(let i=0; i<15; i++) {
            let m = pool[Math.floor(Math.random()*pool.length)];
            let marker = L.marker([lat+(Math.random()-0.5)*0.007, lon+(Math.random()-0.5)*0.007], {
                icon: L.icon({iconUrl: m.img, iconSize:[45,65], className:'monster-icon'})
            }).addTo(map);
            marker.on('click', () => {
                bData.e = {...m, hp:100, max:100};
                bData.p = {...myDeck[0], hp:100, max:100};
                currentMarker = marker;
                document.getElementById('battle-screen').style.display = 'flex';
                updateBattleUI();
                setMsg(`野生の ${m.name} が 現れた！`);
            });
        }
    }

    function updateBattleUI() {
        const wFill = document.getElementById('w-hp');
        const pFill = document.getElementById('p-hp');
        document.getElementById('w-name').innerText = bData.e.name;
        document.getElementById('w-img').src = bData.e.img;
        wFill.style.width = bData.e.hp + '%';
        wFill.classList.toggle('hp-low', bData.e.hp <= 30);
        document.getElementById('p-name').innerText = bData.p.name;
        document.getElementById('p-img').src = bData.p.img;
        pFill.style.width = bData.p.hp + '%';
        pFill.classList.toggle('hp-low', bData.p.hp <= 30);
    }

    function setMsg(t) { document.getElementById('msg-text').innerText = t; }

    async function battleTurn(act) {
        if(bData.busy) return;
        bData.busy = true;
        if(act === 'attack') {
            setMsg(`${bData.p.name} の こうげき！`);
            await wait(800);
            bData.e.hp = Math.max(0, bData.e.hp - 35);
            updateBattleUI();
            if(bData.e.hp <= 0) { setMsg("チャンスだ！封印しろ！"); bData.busy = false; return; }
        } else {
            document.getElementById('fusion-vortex').style.display = 'flex';
            setMsg("封印カード、発動！！");
            await wait(1500);
            document.getElementById('fusion-vortex').style.display = 'none';
            if(Math.random() > (bData.e.hp/130)) {
                showSuccess(bData.e); return;
            }
            setMsg("失敗！封印しきれない！");
        }
        await wait(800);
        setMsg(`${bData.e.name} の 反撃！`);
        bData.p.hp = Math.max(0, bData.p.hp - 20);
        updateBattleUI();
        if(bData.p.hp <= 0) { setMsg("敗北した..."); await wait(1500); location.reload(); }
        bData.busy = false;
    }

    function showSuccess(m) {
        document.getElementById('yugi-cutin').classList.add('active');
        setTimeout(() => {
            const pop = document.getElementById('success-pop');
            document.getElementById('pop-card').src = m.img;
            pop.style.display = 'flex';
            setTimeout(() => document.getElementById('pop-card').classList.add('show'), 100);
            saveToDeck(m);
        }, 1000);
    }

    function saveToDeck(m) {
        let deck = JSON.parse(localStorage.getItem('myDeck') || '[]');
        let exist = deck.find(d => d.name === m.name);
        if(exist) exist.count++;
        else deck.push({...m, count:1, level:1, uid:Date.now()});
        localStorage.setItem('myDeck', JSON.stringify(deck));
    }

    function wait(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
