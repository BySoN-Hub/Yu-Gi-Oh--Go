<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yu-Gi-Oh! GO</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #000; color: white; overflow: hidden; }
        
        /* 地面を感じさせるサイバーマップ */
        #map-container { 
            width: 100vw; height: 100vh; 
            background: radial-gradient(circle at 50% 50%, #0d1b2a 0%, #000 100%);
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.15) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.15) 2px, transparent 2px);
            background-size: 80px 80px;
            position: relative; 
        }

        .monster-icon {
            position: absolute; width: 100px; height: 145px;
            cursor: pointer; border: 2px solid #ffd700; border-radius: 5px;
            background: #111; z-index: 100;
            box-shadow: 0 0 25px rgba(255, 215, 0, 0.8);
            transition: transform 0.2s;
        }
        .monster-icon:active { transform: scale(0.9); }

        #status-msg { 
            position: absolute; top: 20px; width: 100%; text-align: center;
            color: #00ffff; font-weight: bold; font-size: 1.2rem;
            text-shadow: 0 0 10px #000; z-index: 500;
        }

        #capture-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none;
            flex-direction: column; align-items: center; justify-content: center; z-index: 2000;
        }

        #monster-art { width: 260px; border: 4px solid #ffd700; border-radius: 12px; margin-bottom: 20px; }
        
        button {
            padding: 15px 35px; font-size: 1.2rem; background: #c0392b; color: white;
            border: none; border-radius: 50px; cursor: pointer; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="status-msg">エリア内に高エネルギー反応アリ！</div>
<div id="map-container"></div>

<div id="capture-screen">
    <h2 id="m-name"></h2>
    <img id="monster-art" src="">
    <button onclick="captureMonster()">カードへ封印する</button>
</div>

<script>
    const map = document.getElementById('map-container');
    const statusMsg = document.getElementById('status-msg');
    let currentMonster = null;

    // 確実に表示されるモンスターリスト（画像URLを直書き）
    const monsterList = [
        { name: "青眼の白龍", img: "https://images.ygoprodeck.com/images/cards/89631139.jpg" },
        { name: "ブラック・マジシャン", img: "https://images.ygoprodeck.com/images/cards/46986414.jpg" },
        { name: "真紅眼の黒竜", img: "https://images.ygoprodeck.com/images/cards/74677422.jpg" },
        { name: "封印されしエクゾディア", img: "https://images.ygoprodeck.com/images/cards/33396948.jpg" },
        { name: "暗黒騎士ガイア", img: "https://images.ygoprodeck.com/images/cards/6382542.jpg" },
        { name: "デーモンの召喚", img: "https://images.ygoprodeck.com/images/cards/70781052.jpg" }
    ];

    function spawnMonsters() {
        // リストからランダムに3体選んで表示
        for(let i=0; i<3; i++) {
            const monster = monsterList[Math.floor(Math.random() * monsterList.length)];
            createIcon(monster);
        }
    }

    function createIcon(card) {
        const icon = document.createElement('img');
        icon.src = card.img;
        icon.className = 'monster-icon';
        
        // 画面の重なりを防ぐため、少しずつ位置をずらす
        icon.style.left = (10 + Math.random() * 70) + "%";
        icon.style.top = (15 + Math.random() * 65) + "%";
        
        icon.onclick = () => {
            currentMonster = card;
            document.getElementById('m-name').innerText = card.name;
            document.getElementById('monster-art').src = card.img;
            document.getElementById('capture-screen').style.display = 'flex';
        };
        map.appendChild(icon);
    }

    function captureMonster() {
        alert(`【封印成功】\n${currentMonster.name} を入手した！`);
        // 捕まえたらリロードして再配置
        location.reload(); 
    }

    // 読み込み完了時に実行
    window.onload = spawnMonsters;
</script>
</body>
</html>
