<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yu-Gi-Oh! GO - Monster Encounter</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 80vh;
            background: url('https://www.transparenttextures.com/patterns/dark-matter.png'), linear-gradient(to bottom, #1a1a2e, #16213e);
            border: 4px solid #444;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-around;
        }

        #monster-display {
            text-align: center;
            transition: all 0.5s ease;
        }

        #monster-image {
            width: 220px;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.5));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .stats-box {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ffd700;
            width: 80%;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(233, 69, 96, 0.4);
        }

        button:active { transform: scale(0.95); }

        #loading { color: #ffd700; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Yu-Gi-Oh! GO</h1>

    <div id="game-container">
        <div id="monster-display">
            <div id="loading">モンスター探索中...</div>
            <img id="monster-image" src="" style="display:none;">
            <h2 id="monster-name"></h2>
            <div id="monster-stats" class="stats-box" style="display:none;">
                <p id="stat-atk"></p>
                <p id="stat-def"></p>
                <p id="stat-type" style="font-size: 0.8em; color: #aaa;"></p>
            </div>
        </div>

        <button onclick="spawnMonster()">新たなモンスターを探す</button>
    </div>

    <script>
        // 遊戯王APIからランダムなカードを取得する関数
        async function spawnMonster() {
            const loading = document.getElementById('loading');
            const img = document.getElementById('monster-image');
            const name = document.getElementById('monster-name');
            const stats = document.getElementById('monster-stats');
            const atkText = document.getElementById('stat-atk');
            const defText = document.getElementById('stat-def');
            const typeText = document.getElementById('stat-type');

            // 状態リセット
            loading.style.display = 'block';
            img.style.display = 'none';
            stats.style.display = 'none';
            name.innerText = "";

            try {
                // 有志APIの「ランダム1件取得」エンドポイントを使用
                const response = await fetch('https://db.ygoprodeck.com/api/v7/randomcard.php');
                const card = await response.json();

                // データのセット
                name.innerText = card.name;
                img.src = card.card_images[0].image_url;
                
                // 遊戯王特有のATK/DEFを表示（魔法・罠の場合は 0 または表記なしにする）
                const atk = card.atk !== undefined ? card.atk : "---";
                const def = card.def !== undefined ? card.def : "---";
                const race = card.race + " / " + (card.attribute || card.type);

                atkText.innerText = `ATK: ${atk}`;
                defText.innerText = `DEF: ${def}`;
                typeText.innerText = `[ ${race} ]`;

                // 表示切り替え
                img.onload = () => {
                    loading.style.display = 'none';
                    img.style.display = 'block';
                    stats.style.display = 'block';
                };

            } catch (error) {
                console.error("データ取得失敗:", error);
                loading.innerText = "通信エラー！再試行してください。";
            }
        }

        // 初回起動
        window.onload = spawnMonster;
    </script>
</body>
</html>
