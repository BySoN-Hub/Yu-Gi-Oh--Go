<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Yu-Gi-Oh! GO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gold: #ffd700; --cyan: #00ffff; --bg: #050510; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; overflow: hidden; height: 100dvh; color: white; }
        
        /* マップとUI */
        #map { width: 100%; height: 100%; position: absolute; z-index: 1; background: #000; }
        .ui-btn { position: fixed; width: 60px; height: 60px; background: rgba(0,0,0,0.8); border: 2px solid var(--gold); border-radius: 50%; color: var(--gold); z-index: 500; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 12px; }
        #deck-btn { bottom: 30px; left: 20px; }
        #scan-btn { bottom: 30px; right: 20px; background: radial-gradient(circle, #666, #000); overflow: hidden; }
        #scan-btn img { width: 80%; height: 80%; object-fit: contain; }

        /* マインドスキャン演出（シンプル版） */
        #scan-msg { 
            position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 24px; color: var(--gold); font-weight: bold; z-index: 10000;
            pointer-events: none; opacity: 0; display: none;
        }
        @keyframes scan-fade { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); } 20% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; transform: translate(-50%, -50%) scale(1.1); } }

        /* トップ画面 */
        #top-screen { position: fixed; inset: 0; background: #050510; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9000; }
        .start-btn { padding: 15px 40px; background: none; color: var(--gold); border: 2px solid var(--gold); border-radius: 30px; font-size: 18px; cursor: pointer; }

        /* 共通画面設定 */
        .overlay { position: fixed; inset: 0; background: var(--bg); display: none; flex-direction: column; z-index: 8000; padding: 20px; }
        
        /* モンスター表示 */
        .mon-icon { border: 2px solid var(--gold); border-radius: 4px; background: #000; }
    </style>
</head>
<body>

<div id="scan-msg">マインドスキャン！！</div>

<div id="top-screen">
    <h1 style="color:var(--gold); font-style:italic;">Yu-Gi-Oh! GO</h1>
    <button class="start-btn" onclick="initGame()">探索開始</button>
</div>

<div id="map"></div>

<div id="deck-btn" class="ui-btn" style="display:none;" onclick="toggleScreen('deck-screen')">DECK</div>
<div id="scan-btn" class="ui-btn" style="display:none;" onclick="runMindScan()">
    <img src="https://images.ygoprodeck.com/images/cards_small/60750341.jpg">
</div>

<div id="deck-screen" class="overlay">
    <h2 style="color:var(--gold); text-align:center;">DECK</h2>
    <div id="deck-list" style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px; overflow-y:auto; flex:1;"></div>
    <button onclick="toggleScreen('deck-screen')" style="margin-top:20px; padding:10px;">閉じる</button>
</div>

<script>
    let map;
    const monsterLib = [
        {id:89631139, name:"青眼の白龍", atk:3000},
        {id:46986414, name:"ブラック・マジシャン", atk:2500},
        {id:74677422, name:"真紅眼の黒竜", atk:2400},
        {id:38033121, name:"ブラック・マジシャン・ガール", atk:2000},
        {id:70781052, name:"デーモンの召喚", atk:2500},
        {id:15063914, name:"エルフの剣士", atk:1400}
    ];

    function initGame() {
        document.getElementById('top-screen').style.display = 'none';
        navigator.geolocation.getCurrentPosition(pos => {
            const {latitude: lat, longitude: lon} = pos.coords;
            map = L.map('map', {zoomControl: false}).setView([lat, lon], 16);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            
            document.getElementById('deck-btn').style.display = 'flex';
            document.getElementById('scan-btn').style.display = 'flex';
            
            spawnMonsters(lat, lon);
        });
    }

    function spawnMonsters(lat, lon) {
        // 既存のマーカーを削除
        map.eachLayer(layer => { if (layer instanceof L.Marker) map.removeLayer(layer); });

        for(let i=0; i<20; i++) {
            const m = monsterLib[Math.floor(Math.random() * monsterLib.length)];
            const mLat = lat + (Math.random() - 0.5) * 0.01;
            const mLon = lon + (Math.random() - 0.5) * 0.01;
            
            const icon = L.divIcon({
                className: 'custom-icon',
                html: `<img src="https://images.ygoprodeck.com/images/cards_small/${m.id}.jpg" class="mon-icon" style="width:40px;">`,
                iconSize: [40, 40]
            });

            L.marker([mLat, mLon], {icon: icon}).addTo(map).on('click', () => alert(m.name + " に遭遇した！（バトル機能は安定化のため調整中）"));
        }
    }

    // マインドスキャン：リロードせずにモンスターを再配置
    function runMindScan() {
        const msg = document.getElementById('scan-msg');
        msg.style.display = 'block';
        msg.style.animation = 'scan-fade 1.2s forwards';
        
        // 再配置
        const center = map.getCenter();
        spawnMonsters(center.lat, center.lng);

        setTimeout(() => {
            msg.style.display = 'none';
            msg.style.animation = '';
        }, 1200);
    }

    function toggleScreen(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === 'flex') ? 'none' : 'flex';
        if(id === 'deck-screen') {
            const list = document.getElementById('deck-list');
            list.innerHTML = monsterLib.map(m => `<div style="border:1px solid #444;"><img src="https://images.ygoprodeck.com/images/cards_small/${m.id}.jpg" style="width:100%;"></div>`).join('');
        }
    }
</script>
</body>
</html>
