<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yu-Gi-Oh! GO</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        :root { --gold: #ffd700; --cyan: #00ffff; --red: #ff4d4d; --bg: #050510; }
        body { margin: 0; padding: 0; background: #000; font-family: sans-serif; overflow: hidden; height: 100vh; color: white; }
        #map { width: 100%; height: 100%; position: absolute; z-index: 1; }
        
        /* --- 新・デッキ画面UI --- */
        #deck-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); display: none; flex-direction: column; z-index: 4000; padding: 15px; box-sizing: border-box;
        }
        
        /* 上段：メインモンスター */
        .main-mon-area { display: flex; align-items: center; justify-content: space-around; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border: 2px solid var(--cyan); margin-bottom: 15px; }
        .main-card-big { width: 140px; border: 3px solid var(--gold); border-radius: 8px; box-shadow: 0 0 20px var(--cyan); }
        .main-actions { display: flex; flex-direction: column; gap: 15px; }
        .action-icon-btn { width: 60px; height: 60px; background: #222; border: 2px solid var(--gold); border-radius: 12px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }
        .action-icon-btn span { font-size: 10px; color: var(--gold); margin-top: 2px; }

        /* 下段：控えリスト */
        .sub-mon-title { font-size: 14px; color: #aaa; margin-bottom: 8px; padding-left: 5px; }
        .sub-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; overflow-y: auto; flex: 1; padding: 5px; }
        .card-box { border: 2px solid #333; padding: 5px; border-radius: 5px; text-align: center; position: relative; background: #111; transition: 0.2s; }
        .card-box.selected { border-color: var(--gold); background: rgba(255,215,0,0.2); transform: scale(1.05); }
        .card-box img { width: 100%; border-radius: 3px; }
        .stock-badge { position: absolute; top: -5px; right: -5px; background: var(--red); color: white; border-radius: 10px; padding: 1px 6px; font-size: 11px; font-weight: bold; border: 1px solid white; z-index: 10; }

        /* バトル・UI共通 */
        #battle-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; flex-direction: column; z-index: 2000; }
        #deck-btn { position: fixed; bottom: 30px; left: 20px; width: 65px; height: 65px; background: rgba(0,0,0,0.85); border: 2px solid var(--gold); border-radius: 50%; color: var(--gold); font-weight: bold; z-index: 1000; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px var(--gold); }
        .btn-close { width: 100%; padding: 15px; background: #333; color: white; border: none; border-radius: 10px; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="map"></div>
<div id="deck-btn" onclick="openDeck()">DECK</div>

<div id="deck-screen">
    <h3 style="text-align:center; color:var(--gold); margin-top:0;">DUELIST DECK</h3>
    
    <div class="main-mon-area">
        <div style="text-align:center;">
            <div style="font-size:12px; color:var(--cyan); margin-bottom:5px;">[ 戦闘中 ]</div>
            <img id="main-mon-img" class="main-card-big" src="">
            <div id="main-mon-status" style="margin-top:5px; font-size:12px;"></div>
        </div>
        <div class="main-actions">
            <div class="action-icon-btn" onclick="executeSwap()">
                <div style="font-size:20px;">🔄</div>
                <span>交換</span>
            </div>
            <div class="action-icon-btn" onclick="toggleEnhanceMode()">
                <div style="font-size:20px;">⚡</div>
                <span id="enhance-btn-text">強化</span>
            </div>
        </div>
    </div>

    <div class="sub-mon-title">控えモンスター</div>
    <div id="deck-grid" class="sub-grid"></div>

    <button class="btn-close" onclick="closeDeck()">マップに戻る</button>
</div>

<div id="battle-screen">
    <div id="battle-content" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h2 id="w-name" style="color:var(--gold)"></h2>
        <img id="w-img" style="width:180px;">
        <p>VS</p>
        <img id="p-img" style="width:120px; border:2px solid var(--cyan);">
        <div id="battle-msg" style="margin-top:20px; background:#fff; color:#000; padding:10px; width:80%; text-align:center; border-radius:10px; font-weight:bold;"></div>
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button onclick="battleAction('atk')" style="padding:15px 30px; background:var(--red); color:white; border:none; border-radius:10px; font-weight:bold;">攻撃</button>
            <button onclick="battleAction('seal')" style="padding:15px 30px; background:var(--gold); border:none; border-radius:10px; font-weight:bold;">封印</button>
        </div>
    </div>
</div>

<script>
    let map, userMarker, currentEnemy;
    let myDeck = JSON.parse(localStorage.getItem('myDeck') || '[{"name":"クリボー","img":"https://images.ygoprodeck.com/images/cards/40640057.jpg","atk":300,"level":1,"uid":1,"count":1}]');
    
    let isEnhanceMode = false;
    let selectedSubIdx = -1;

    // GPSマップ初期化（安定版）
    function initMap() {
        if (!navigator.geolocation) return alert("GPS非対応");
        
        navigator.geolocation.getCurrentPosition(pos => {
            const {latitude, longitude} = pos.coords;
            map = L.map('map', {zoomControl:false}).setView([latitude, longitude], 17);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);
            userMarker = L.circleMarker([latitude, longitude], {color: '#00ffff', radius: 8}).addTo(map);
            spawnMonsters(latitude, longitude);
        });

        // 位置情報の継続的な監視（リロードなしで更新するため）
        navigator.geolocation.watchPosition(pos => {
            if(userMarker && map) userMarker.setLatLng([pos.coords.latitude, pos.coords.longitude]);
        });
    }

    function spawnMonsters(lat, lon) {
        const pool = [
            {name:"青眼の白龍", img:"https://images.ygoprodeck.com/images/cards/89631139.jpg", atk:3000},
            {name:"ブラック・マジシャン", img:"https://images.ygoprodeck.com/images/cards/46986414.jpg", atk:2500},
            {name:"真紅眼の黒竜", img:"https://images.ygoprodeck.com/images/cards/74677422.jpg", atk:2400}
        ];
        for(let i=0; i<10; i++) {
            let m = pool[Math.floor(Math.random()*pool.length)];
            let marker = L.marker([lat+(Math.random()-0.5)*0.006, lon+(Math.random()-0.5)*0.006], {
                icon: L.icon({iconUrl: m.img, iconSize:[50,72]})
            }).addTo(map);
            marker.on('click', () => startBattle(m, marker));
        }
    }

    // デッキ画面の表示更新
    function openDeck() {
        document.getElementById('deck-screen').style.display = 'flex';
        renderDeck();
    }

    function renderDeck() {
        const main = myDeck[0];
        document.getElementById('main-mon-img').src = main.img;
        document.getElementById('main-mon-status').innerText = `${main.name} Lv.${main.level}\nATK: ${main.atk}`;
        
        const grid = document.getElementById('deck-grid');
        grid.innerHTML = '';
        myDeck.forEach((m, i) => {
            if(i === 0) return; // メインは控えに表示しない
            grid.innerHTML += `
                <div class="card-box ${selectedSubIdx === i ? 'selected' : ''}" onclick="selectSub(${i})">
                    ${m.count > 1 ? `<div class="stock-badge">×${m.count}</div>` : ''}
                    <img src="${m.img}">
                    <div style="font-size:9px;">ATK:${m.atk}</div>
                </div>`;
        });
    }

    function selectSub(i) {
        selectedSubIdx = i;
        renderDeck();
    }

    // モンスター交換
    function executeSwap() {
        if(selectedSubIdx === -1) return alert("控えからモンスターを選んでください");
        const [target] = myDeck.splice(selectedSubIdx, 1);
        myDeck.unshift(target); // 先頭（戦闘用）へ
        saveDeck();
        selectedSubIdx = -1;
        renderDeck();
        alert("戦闘モンスターを交代しました！");
    }

    // 強化モード
    function toggleEnhanceMode() {
        if(selectedSubIdx === -1) return alert("生贄にする控えモンスターを選んでください");
        if(!confirm("選んだ控えモンスターを生贄にして、戦闘モンスターを強化しますか？")) return;
        
        const material = myDeck[selectedSubIdx];
        material.count--;
        myDeck[0].level++;
        myDeck[0].atk = Math.floor(myDeck[0].atk * 1.2); // 20%UP
        
        if(material.count <= 0) myDeck.splice(selectedSubIdx, 1);
        
        saveDeck();
        selectedSubIdx = -1;
        renderDeck();
        alert("強化完了！攻撃力が上昇しました！");
    }

    // 戦闘終了後のバグ対策：リロードを排除
    function battleAction(type) {
        if(type === 'atk') {
            document.getElementById('battle-msg').innerText = "攻撃！ダメージを与えた！";
        } else {
            alert("封印成功！");
            let m = currentEnemy;
            let target = myDeck.find(d => d.name === m.name);
            if(target) target.count++;
            else myDeck.push({...m, count:1, level:1, uid:Date.now()});
            saveDeck();
            
            // 【重要】リロードせず、バトル画面だけ隠す
            document.getElementById('battle-screen').style.display = 'none';
            if(currentEnemyMarker) map.removeLayer(currentEnemyMarker);
        }
    }

    let currentEnemyMarker;
    function startBattle(m, marker) {
        currentEnemy = m;
        currentEnemyMarker = marker;
        document.getElementById('w-name').innerText = m.name;
        document.getElementById('w-img').src = m.img;
        document.getElementById('p-img').src = myDeck[0].img;
        document.getElementById('battle-msg').innerText = m.name + "が現れた！";
        document.getElementById('battle-screen').style.display = 'flex';
    }

    function saveDeck() { localStorage.setItem('myDeck', JSON.stringify(myDeck)); }
    function closeDeck() { document.getElementById('deck-screen').style.display = 'none'; }
    window.onload = initMap;
</script>
</body>
</html>
